<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1714">
  <meta name="description" content="Gestión de rodajes audiovisuales">
  <title>Plan de Rodaje</title>
  
  <style>
    * { box-sizing: border-box; }
    html, body { 
      margin: 0; 
      padding: 0; 
      background: #f7f5f2; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      color: #1a1714;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 { 
      margin: 0; 
      font-size: 32px; 
      font-weight: 800;
    }

    .subtitle { 
      margin: 10px 0 20px 0; 
      color: #555;
      font-size: 14px;
    }

    .btn {
      background: #0052CC;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover { opacity: 0.9; }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .project-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .project-card:hover { transform: translateY(-2px); }

    .project-card h3 { 
      margin: 0 0 10px 0; 
      font-size: 18px;
    }

    .project-card p { 
      margin: 5px 0; 
      font-size: 13px; 
      color: #555;
    }

    .form-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
    }

    .status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      font-weight: 500;
    }

    .status.online { color: #0fa87e; }
    .status.offline { color: #ff5722; }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      h1 { font-size: 24px; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Plan de Rodaje</h1>
      <p class="subtitle" id="projectCount">0 proyectos</p>
      <button class="btn" onclick="toggleForm()">+ Nuevo Proyecto</button>
      
      <div id="form" style="display: none; margin-top: 20px;">
        <div class="form-group">
          <input type="text" id="projectName" placeholder="Nombre del proyecto..." />
          <button class="btn" onclick="createProject()">Crear</button>
          <button class="btn" style="background: #555;" onclick="toggleForm()">Cancelar</button>
        </div>
      </div>
    </header>

    <div id="projectsContainer" class="projects-grid"></div>
  </div>

  <div id="status" class="status online">🟢 Online</div>

  <script>
    // ════════════════════════════════════════════════════════════════
    // SIMPLE DATA STORE
    // ════════════════════════════════════════════════════════════════
    
    let projects = [];
    let isOnline = navigator.onLine;

    // Cargar proyectos al iniciar
    function loadProjects() {
      const stored = localStorage.getItem('projects');
      projects = stored ? JSON.parse(stored) : [];
      renderProjects();
    }

    // Guardar proyectos
    function saveProjects() {
      localStorage.setItem('projects', JSON.stringify(projects));
      
      // Si estamos online, intentar sincronizar
      if (isOnline) {
        syncProjects();
      }
    }

    // Crear proyecto
    function createProject() {
      const name = document.getElementById('projectName').value.trim();
      if (!name) return;

      const project = {
        id: 'proj_' + Date.now() + Math.random().toString(36).substr(2, 9),
        name: name,
        created_at: new Date().toISOString(),
        data: { days: [], depts: {} }
      };

      projects.unshift(project);
      saveProjects();
      document.getElementById('projectName').value = '';
      toggleForm();
      renderProjects();
    }

    // Eliminar proyecto
    function deleteProject(id) {
      projects = projects.filter(p => p.id !== id);
      saveProjects();
      renderProjects();
    }

    // Renderizar proyectos
    function renderProjects() {
      const container = document.getElementById('projectsContainer');
      const count = document.getElementById('projectCount');
      
      count.textContent = `${projects.length} proyecto${projects.length !== 1 ? 's' : ''}`;

      if (projects.length === 0) {
        container.innerHTML = '<div class="empty"><p>📁 No hay proyectos. ¡Crea uno para empezar!</p></div>';
        return;
      }

      container.innerHTML = projects.map(p => `
        <div class="project-card">
          <h3>${p.name}</h3>
          <p>📅 ${new Date(p.created_at).toLocaleDateString('es-ES')}</p>
          <p>🎬 ${p.id.substring(0, 12)}...</p>
          <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn" style="flex: 1; padding: 8px;">Abrir</button>
            <button class="btn" style="background: #ff5722; padding: 8px 12px;" onclick="deleteProject('${p.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    // Toggle form
    function toggleForm() {
      const form = document.getElementById('form');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        document.getElementById('projectName').focus();
      }
    }

    // Sincronizar con servidor
    async function syncProjects() {
      for (const project of projects) {
        try {
          await fetch('/.netlify/functions/save-project', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(project)
          });
        } catch (err) {
          console.warn('Sync failed:', err.message);
        }
      }
    }

    // Detectar cambios de conectividad
    window.addEventListener('online', () => {
      isOnline = true;
      document.getElementById('status').textContent = '🟢 Online';
      syncProjects();
    });

    window.addEventListener('offline', () => {
      isOnline = false;
      document.getElementById('status').textContent = '🔴 Offline';
    });

    // Iniciar al cargar
    document.addEventListener('DOMContentLoaded', loadProjects);

    // Tecla Enter para crear
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.getElementById('form').style.display !== 'none') {
        createProject();
      }
    });
  </script>

  <!-- Service Worker minimalista -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
