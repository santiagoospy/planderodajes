              const file = e.target.files[0]; if(!file) return;
              const reader = new FileReader();
              const data = await new Promise((res,rej)=>{ reader.onload=ev=>res(ev.target.result); reader.onerror=rej; reader.readAsDataURL(file); });
              onUpdateProject({ ...project, importantFiles: [...(project.importantFiles||[]), { id:Date.now(), nombre:file.name, data }] });
            }} style={{ display:'none' }}/>
          </label>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  RODAJE SENCILLO — SHELL COMPLETO
// ═══════════════════════════════════════════════════════════
function RodajeSencilloShell({ project, save, view, setView, activeDayId, setActiveDayId, activeSceneId, setActiveSceneId, activeDeptKey, setActiveDeptKey, isAdmin, setIsAdmin, showPin, setShowPin, theme, setTheme }) {

  const activeDay   = project?.days?.find(d=>d.id===activeDayId);
  const activeScene = activeDay?.scenes.find(s=>s.id===activeSceneId);

  const addScene = (dayId, title, momento='sin definir', customNum=null) => {
    // Calcular número global de escena (suma todas las escenas de todos los días)
    const totalScenes = project.days.reduce((sum, d) => sum + d.scenes.length, 0);
    const sceneNum = totalScenes + 1;
    const num = customNum || `esc ${String(sceneNum).padStart(2,'0')}`;
    const scene = { id:'s_'+uid(), num, title, done:false, depts:[], notes:'', momento };
    save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{...d,scenes:[...d.scenes,scene]})});
  };
  const deleteScene = (dayId, sceneId) => save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{...d,scenes:d.scenes.filter(s=>s.id!==sceneId)})});
  const updateScene = (dayId, updatedScene) => save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{...d,scenes:d.scenes.map(s=>s.id!==updatedScene.id?s:updatedScene)})});
  const toggleScene = (dayId, sceneId) => save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{...d,scenes:d.scenes.map(s=>s.id!==sceneId?s:{...s,done:!s.done})})});
  const selectSceneFromDept = (scene) => { const day = project.days.find(d=>d.scenes.some(s=>s.id===scene.id)); if(!day) return; setActiveDayId(day.id); setActiveSceneId(scene.id); setView('scene'); };

  // Header común para rodaje sencillo
  const SencilloHeader = ({ title, onBack }) => (
    <div style={{ background:'var(--bg-header)', borderBottom:'1px solid var(--border-light)', padding:'14px 20px', display:'flex', alignItems:'center', gap:12, position:'sticky', top:0, zIndex:100 }}>
      {onBack && <button onClick={onBack} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:'var(--text-tertiary)', padding:0 }}>‹</button>}
      <div style={{ flex:1, fontSize:16, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{title}</div>
    </div>
  );

  if (view==='dept') {
    const deptMeta = (project.depts||{})[activeDeptKey] || { label:activeDeptKey, icon:'📁', color:'#888' };
    return (
      <div style={{ maxWidth:'var(--app-max-width)', margin:'0 auto', minHeight:'100vh', background:'var(--bg-primary)' }}>
        <SencilloHeader title={`${deptMeta.icon} ${deptMeta.label}`} onBack={()=>setView('home')}/>
        <div style={{ padding:'20px' }}>
          <DeptDetailView
            deptKey={activeDeptKey} deptMeta={deptMeta} isAdmin={isAdmin}
            onBack={()=>setView('home')} projectId={project.id} project={project}
            onSelectSceneFromDept={selectSceneFromDept}
            onUpdateProject={onUpdateProject}
          />
        </div>
      </div>
    );
  }

  if (view==='day') {
    const dayIdx = project.days.findIndex(d=>d.id===activeDayId);
    return (
      <div style={{ maxWidth:'var(--app-max-width)', margin:'0 auto', minHeight:'100vh', background:'var(--bg-primary)' }}>
        <SencilloHeader title={activeDay?.label||'Día'} onBack={()=>setView('home')}/>
        <DayView
          day={activeDay} dayIndex={dayIdx} depts={project.depts||{}}
          isAdmin={isAdmin}
          onToggleScene={(sId)=>toggleScene(activeDayId, sId)}
          onSelectScene={(sId)=>{ setActiveSceneId(sId); setView('scene'); }}
          onAddScene={(dayId, title, momento)=>addScene(dayId, title, momento)}
          onDeleteScene={(sId)=>deleteScene(activeDayId, sId)}
          onBack={()=>setView('home')}
        />
      </div>
    );
  }

  if (view==='scene') {
    return (
      <div style={{ maxWidth:'var(--app-max-width)', margin:'0 auto', minHeight:'100vh', background:'var(--bg-primary)' }}>
        <SencilloHeader title={activeScene?.title||'Escena'} onBack={()=>setView('day')}/>
        <SceneView
          scene={activeScene} depts={project.depts||{}} isAdmin={isAdmin}
          projectId={project.id}
          onToggleDone={()=>toggleScene(activeDayId, activeSceneId)}
          onUpdateScene={(s)=>updateScene(activeDayId, s)}
          onBack={()=>setView('day')}
          onOpenLocaciones={null}
        />
      </div>
    );
  }

  return (
    <div style={{ maxWidth:'var(--app-max-width)', margin:'0 auto', minHeight:'100vh', background:'var(--bg-primary)' }}>
      <GafferTape colors={['#0052CC', '#FF0080', '#CCFF00', '#FF5722', '#2A2A2A']} />
      <SencilloHeader title={project.title}/>
      <RodajeSencilloHome
        project={project} isAdmin={isAdmin}
        onSelectDay={id=>{ setActiveDayId(id); setView('day'); }}
        onSelectDept={key=>{ setActiveDeptKey(key); setView('dept'); }}
        onUpdateProject={save}
      />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  ADMIN ALL PROJECTS PANEL — panel para ver y borrar todos los proyectos
// ═══════════════════════════════════════════════════════════
function AdminAllProjectsPanel({ onClose }) {
  const [allProjects, setAllProjects] = useState([]);
  const [allWorkspaces, setAllWorkspaces] = useState([]);
  const [loading, setLoading] = useState(true);
  const [deleting, setDeleting] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [deleteType, setDeleteType] = useState(null); // 'project' o 'workspace'

  useEffect(() => {
    if (!window._fb) return;
    setLoading(true);
    Promise.all([
      fb().getProjects().catch(err => { console.error('Error loading projects:', err); return []; }),
      fb().getAllProductoras().catch(err => { console.error('Error loading workspaces:', err); return []; })
    ]).then(([projects, workspaces]) => {
      setAllProjects(projects || []);
      setAllWorkspaces(workspaces || []);
      setLoading(false);
    });
  }, []);

  const handleDeleteProject = async (projId) => {
    setDeleting(projId);
    try {
      await fb().deleteProject(projId);
      setAllProjects(prev => prev.filter(p => p.id !== projId));
    } catch(err) {
      console.error('Error deleting project:', err);
    } finally {
      setDeleting(null);
      setConfirmDelete(null);
      setDeleteType(null);
    }
  };

  const handleDeleteWorkspace = async (workspaceId) => {
    setDeleting(workspaceId);
    try {
      await fb().deleteProductora(workspaceId);
      setAllWorkspaces(prev => prev.filter(w => w.id !== workspaceId));
    } catch(err) {
      console.error('Error deleting workspace:', err);
    } finally {
      setDeleting(null);
      setConfirmDelete(null);
      setDeleteType(null);
    }
  };

  return (
    <div style={{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.8)', zIndex:10000, display:'flex', alignItems:'flex-end' }}>
      <div style={{ width:'100%', maxHeight:'80vh', background:'var(--bg-primary)', borderRadius:'20px 20px 0 0', padding:'20px', overflow:'auto' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <h2 style={{ fontSize:18, fontWeight:700, color:'var(--text-primary)', margin:0 }}>⚙️ PANEL DE ADMIN</h2>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, color:'var(--text-tertiary)', cursor:'pointer' }}>✕</button>
        </div>
        
        {loading ? (
          <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--text-muted)' }}>Cargando datos...</div>
        ) : (
          <>
            {/* ESPACIOS DE TRABAJO */}
            <div style={{ marginBottom:24 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:12 }}>
                📁 ESPACIOS DE TRABAJO ({allWorkspaces.length})
              </div>
              
              {allWorkspaces.length === 0 ? (
                <div style={{ fontSize:11, color:'var(--text-muted)', padding:'16px', background:'var(--bg-secondary)', borderRadius:12 }}>
                  No hay espacios de trabajo
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {allWorkspaces.map(w => (
                    <div key={w.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px', border:'1px solid var(--border-light)' }}>
                      {confirmDelete === w.id && deleteType === 'workspace' ? (
                        <div>
                          <div style={{ fontSize:12, fontWeight:700, color:'var(--color-primary)', marginBottom:6 }}>¿Borrar "{w.name}"?</div>
                          <div style={{ fontSize:10, color:'var(--text-muted)', marginBottom:8 }}>Espacio: {w.id}</div>
                          <div style={{ display:'flex', gap:6 }}>
                            <button onClick={() => { setConfirmDelete(null); setDeleteType(null); }} style={{ flex:1, fontFamily:'inherit', fontSize:11, background:'var(--bg-card-dark)', color:'var(--text-tertiary)', border:'none', borderRadius:8, padding:'6px', cursor:'pointer' }}>Cancelar</button>
                            <button onClick={() => handleDeleteWorkspace(w.id)} disabled={deleting === w.id} style={{ flex:1, fontFamily:'inherit', fontSize:11, fontWeight:700, background: deleting === w.id ? '#ccc' : '#d94f2b', color:'#fff', border:'none', borderRadius:8, padding:'6px', cursor:'pointer' }}>
                              {deleting === w.id ? 'Borrando...' : 'Borrar'}
                            </button>
                          </div>
                        </div>
                      ) : (
                        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{w.name}</div>
                            <div style={{ fontSize:10, color:'var(--text-tertiary)', marginTop:2 }}>{w.id}</div>
                          </div>
                          <button onClick={() => { setConfirmDelete(w.id); setDeleteType('workspace'); }} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:12, cursor:'pointer', padding:'6px 10px', fontFamily:'inherit', fontWeight:700, whiteSpace:'nowrap' }}>
                            Borrar
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* PROYECTOS */}
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:12 }}>
                🎬 PROYECTOS ({allProjects.length})
              </div>
              
              {allProjects.length === 0 ? (
                <div style={{ fontSize:11, color:'var(--text-muted)', padding:'16px', background:'var(--bg-secondary)', borderRadius:12 }}>
                  No hay proyectos
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {allProjects.map(p => (
                    <div key={p.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px', border:'1px solid var(--border-light)' }}>
                      {confirmDelete === p.id && deleteType === 'project' ? (
                        <div>
                          <div style={{ fontSize:12, fontWeight:700, color:'var(--color-primary)', marginBottom:6 }}>¿Borrar "{p.title}"?</div>
                          <div style={{ fontSize:10, color:'var(--text-muted)', marginBottom:8 }}>Proyecto: {p.id}</div>
                          <div style={{ display:'flex', gap:6 }}>
                            <button onClick={() => { setConfirmDelete(null); setDeleteType(null); }} style={{ flex:1, fontFamily:'inherit', fontSize:11, background:'var(--bg-card-dark)', color:'var(--text-tertiary)', border:'none', borderRadius:8, padding:'6px', cursor:'pointer' }}>Cancelar</button>
                            <button onClick={() => handleDeleteProject(p.id)} disabled={deleting === p.id} style={{ flex:1, fontFamily:'inherit', fontSize:11, fontWeight:700, background: deleting === p.id ? '#ccc' : '#d94f2b', color:'#fff', border:'none', borderRadius:8, padding:'6px', cursor:'pointer' }}>
                              {deleting === p.id ? 'Borrando...' : 'Borrar'}
                            </button>
                          </div>
                        </div>
                      ) : (
                        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.title}</div>
                            <div style={{ fontSize:10, color:'var(--text-tertiary)', marginTop:2 }}>{p.id}</div>
                            <div style={{ fontSize:9, color:'var(--text-muted)', marginTop:2 }}>{p.client || '—'} · {(p.days || []).length} días · {(p.days || []).reduce((sum, d) => sum + (d.scenes || []).length, 0)} escenas</div>
                          </div>
                          <button onClick={() => { setConfirmDelete(p.id); setDeleteType('project'); }} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:12, cursor:'pointer', padding:'6px 10px', fontFamily:'inherit', fontWeight:700, whiteSpace:'nowrap' }}>
                            Borrar
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  LANDING VIEW — pantalla raíz pública (sin URL params)
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
//  MARKETPLACE VIEW
// ═══════════════════════════════════════════════════════════
function MarketplaceView({ onBack }) {
  const STORE_KEY = 'marketplace_items';
  const [items, setItems] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [search, setSearch] = useState('');
  const [uploading, setUploading] = useState(false);
  const [form, setForm] = useState({ titulo:'', descripcion:'', precio:'', contacto:'', nombre:'', categoria:'Equipos', fotos:[] });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(() => {
    try { const s = localStorage.getItem(STORE_KEY); if (s) setItems(JSON.parse(s)); } catch {}
  }, []);

  const saveItems = (newItems) => {
    setItems(newItems);
    try { localStorage.setItem(STORE_KEY, JSON.stringify(newItems)); } catch {}
  };

  const handleFotos = async (e) => {
    const list = Array.from(e.target.files||[]).slice(0,5);
    if (!list.length) return;
    setUploading(true);
    const nuevas = [];
    for (const f of list) {
      try { nuevas.push(await window.compressImage(f, 900, 0.75)); } catch {}
    }
    set('fotos', [...(form.fotos||[]), ...nuevas].slice(0,5));
    setUploading(false);
    e.target.value = '';
  };

  const CATEGORIAS = ['Equipos','Cámaras','Lentes','Iluminación','Sonido','Props & Arte','Transporte','Vestuario','Servicios','Otros'];

  const submit = () => {
    if (!form.titulo || !form.contacto) return;
    const newItem = { id: Date.now(), ...form, createdAt: new Date().toLocaleDateString('es') };
    saveItems([newItem, ...items]);
    setForm({ titulo:'', descripcion:'', precio:'', contacto:'', nombre:'', categoria:'Equipos', fotos:[] });
    setShowForm(false);
  };

  const del = (id) => saveItems(items.filter(i=>i.id!==id));

  const filtered = items.filter(i =>
    !search || (i.titulo+i.descripcion+i.categoria+i.nombre).toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={{ minHeight:'100vh', background:'#f7f5f2', fontFamily:'Inter, sans-serif', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ background:'linear-gradient(165deg, #006B8C 0%, #0092B8 50%, #12B8E0 100%)', padding:'calc(env(safe-area-inset-top,0px) + 16px) 20px 20px', position:'sticky', top:0, zIndex:10 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'rgba(255,255,255,0.7)', fontSize:14, cursor:'pointer', padding:'0 0 12px', fontFamily:'Inter, sans-serif' }}>‹ Volver</button>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div>
            <div style={{ fontSize:24, fontWeight:800, color:'#fff' }}>🛒 Marketplace</div>
            <div style={{ fontSize:13, color:'rgba(255,255,255,0.6)', marginTop:2 }}>Equipos, props y servicios para producción</div>
          </div>
          <button onClick={()=>setShowForm(true)} style={{ background:'rgba(255,255,255,0.95)', border:'none', borderRadius:12, padding:'10px 16px', fontSize:13, fontWeight:700, color:'#005a72', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>+ Publicar</button>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Buscar equipos, props, servicios..."
          style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:14, background:'rgba(255,255,255,0.15)', border:'1.5px solid rgba(255,255,255,0.25)', borderRadius:12, padding:'11px 14px', color:'#fff', outline:'none', boxSizing:'border-box' }}/>
      </div>

      {/* Form modal */}
      {showForm && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:500, display:'flex', alignItems:'flex-end' }} onClick={()=>setShowForm(false)}>
          <div style={{ background:'#fff', borderRadius:'20px 20px 0 0', width:'100%', padding:'20px 20px calc(env(safe-area-inset-bottom,0px)+24px)', maxHeight:'90vh', overflowY:'auto' }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:'flex', justifyContent:'center', marginBottom:12 }}><div style={{ width:36, height:4, background:'#e0ddd8', borderRadius:2 }}/></div>
            <div style={{ fontSize:16, fontWeight:700, color:'#1a1714', marginBottom:16 }}>Publicar ítem</div>

            {/* Fotos */}
            <div style={{ marginBottom:12 }}>
              <div style={{ display:'flex', gap:8, overflowX:'auto', marginBottom:8 }}>
                {(form.fotos||[]).map((src, i) => (
                  <div key={i} style={{ position:'relative', flexShrink:0 }}>
                    <img src={src} alt="" style={{ width:72, height:72, borderRadius:10, objectFit:'cover' }}/>
                    <button onClick={()=>set('fotos',(form.fotos||[]).filter((_,j)=>j!==i))} style={{ position:'absolute', top:-4, right:-4, width:18, height:18, borderRadius:'50%', background:'rgba(200,0,0,0.7)', border:'none', color:'#fff', fontSize:10, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                  </div>
                ))}
                {(form.fotos||[]).length < 5 && (
                  <label style={{ width:72, height:72, borderRadius:10, border:'1.5px dashed #ccc', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0, fontSize:22, color:'#bbb' }}>
                    {uploading ? '⏳' : '📷'}
                    <input type="file" accept="image/*" multiple onChange={handleFotos} style={{ display:'none' }}/>
                  </label>
                )}
              </div>
              <div style={{ fontSize:10, color:'#aaa' }}>Máximo 5 fotos</div>
            </div>

            <input value={form.titulo} onChange={e=>set('titulo',e.target.value)} placeholder="Título del ítem *"
              style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:14, background:'#f7f5f2', border:'1px solid #e5e2dd', borderRadius:10, padding:'11px 12px', color:'#1a1714', outline:'none', marginBottom:8, boxSizing:'border-box' }}/>
            <textarea value={form.descripcion} onChange={e=>set('descripcion',e.target.value)} placeholder="Descripción (estado, características, etc.)" rows={3}
              style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:14, background:'#f7f5f2', border:'1px solid #e5e2dd', borderRadius:10, padding:'11px 12px', color:'#1a1714', outline:'none', marginBottom:8, resize:'none', boxSizing:'border-box' }}/>

            <div style={{ display:'flex', gap:8, marginBottom:8 }}>
              <input value={form.precio} onChange={e=>set('precio',e.target.value)} placeholder="Precio (ej: $500)"
                style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:14, background:'#f7f5f2', border:'1px solid #e5e2dd', borderRadius:10, padding:'11px 12px', color:'#1a1714', outline:'none', boxSizing:'border-box' }}/>
              <select value={form.categoria} onChange={e=>set('categoria',e.target.value)}
                style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:13, background:'#f7f5f2', border:'1px solid #e5e2dd', borderRadius:10, padding:'11px 10px', color:'#1a1714', outline:'none' }}>
                {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>

            <div style={{ display:'flex', gap:8, marginBottom:16 }}>
              <input value={form.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Tu nombre"
                style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:14, background:'#f7f5f2', border:'1px solid #e5e2dd', borderRadius:10, padding:'11px 12px', color:'#1a1714', outline:'none', boxSizing:'border-box' }}/>
              <input value={form.contacto} onChange={e=>set('contacto',e.target.value)} placeholder="Teléfono / WhatsApp *"
                style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:14, background:'#f7f5f2', border:'1.5px solid #0092B8', borderRadius:10, padding:'11px 12px', color:'#1a1714', outline:'none', boxSizing:'border-box' }}/>
            </div>

            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>setShowForm(false)} style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:13, background:'#f0ede8', color:'#888', border:'none', borderRadius:12, padding:'13px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={submit} disabled={!form.titulo||!form.contacto} style={{ flex:2, fontFamily:'Inter, sans-serif', fontSize:13, fontWeight:700, background:form.titulo&&form.contacto?'#0092B8':'#ccc', color:'#fff', border:'none', borderRadius:12, padding:'13px', cursor:form.titulo&&form.contacto?'pointer':'not-allowed' }}>Publicar ítem</button>
            </div>
          </div>
        </div>
      )}

      {/* Items grid */}
      <div style={{ flex:1, padding:'16px', paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 24px)' }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 20px', color:'#bbb' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🛒</div>
            <div style={{ fontSize:16, fontWeight:600, marginBottom:6 }}>{search ? 'Sin resultados' : 'El marketplace está vacío'}</div>
            <div style={{ fontSize:13 }}>{search ? 'Probá con otra búsqueda' : 'Sé el primero en publicar un ítem'}</div>
          </div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {filtered.map(item => (
              <div key={item.id} style={{ background:'#fff', borderRadius:14, overflow:'hidden', border:'1px solid #ede9e3', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
                {(item.fotos||[]).length > 0 ? (
                  <img src={item.fotos[0]} alt={item.titulo} style={{ width:'100%', aspectRatio:'4/3', objectFit:'cover' }}/>

// ═══════════════════════════════════════════════════════════
//  PRODUCTORA GATE — pide contraseña antes de mostrar proyectos
// ═══════════════════════════════════════════════════════════
function ProductoraGateView({ productoraId, onUnlocked, onBack }) {
  const [productora, setProductora] = useState(null);
  const [loading, setLoading] = useState(true);
  const [notFound, setNotFound] = useState(false);
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [tries, setTries] = useState(0);

  useEffect(() => {
    if (!window._fb) return;
    fb().getProductora(productoraId).then(p => {
      if (!p) setNotFound(true);
      else setProductora(p);
      setLoading(false);
    }).catch(()=>{ setNotFound(true); setLoading(false); });
  }, [productoraId]);

  // Si la contraseña ya está guardada en localStorage, entra directo
  useEffect(() => {
    if (!productora) return;
    try {
      const saved = localStorage.getItem(`prod_pwd_${productoraId}`);
      if (saved && saved === productora.password) {
        onUnlocked(productora);
      }
    } catch {}
  }, [productora, productoraId, onUnlocked]);

  const submit = (e) => {
    if (e) e.preventDefault();
    if (!productora) return;
    if (pin === productora.password) {
      try { localStorage.setItem(`prod_pwd_${productoraId}`, pin); } catch {}
      onUnlocked(productora);
    } else {
      setTries(t => t+1);
      setError('Contraseña incorrecta');
      setPin('');
    }
  };

  if (loading) return <LoadingScreen text={`Buscando productora "${productoraId}"...`}/>;

  if (notFound) {
    return (
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'linear-gradient(165deg, #006B8C 0%, #0092B8 50%, #12B8E0 100%)', gap:14, padding:32, fontFamily:'Inter, sans-serif' }}>
        <div style={{ fontSize:48 }}>🔍</div>
        <div style={{ fontSize:20, fontWeight:800, color:'#fff', textAlign:'center' }}>Productora no encontrada</div>
        <div style={{ fontSize:13, color:'rgba(255,255,255,0.5)', textAlign:'center', lineHeight:1.6, maxWidth:300 }}>
          No existe ninguna productora con el nombre <strong style={{ color:'rgba(255,200,160,0.9)' }}>"{productoraId}"</strong>.<br/>
          Verificá que esté bien escrito.
        </div>
        <button onClick={onBack} style={{ 
          marginTop:16, 
          fontFamily:'Inter, sans-serif', 
          fontSize:13, 
          fontWeight:900, 
          letterSpacing:'0.02em',
          background:'rgba(255,255,255,0.9)',
          backgroundImage: 'none',
          color:'#0a0a0a', 
          border:'none', 
          borderRadius:0, 
          padding:'12px 24px', 
          cursor:'pointer',
          boxShadow:'4px 4px 0px rgba(0,0,0,0.4)'
        }}>‹ VOLVER AL INICIO</button>
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'linear-gradient(165deg, #006B8C 0%, #0092B8 50%, #12B8E0 100%)', padding:32, fontFamily:'Inter, sans-serif' }}>
      <button onClick={onBack} style={{ position:'absolute', top:20, left:20, background:'none', border:'none', fontSize:13, color:'rgba(255,255,255,0.55)', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>‹ Inicio</button>
      <div style={{ width:'100%', maxWidth:340 }}>
        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ fontSize:42, marginBottom:10 }}>🔒</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)', letterSpacing:'0.1em', marginBottom:8, fontWeight:600 }}>PRODUCTORA</div>
          <div style={{ fontSize:24, fontWeight:900, color:'#fff', marginBottom:6, letterSpacing:'-0.02em' }}>{productora.name}</div>
          <div style={{ fontSize:13, color:'#888' }}>Ingresá la contraseña para continuar</div>
        </div>
        <form onSubmit={submit}>
          <input type="password" value={pin} onChange={e=>{ setPin(e.target.value); setError(''); }} autoFocus
            placeholder="Contraseña"
            style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:16, background:'rgba(255,255,255,0.1)', border:`1.5px solid ${error?'rgba(255,180,150,0.8)':'rgba(255,255,255,0.2)'}`, padding:'14px 18px', color:'#fff', outline:'none', marginBottom:10, textAlign:'center', letterSpacing:'0.2em', boxSizing:'border-box' }}/>
          {error && <div style={{ fontSize:12, color:'rgba(255,200,160,0.9)', textAlign:'center', marginBottom:10, fontWeight:600 }}>{error} {tries >= 3 ? `(${tries} intentos)` : ''}</div>}
          <button type="submit" disabled={!pin}
            style={{ 
              width:'100%', 
              fontFamily:'Inter, sans-serif', 
              fontSize:14, 
              fontWeight:900, 
              letterSpacing:'0.02em',
              background: pin ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.12)', 
              color: pin ? '#005a72' : 'rgba(255,255,255,0.3)', 
              border:'none', 
              borderRadius:0, 
              padding:'14px', 
              cursor: pin ? 'pointer' : 'not-allowed',
              boxShadow: pin ? '4px 4px 0px rgba(0,0,0,0.4)' : 'none'
            }}>
            ENTRAR →
          </button>
        </form>
      </div>
    </div>
  );
}

function NewProductoraView({ onCreated, onCancel }) {
  const [name, setName] = useState('');
  const [password, setPassword] = useState('');
  const [password2, setPassword2] = useState('');
  const [creating, setCreating] = useState(false);
  const [error, setError] = useState('');
  const [slugManual, setSlugManual] = useState(false);
  const [slug, setSlug] = useState('');

  // Auto-generar slug desde nombre
  useEffect(() => {
    if (!slugManual) setSlug(productoraSlug(name));
  }, [name, slugManual]);

  const submit = async () => {
    setError('');
    if (!name.trim()) return setError('Nombre obligatorio');
    if (!slug.trim()) return setError('URL obligatoria');
    if (password.length < 4) return setError('La contraseña debe tener al menos 4 caracteres');
    if (password !== password2) return setError('Las contraseñas no coinciden');

    setCreating(true);
    try {
      const exists = await fb().productoraExists(slug);
      if (exists) {
        setError(`El nombre "${slug}" ya está en uso. Probá otro.`);
        setCreating(false);
        return;
      }
      const prod = {
        id: slug,
        name: name.trim(),
        password: password,
        createdAt: Date.now(),
      };
      await fb().saveProductora(prod);
      try { localStorage.setItem(`prod_pwd_${slug}`, password); } catch {}
      onCreated(prod);
    } catch (e) {
      setError('Error de conexión: ' + (e.message||''));
      setCreating(false);
    }
  };

  const baseUrl = window.location.origin + window.location.pathname;

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(165deg, #006B8C 0%, #0092B8 50%, #12B8E0 100%)', padding:'0 20px 40px', fontFamily:'Inter, sans-serif' }}>

        <div style={{ fontSize:26, fontWeight:800, color:'#fff', marginBottom:8, letterSpacing:'-0.5px' }}>Crea el nombre de la carpeta o productora</div>
        <div style={{ fontSize:13, color:'rgba(255,255,255,0.5)', marginBottom:28, lineHeight:1.6 }}>
          Creá un espacio privado para tu trabajo. Solo quienes tengan la contraseña podrán ver tus proyectos.
        </div>

        <div style={{ background:'rgba(255,255,255,0.07)', borderRadius:14, padding:'22px', border:'1px solid rgba(255,255,255,0.1)' }}>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', letterSpacing:'0.08em', marginBottom:6, fontWeight:600 }}>TU NOMBRE O TU PRODUCTORA *</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Juan García, Mi Productora"
            style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:15, background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.18)', borderRadius:8, padding:'12px 14px', color:'#fff', outline:'none', marginBottom:18, boxSizing:'border-box' }}/>

          <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', letterSpacing:'0.08em', marginBottom:6, fontWeight:600 }}>URL GENERAL PARA ENTRAR DIRECTAMENTE *</div>
          <div style={{ display:'flex', alignItems:'center', background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.18)', borderRadius:8, overflow:'hidden', marginBottom:6 }}>
            <span style={{ padding:'12px 0 12px 14px', fontSize:13, color:'rgba(255,255,255,0.35)' }}>?p=</span>
            <input value={slug} onChange={e=>{ setSlug(productoraSlug(e.target.value)); setSlugManual(true); }}
              placeholder="mi-carpeta"
              style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:15, fontWeight:700, background:'transparent', border:'none', padding:'12px 14px 12px 0', color:'#fff', outline:'none' }}/>
          </div>
          <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', marginBottom:18, wordBreak:'break-all' }}>{baseUrl}?p={slug || '...'}</div>

          <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', letterSpacing:'0.08em', marginBottom:6, fontWeight:600 }}>CONTRASEÑA *</div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Mínimo 4 caracteres"
            style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:15, background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.18)', borderRadius:8, padding:'12px 14px', color:'#fff', outline:'none', marginBottom:12, boxSizing:'border-box' }}/>

          <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)', letterSpacing:'0.08em', marginBottom:6, fontWeight:600 }}>REPETIR CONTRASEÑA *</div>
          <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)} placeholder="Confirmar"
            onKeyDown={e=>{ if(e.key==='Enter') submit(); }}
            style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:15, background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.2)', borderRadius:10, padding:'12px 14px', color:'#fff', outline:'none', marginBottom:6, boxSizing:'border-box' }}/>

          <div style={{ fontSize:11, color:'#F59E0B', background:'#1a1410', padding:'12px 14px', borderRadius:8, border:'1px solid #3a2a14', marginTop:16, lineHeight:1.5 }}>
            ⚠️ Guardá esta contraseña: si la perdés no podrás recuperarla.<br/>
            Compartila solo con tu equipo de confianza.
          </div>

          {error && <div style={{ fontSize:12, color:'rgba(255,200,160,0.9)', marginTop:12, textAlign:'center', fontWeight:600 }}>{error}</div>}

          <div style={{ display:'flex', gap:8, marginTop:22 }}>
            <button onClick={onCancel} disabled={creating}
              style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:13, fontWeight:600, background:'rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.55)', border:'none', borderRadius:10, padding:'14px', cursor:'pointer' }}>
              Cancelar
            </button>
            <button onClick={submit} disabled={creating}
              style={{ 
                flex:2, 
                fontFamily:'Inter, sans-serif', 
                fontSize:14, 
                fontWeight:900, 
                letterSpacing:'0.02em',
                background: creating ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.9)', 
                color: creating ? 'rgba(255,255,255,0.4)' : '#005a72', 
                border:'none', 
                borderRadius:0, 
                padding:'14px', 
                cursor: creating?'wait':'pointer',
                boxShadow: creating ? 'none' : '4px 4px 0px rgba(0,0,0,0.4)'
              }}>
              {creating ? 'Creando…' : 'CREAR PRODUCTORA'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  SELECT PROJECT TYPE — elegir sencillo o complejo
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
//  PRODUCTORA HUB — proyectos de UNA productora
// ═══════════════════════════════════════════════════════════
function ProductoraHubView({ productora, projects, onCreateProject, onOpenProject, onDeleteProject, onLogout, onUpdateProductora }) {
  const [copied, setCopied] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [deleting, setDeleting] = useState(null);
  const [showShare, setShowShare] = useState(false);
  const [showColorPicker, setShowColorPicker] = useState(false);
  const [colorPin, setColorPin] = useState('');
  const [colorPinError, setColorPinError] = useState('');
  const [colorPinOk, setColorPinOk] = useState(false);

  const PRODUCTORA_THEMES = {
    celeste:  { grad:'linear-gradient(165deg, #006B8C 0%, #0092B8 50%, #12B8E0 100%)', label:'Celeste' },
    naranja:  { grad:'#C24400', label:'Naranja' },
    amarillo: { grad:'#C89500', label:'Amarillo' },
    gris:     { grad:'linear-gradient(165deg, #1E1E2A 0%, #2A2A3A 50%, #363648 100%)', label:'Oscuro' },
    verde:    { grad:'linear-gradient(165deg, #0D4A2A 0%, #1A6B3A 50%, #237A44 100%)', label:'Verde' },
    violeta:  { grad:'#3A106A', label:'Violeta' },
    rojo:     { grad:'#C00A0A', label:'Rojo' },
    rosado:   { grad:'#8C1050', label:'Rosado' },
    claro:    { grad:'#F0EDE8', label:'Claro' },
  };
  
  const currentThemeKey = productora.colorTheme || 'celeste';
  const currentTheme = PRODUCTORA_THEMES[currentThemeKey] || PRODUCTORA_THEMES.celeste;
  const productoraGrad = currentTheme.grad;
  const isLight = currentThemeKey === 'claro';
  const tc = (light, dark) => isLight ? dark : light; // text color helper

  const productoraUrl = buildProductoraUrl(productora.id);

  const copyLink = (projId) => {
    navigator.clipboard.writeText(buildProjectUrl(projId));
    setCopied(projId);
    setTimeout(() => setCopied(null), 2000);
  };

  const copyProductoraLink = () => {
    navigator.clipboard.writeText(productoraUrl);
    setCopied('productora');
    setTimeout(() => setCopied(null), 2000);
  };

  const handleDelete = async (projId) => {
    setDeleting(projId);
    try {
      await onDeleteProject(projId);
    } finally {
      setDeleting(null);
      setConfirmDelete(null);
    }
  };

  const handleLogout = () => {
    try { localStorage.removeItem(`prod_pwd_${productora.id}`); } catch {}
    onLogout();
  };

  return (
    <div style={{ minHeight:'100vh', background:productoraGrad, fontFamily:'Inter, sans-serif' }}>
      <div style={{ maxWidth:'480px', margin:'0 auto', padding:'56px 20px 48px' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
          <div style={{ fontSize:10, color:tc('rgba(255,255,255,0.4)','rgba(0,0,0,0.35)'), letterSpacing:'0.12em', fontWeight:600 }}>PRODUCTORA</div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <button onClick={()=>{ setShowColorPicker(true); setColorPin(''); setColorPinError(''); setColorPinOk(false); }} style={{ background:tc('rgba(255,255,255,0.12)','rgba(0,0,0,0.08)'), border:'none', fontSize:12, color:tc('rgba(255,255,255,0.7)','rgba(0,0,0,0.55)'), cursor:'pointer', fontFamily:'Inter, sans-serif', padding:'5px 12px', borderRadius:20 }}>🎨 Color</button>
            <button onClick={handleLogout} style={{ background:tc('rgba(255,255,255,0.08)','rgba(0,0,0,0.06)'), border:'none', fontSize:12, color:tc('rgba(255,255,255,0.5)','rgba(0,0,0,0.4)'), cursor:'pointer', fontFamily:'Inter, sans-serif', padding:'5px 12px', borderRadius:20 }}>Cerrar sesión</button>
          </div>
        </div>
        <div style={{ fontSize:28, fontWeight:800, color:tc('#fff','#1a1714'), marginBottom:4, letterSpacing:'-0.5px' }}>{productora.name}</div>
        <div style={{ fontSize:13, color:tc('rgba(255,255,255,0.45)','rgba(0,0,0,0.4)'), marginBottom:28 }}>{projects.length} proyecto{projects.length!==1?'s':''}</div>

        {/* Color Picker Modal */}
        {showColorPicker && (
          <div style={{ background:'rgba(0,0,0,0.3)', borderRadius:16, padding:20, marginBottom:20, border:'1px solid rgba(255,255,255,0.15)' }}>
            <div style={{ fontSize:14, fontWeight:700, color:'#fff', marginBottom:12 }}>🎨 Cambiar color de productora</div>
            {!colorPinOk ? (
              <div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,0.6)', marginBottom:8 }}>Ingresá el código de la productora ({productora.id}) para confirmar</div>
                <input value={colorPin} onChange={e=>{ setColorPin(e.target.value); setColorPinError(''); }} placeholder="Código de productora"
                  style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:14, background:'rgba(255,255,255,0.15)', border:`1.5px solid ${colorPinError?'rgba(255,150,150,0.8)':'rgba(255,255,255,0.3)'}`, borderRadius:8, padding:'10px 14px', color:'#fff', outline:'none', marginBottom:8, boxSizing:'border-box' }}/>
                {colorPinError && <div style={{ fontSize:11, color:'rgba(255,200,150,0.9)', marginBottom:8 }}>{colorPinError}</div>}
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={()=>setShowColorPicker(false)} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', border:'none', borderRadius:8, padding:'9px', cursor:'pointer' }}>Cancelar</button>
                  <button onClick={()=>{
                    if (colorPin.trim().toLowerCase() === productora.id.toLowerCase()) {
                      setColorPinOk(true); setColorPinError('');
                    } else if (colorPin === productora.password) {
                      setColorPinOk(true); setColorPinError('');
                    } else {
                      setColorPinError('Código incorrecto. Usá el ID o la contraseña de la productora.');
                    }
                  }} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:'rgba(255,255,255,0.9)', color:'#005a72', border:'none', borderRadius:8, padding:'9px', cursor:'pointer' }}>Verificar</button>
                </div>
              </div>
            ) : (
              <div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,0.7)', marginBottom:12 }}>Elegí el color para esta productora:</div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:10, marginBottom:14 }}>
                  {Object.entries(PRODUCTORA_THEMES).map(([key, th]) => (
                    <button key={key} onClick={()=>{
                      if (onUpdateProductora) onUpdateProductora({ ...productora, colorTheme: key });
                      setShowColorPicker(false);
                    }}
                      style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, background:'none', border:'none', cursor:'pointer', padding:0 }}>
                      <div style={{ width:42, height:42, borderRadius:'50%', background:th.grad, border:currentThemeKey===key?'3px solid #fff':'2px solid rgba(255,255,255,0.3)', boxShadow:currentThemeKey===key?'0 0 0 2px rgba(0,0,0,0.3)':'none', transition:'all 0.2s' }}/>
                      <span style={{ fontSize:10, color:'rgba(255,255,255,0.7)', fontFamily:'inherit' }}>{th.label}</span>
                    </button>
                  ))}
                </div>
                <button onClick={()=>setShowColorPicker(false)} style={{ width:'100%', fontFamily:'inherit', fontSize:12, background:'rgba(255,255,255,0.12)', color:'rgba(255,255,255,0.6)', border:'none', borderRadius:8, padding:'9px', cursor:'pointer' }}>Cerrar</button>
              </div>
            )}
          </div>
        )}

        {/* Link productora */}
        <div style={{ background:tc('rgba(255,255,255,0.06)','rgba(0,0,0,0.06)'), borderRadius:14, padding:'14px 16px', border:`1px solid ${tc('rgba(255,255,255,0.08)','rgba(0,0,0,0.1)')}`, marginBottom:24 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:9, color:tc('rgba(255,255,255,0.35)','rgba(0,0,0,0.35)'), letterSpacing:'0.1em', marginBottom:4, fontWeight:600 }}>LINK DE LA PRODUCTORA</div>
              <div style={{ fontSize:11, color:tc('rgba(255,255,255,0.6)','rgba(0,0,0,0.5)'), overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{productoraUrl}</div>
            </div>
            <button onClick={copyProductoraLink} style={{ fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:700,
              background: copied==='productora'?tc('rgba(255,255,255,0.9)','rgba(0,0,0,0.15)'):tc('rgba(255,255,255,0.12)','rgba(0,0,0,0.08)'),
              color: copied==='productora'?tc('#7a3200','#1a1714'):tc('rgba(255,255,255,0.7)','rgba(0,0,0,0.5)'),
              border:'none', borderRadius:10, padding:'8px 14px', cursor:'pointer', whiteSpace:'nowrap' }}>
              {copied==='productora' ? '✓ Copiado' : 'Copiar'}
            </button>
          </div>
          <div style={{ fontSize:10, color:tc('rgba(255,255,255,0.3)','rgba(0,0,0,0.3)'), marginTop:8 }}>Compartilo con tu equipo (junto con la contraseña)</div>
        </div>

        {/* Lista de proyectos */}
        {projects.length === 0 ? (
          <div style={{ textAlign:'center', padding:'40px 20px', color:tc('rgba(255,255,255,0.3)','rgba(0,0,0,0.3)'), fontSize:13 }}>
            Todavía no hay proyectos en esta productora
          </div>
        ) : (
          <div style={{ background:tc('rgba(255,255,255,0.06)','rgba(0,0,0,0.05)'), borderRadius:14, overflow:'hidden', border:`1px solid ${tc('rgba(255,255,255,0.08)','rgba(0,0,0,0.1)')}`, marginBottom:20 }}>
            {projects.map((p, idx) => (
              <div key={p.id} style={{ borderBottom: idx < projects.length-1 ? `1px solid ${tc('rgba(255,255,255,0.06)','rgba(0,0,0,0.06)')}` : 'none' }}>
                {confirmDelete === p.id ? (
                  <div style={{ padding:'14px 16px' }}>
                    <div style={{ fontSize:13, fontWeight:700, color:tc('rgba(255,200,160,0.9)','#c00'), marginBottom:6 }}>¿Borrar "{p.title}"?</div>
                    <div style={{ fontSize:11, color:tc('rgba(255,255,255,0.4)','rgba(0,0,0,0.4)'), marginBottom:10 }}>Esta acción no se puede deshacer.</div>
                    <div style={{ display:'flex', gap:6 }}>
                      <button onClick={()=>setConfirmDelete(null)} style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:12, background:tc('rgba(255,255,255,0.08)','rgba(0,0,0,0.06)'), color:tc('rgba(255,255,255,0.5)','rgba(0,0,0,0.4)'), border:'none', borderRadius:8, padding:'8px', cursor:'pointer' }}>Cancelar</button>
                      <button onClick={()=>handleDelete(p.id)} disabled={deleting===p.id} style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:700, background: deleting===p.id?'rgba(255,255,255,0.2)':'rgba(255,80,60,0.8)', color:'#fff', border:'none', borderRadius:8, padding:'8px', cursor:'pointer' }}>
                        {deleting===p.id ? 'Borrando…' : 'Sí, borrar'}
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display:'flex', alignItems:'center', gap:10, padding:'14px 16px' }}>
                    <div onClick={()=>onOpenProject(p.id)} style={{ flex:1, cursor:'pointer', minWidth:0 }}>
                      <div style={{ fontSize:15, fontWeight:700, color:tc('#fff','#1a1714') }}>{p.title}</div>
                      <div style={{ fontSize:11, color:tc('rgba(255,255,255,0.45)','rgba(0,0,0,0.4)'), marginTop:2 }}>{p.client||'—'} · {p.dates||'sin fechas'}</div>
                      <div style={{ fontSize:10, color:tc('rgba(255,255,255,0.3)','rgba(0,0,0,0.3)'), marginTop:2 }}>{(p.days||[]).length} día{(p.days||[]).length!==1?'s':''} · {(p.days||[]).reduce((sum,d)=>sum+(d.scenes||[]).length,0)} escenas</div>
                    </div>
                    <button onClick={()=>copyLink(p.id)} style={{ background: copied===p.id?tc('rgba(255,255,255,0.9)','rgba(0,0,0,0.12)'):tc('rgba(255,255,255,0.08)','rgba(0,0,0,0.06)'), border:'none', borderRadius:8, color: copied===p.id?tc('#0f3460','#1a1714'):tc('rgba(255,255,255,0.5)','rgba(0,0,0,0.4)'), fontSize:13, cursor:'pointer', padding:'8px 12px', fontFamily:'Inter, sans-serif' }}>
                      {copied===p.id ? '✓' : '🔗'}
                    </button>
                    <button onClick={()=>setConfirmDelete(p.id)} style={{ background:'rgba(255,80,60,0.15)', border:'none', borderRadius:8, color:tc('rgba(255,160,140,0.9)','#c00'), fontSize:13, cursor:'pointer', padding:'8px 10px' }}>✕</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* Crear nuevo proyecto */}
        <button onClick={onCreateProject} className="tap"
          style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:15, fontWeight:700,
            background:tc('rgba(255,255,255,0.9)','#1a1714'), color:tc('#1a1714','#fff'),
            border:'none', borderRadius:14, padding:'16px 20px', cursor:'pointer', letterSpacing:'0.01em' }}>
          + Crear nuevo proyecto
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  ADMIN HUB — pantalla para crear proyectos y copiar links
// ═══════════════════════════════════════════════════════════
function AdminHub({ projects, onCreateProject, onOpenProject, onDeleteProject }) {
  const [copied, setCopied]       = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null); // id del proyecto a borrar
  const [deleting, setDeleting]   = useState(null);

  const copyLink = (projId) => {
    navigator.clipboard.writeText(buildProjectUrl(projId));
    setCopied(projId);
    setTimeout(() => setCopied(null), 2000);
  };

  const handleDelete = async (projId) => {
    setDeleting(projId);
    await onDeleteProject(projId);
    setDeleting(null);
    setConfirmDelete(null);
  };

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg-primary)', display:'flex', flexDirection:'column' }}>
      <GafferTape colors={['#CCFF00', '#FF5722', '#0052CC', '#FF0080', '#2A2A2A']} />
      <div style={{ background:'#1a1714', padding:'32px 20px 24px' }}>
        <div style={{ fontSize:11, color:'#666', letterSpacing:'0.12em', fontFamily:'Inter, sans-serif', marginBottom:6 }}>PLANDERODAJES.COM</div>
        <div style={{ fontSize:26, fontWeight:700, color:'#fff', fontFamily:'Inter, sans-serif', lineHeight:1.1 }}>Panel de Proyectos</div>
        <div style={{ fontSize:12, color:'#666', fontFamily:'Inter, sans-serif', marginTop:6 }}>Creá proyectos y compartí los links con tu equipo</div>
      </div>

      <div style={{ flex:1, padding:'24px 16px 40px', display:'flex', flexDirection:'column', gap:12 }}>
        <div style={{ background:'var(--bg-card-dark)', borderRadius:14, padding:'14px 16px', border:'1px solid #f5e8c0' }}>
          <div style={{ fontSize:12, color:'#d48c0e', fontFamily:'Inter, sans-serif', lineHeight:1.6 }}>
            💡 Cada proyecto tiene su propio link. Compartilo con el equipo — acceden en tiempo real sin cuenta.
          </div>
        </div>

        {projects.length > 0 && (
          <div>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.1em', fontFamily:'Inter, sans-serif', marginBottom:10 }}>PROYECTOS ACTIVOS — {projects.length}</div>
            {projects.map(p => (
              <div key={p.id} style={{ background:'var(--bg-secondary)', borderRadius:16, padding:'16px', marginBottom:10, border:'1px solid var(--border-light)', boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }}>
                <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:12 }}>
                  <div style={{ width:44, height:44, borderRadius:12, background:'#d94f2b18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0 }}>🎬</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:16, fontWeight:700, color:'var(--text-primary)', fontFamily:'Inter, sans-serif', marginBottom:2 }}>{p.title}</div>
                    <div style={{ fontSize:12, color:'#aaa', fontFamily:'Inter, sans-serif' }}>{p.client}</div>
                    <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'Inter, sans-serif', marginTop:2 }}>{p.dates} · {p.crew} personas</div>
                  </div>
                </div>

                <div style={{ background:'var(--bg-primary)', borderRadius:10, padding:'10px 12px', marginBottom:10, fontFamily:'monospace', fontSize:11, color:'var(--text-tertiary)', wordBreak:'break-all', lineHeight:1.5 }}>
                  🔗 {buildProjectUrl(p.id)}
                </div>

                {/* Botones principales */}
                <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                  <button onClick={() => copyLink(p.id)} style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:700,
                    background: copied===p.id ? '#0fa87e' : '#1a1714',
                    color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer', transition:'background 0.2s' }}>
                    {copied===p.id ? '✓ Copiado!' : '📋 Copiar link'}
                  </button>
                  <button onClick={() => onOpenProject(p.id)} style={{ flex:1, fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:700, background:'var(--color-primary)', color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>
                    Abrir →
                  </button>
                </div>

                {/* Borrar proyecto */}
                {confirmDelete !== p.id
                  ? <button onClick={()=>setConfirmDelete(p.id)} style={{ width:'100%', fontFamily:'Inter, sans-serif', fontSize:11, color:'#ccc', background:'none', border:'1px dashed #e5e2dd', borderRadius:10, padding:'8px', cursor:'pointer' }}>
                      🗑 Borrar proyecto
                    </button>
                  : <div style={{ background:'var(--bg-error)', borderRadius:10, padding:'12px 14px', border:'1px solid #d94f2b33' }}>
                      <div style={{ fontSize:12, color:'var(--color-primary)', fontFamily:'inherit', fontWeight:700, marginBottom:4 }}>⚠️ ¿Borrar "{p.title}"?</div>
                      <div style={{ fontSize:11, color:'#aaa', fontFamily:'inherit', marginBottom:10 }}>Se borrará todo: escenas, checklists, gastos, mensajes y datos del equipo. Esta acción no se puede deshacer.</div>
                      <div style={{ display:'flex', gap:8 }}>
                        <button onClick={()=>setConfirmDelete(null)} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:8, padding:'8px', cursor:'pointer' }}>Cancelar</button>
                        <button onClick={()=>handleDelete(p.id)} disabled={deleting===p.id} style={{ flex:1, fontFamily:'inherit', fontSize:12, fontWeight:700, background: deleting===p.id?'#ccc':'#d94f2b', color:'#fff', border:'none', borderRadius:8, padding:'8px', cursor:'pointer' }}>
                          {deleting===p.id ? 'Borrando...' : 'Sí, borrar todo'}
                        </button>
                      </div>
                    </div>
                }
              </div>
            ))}
          </div>
        )}

        {projects.length === 0 && (
          <div style={{ textAlign:'center', padding:'40px 20px', color:'#ccc', fontFamily:'Inter, sans-serif' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🎬</div>
            <div style={{ fontSize:14 }}>Sin proyectos todavía.</div>
          </div>
        )}

        <button onClick={onCreateProject} className="tap" style={{ 
          display:'flex', 
          alignItems:'center', 
          gap:14, 
          background:'rgba(255,255,255,0.9)',
          backgroundImage: 'none',
          borderRadius:0, 
          padding:'18px 20px', 
          border:'none', 
          cursor:'pointer', 
          fontFamily:'Inter, sans-serif', 
          textAlign:'left', 
          width:'100%',
          boxShadow:'4px 4px 0px rgba(0,0,0,0.4)'
        }}>
          <div style={{ width:44, height:44, background:'rgba(0,82,114,0.15)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, fontWeight:700, color:'#005a72', flexShrink:0, borderRadius:10 }}>+</div>
          <div>
            <div style={{ fontSize:16, fontWeight:700, color:'#005a72', fontFamily:'Inter, sans-serif' }}>NUEVO PROYECTO</div>
            <div style={{ fontSize:11, color:'rgba(0,82,114,0.7)', fontFamily:'Inter, sans-serif', marginTop:2 }}>Crear y obtener link para compartir</div>
          </div>
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  HELPER: Avatar circular de departamento
// ═══════════════════════════════════════════════════════════
function compressImage(file, size=120, quality=0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Recorte cuadrado centrado
        const min = Math.min(img.width, img.height);
        const sx = (img.width - min) / 2;
        const sy = (img.height - min) / 2;
        ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function DeptAvatar({ photo, icon, color, size=48, borderRadius=14, fontSize=26, editable=false, onUpload }) {
  const inputRef = React.useRef();
  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const compressed = await compressImage(file, 120, 0.6);
      onUpload && onUpload(compressed);
    } catch(err) { console.error('compress error', err); }
    e.target.value = '';
  };
  return (
    <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
      {photo
        ? <img src={photo} alt="avatar" style={{ width:size, height:size, borderRadius:'50%', objectFit:'cover', border:`2px solid ${color}44`, display:'block' }}/>
        : <div style={{ width:size, height:size, borderRadius:borderRadius, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:fontSize }}>{icon}</div>
      }
      {editable && (
        <>
          <div onClick={()=>inputRef.current?.click()} style={{ position:'absolute', bottom:-4, right:-4, width:22, height:22, borderRadius:'50%', background:color, border:'2px solid var(--bg-primary)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:11 }}>📷</div>
          <input ref={inputRef} type="file" accept="image/*" onChange={handleFile} style={{ display:'none' }}/>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  HELPER: Cinta gaffer (línea gráfica principal)
// ═══════════════════════════════════════════════════════════
const GafferTape = ({ colors = ['#FF5722', '#CCFF00', '#0052CC', '#FF0080', '#2A2A2A'] }) => {
  const segments = colors.length;
  const width = 100 / segments;
  return (
    <div style={{ 
      height:'calc(28px + env(safe-area-inset-top, 0px))',
      paddingTop:'env(safe-area-inset-top, 0px)',
      backgroundImage: `linear-gradient(90deg, ${colors.map((c, i) => `${c} ${i*width}%, ${c} ${(i+1)*width}%`).join(', ')})`,
      width:'100%',
      marginBottom: 0,
      flexShrink: 0
    }}/>
  );
};

// ═══════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [fbReady, setFbReady]         = useState(!!window._fb);
  const [view, setView]               = useState('home');
  const [activeDayId, setActiveDayId] = useState(null);
  const [activeSceneId, setActiveSceneId] = useState(null);
  const [activeDeptKey, setActiveDeptKey] = useState(null);
  const [isAdmin, setIsAdmin]         = useState(false);
  const [showPin, setShowPin]         = useState(false);
  const [showNewProject, setShowNewProject] = useState(false);
  const [showNewProductora, setShowNewProductora] = useState(false);
  const [showSelectProjectType, setShowSelectProjectType] = useState(false);
  const [theme, setThemeState]        = useState(() => localStorage.getItem('produapp-theme') || 'dark');

  // Cambiar tema
  const setTheme = (newTheme) => {
    setThemeState(newTheme);
    localStorage.setItem('produapp-theme', newTheme);
    document.documentElement.setAttribute('data-theme', newTheme === 'dark' ? 'dark' : '');
  };

  // Aplicar tema al cargar
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  }, [theme]);

  // Estado para flujo de productoras
  const [productora, setProductora] = useState(null); // productora desbloqueada
  const [productoraProjects, setProductoraProjects] = useState([]); // proyectos de esa productora
  const [productoraProjectsLoaded, setProductoraProjectsLoaded] = useState(false);

  // Estado para proyecto único (cuando entran por ?p=)
  const [singleProject, setSingleProject] = useState(null);
  const [singleProjectLoaded, setSingleProjectLoaded] = useState(false);

  // URL params
  const urlProjectId = getProjectIdFromUrl();
  const urlProductoraId = getProductoraIdFromUrl();
  const urlNewSencillo = new URLSearchParams(window.location.search).get('new') === 'sencillo';

  // Esperar Firebase
  useEffect(() => {
    if (window._fb) { setFbReady(true); return; }
    const handler = () => setFbReady(true);
    window.addEventListener('firebase-ready', handler);
    return () => window.removeEventListener('firebase-ready', handler);
  }, []);

  // Cargar proyecto único cuando hay ?p=
  useEffect(() => {
    if (!fbReady || !urlProjectId) return;
    setSingleProjectLoaded(false);
    const unsub = fb().onProject(urlProjectId, (proj) => {
      // Caso especial: el proyecto demo siempre se mantiene actualizado
      if (urlProjectId === SEED_PROJECT.id) {
        // Si no existe O es el demo viejo (Tren del Paraguay, Spot Cerveza, etc.), reemplazar
        const titlesObsoletos = ['Tren del Paraguay','Spot Cerveza Sol'];
        const necesitaActualizar = !proj || titlesObsoletos.includes(proj.title);
        if (necesitaActualizar) {
          fb().saveProject(SEED_PROJECT).then(() => {
            setSingleProject(SEED_PROJECT);
            setSingleProjectLoaded(true);
          });
          return;
        }
      }
      setSingleProject(proj);
      setSingleProjectLoaded(true);
    });
    return unsub;
  }, [fbReady, urlProjectId]);

  // Cargar proyectos de la productora cuando está desbloqueada
  useEffect(() => {
    if (!fbReady || !productora) return;
    setProductoraProjectsLoaded(false);
    const unsub = fb().onProjectsByProductora(productora.id, (projs) => {
      setProductoraProjects(projs);
      setProductoraProjectsLoaded(true);
    });
    return unsub;
  }, [fbReady, productora?.id]);

  // Si es rodaje sencillo, el creador es admin automáticamente
  useEffect(() => {
    if (singleProject) {
      const isSencillo = new URLSearchParams(window.location.search).get('modo') === 'sencillo' || singleProject.modo === 'sencillo';
      if (isSencillo && !isAdmin) {
        setIsAdmin(true);
      }
    }
  }, [singleProject?.id, isAdmin]);

  if (!fbReady) return <LoadingScreen />;

  // ═══ ROUTING ═══

  // 1) Hay ?p= → entrar al proyecto directamente (legacy + compartir)
  if (urlProjectId) {
    if (!singleProjectLoaded) return <LoadingScreen text="Cargando proyecto..."/>;
    if (!singleProject) return <NotFoundScreen />;

    const project = singleProject;
    const isSencillo = new URLSearchParams(window.location.search).get('modo') === 'sencillo' || project.modo === 'sencillo';

    const save = async (updated) => {
      if (!updated.importantFiles) {
        updated.importantFiles = [
          { id:'if_guion', label:'Guión', files:[] },
          { id:'if_storyboard', label:'StoryBoard', files:[] },
          { id:'if_plan', label:'Plan de rodaje', files:[] }
        ];
      }
      setSingleProject(updated);
      await fb().saveProject(updated);
    };

    if (isSencillo) {
      return <RodajeSencilloShell
        project={project} save={save}
        view={view} setView={setView}
        activeDayId={activeDayId} setActiveDayId={setActiveDayId}
        activeSceneId={activeSceneId} setActiveSceneId={setActiveSceneId}
        activeDeptKey={activeDeptKey} setActiveDeptKey={setActiveDeptKey}
        isAdmin={isAdmin} setIsAdmin={setIsAdmin}
        showPin={showPin} setShowPin={setShowPin}
        theme={theme} setTheme={setTheme}
      />;
    }

    return <ProjectAppShell
      project={project} save={save}
      view={view} setView={setView}
      activeDayId={activeDayId} setActiveDayId={setActiveDayId}
      activeSceneId={activeSceneId} setActiveSceneId={setActiveSceneId}
      activeDeptKey={activeDeptKey} setActiveDeptKey={setActiveDeptKey}
      isAdmin={isAdmin} setIsAdmin={setIsAdmin}
      showPin={showPin} setShowPin={setShowPin}
      theme={theme} setTheme={setTheme}
    />;
  }

  // 2) Hay ?productora= → flujo de productora
  if (urlProductoraId) {
    // Si todavía no se desbloqueó, mostrar gate
    if (!productora || productora.id !== urlProductoraId) {
      return <ProductoraGateView
        productoraId={urlProductoraId}
        onUnlocked={(p) => setProductora(p)}
        onBack={() => { window.location.href = window.location.origin + window.location.pathname; }}
      />;
    }

    // Si está creando proyecto nuevo
    if (showSelectProjectType) {
      // Ir directamente a proyecto complejo, sin mostrar selección
      return <NewProjectView
        productoraId={productora.id}
        existingIds={productoraProjects.map(p => p.id)}
        onCreated={async (proj) => {
          await fb().saveProject({ ...proj, productoraId: productora.id });
          setShowSelectProjectType(false);
          window.location.href = buildProjectUrl(proj.id);
        }}
        onCancel={() => {
          setShowSelectProjectType(false);
        }}
      />;
    }

    if (showNewProject) {
      // Default: proyecto complejo
      return <NewProjectView
        productoraId={productora.id}
        existingIds={productoraProjects.map(p => p.id)}
        onCreated={async (proj) => {
          await fb().saveProject({ ...proj, productoraId: productora.id });
          setShowNewProject(false);
          setSelectedProjectType(null);
          window.location.href = buildProjectUrl(proj.id);
        }}
        onCancel={() => {
          setShowNewProject(false);
          setSelectedProjectType(null);
        }}
      />;
    }

    // Hub de la productora con sus proyectos
    if (!productoraProjectsLoaded) return <LoadingScreen text="Cargando proyectos..."/>;

    const deleteProject = async (projId) => {
      await fb().deleteProject(projId);
    };

    return <ProductoraHubView
      productora={productora}
      projects={productoraProjects}
      onCreateProject={() => setShowSelectProjectType(true)}
      onOpenProject={(id) => { window.location.href = buildProjectUrl(id); }}
      onDeleteProject={deleteProject}
      onLogout={() => { setProductora(null); window.location.href = window.location.origin + window.location.pathname; }}
      onUpdateProductora={async (updated) => { setProductora(updated); await fb().saveProductora(updated); }}
    />;
  }

  // 3) ?new=sencillo → formulario de nuevo rodaje sencillo
  if (urlNewSencillo) {
    return <NewRodajeSencilloView
      onCreated={(proj) => {
        fb().saveProject(proj).then(() => {
          window.location.href = buildProjectUrl(proj.id) + '&modo=sencillo';
        });
      }}
      onCancel={() => { window.location.href = window.location.origin + window.location.pathname; }}
    />;
  }

  // 4) Sin params → Landing
  if (showNewProductora) {
    return <NewProductoraView
      onCreated={(prod) => {
        setShowNewProductora(false);
        window.location.href = buildProductoraUrl(prod.id);
      }}
      onCancel={() => setShowNewProductora(false)}
    />;
  }

  return <LandingView
    onEnterProductora={(id) => { window.location.href = buildProductoraUrl(id); }}
    onCreateProductora={() => setShowNewProductora(true)}
    onOpenDemo={() => { window.location.href = buildProjectUrl(SEED_PROJECT.id); }}
  />;
}

// ═══════════════════════════════════════════════════════════
//  PROJECT APP SHELL — wrapper del proyecto activo (extraído de App)
// ═══════════════════════════════════════════════════════════
function ProjectAppShell({ project, save, view, setView, activeDayId, setActiveDayId, activeSceneId, setActiveSceneId, activeDeptKey, setActiveDeptKey, isAdmin, setIsAdmin, showPin, setShowPin, theme, setTheme }) {

  const activeDay      = project?.days?.find(d=>d.id===activeDayId);
  const activeDayIndex = project?.days?.findIndex(d=>d.id===activeDayId) ?? 0;
  const activeScene    = activeDay?.scenes.find(s=>s.id===activeSceneId);

  const toggleScene = (dayId, sceneId) => {
    save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{
      ...d, scenes: d.scenes.map(s=>s.id!==sceneId?s:{...s,done:!s.done})
    })});
  };

  const addScene = (dayId, title, momento='sin definir', customNum=null) => {
    // Calcular número global de escena (suma todas las escenas de todos los días)
    const totalScenes = project.days.reduce((sum, d) => sum + d.scenes.length, 0);
    const sceneNum = totalScenes + 1;
    const num = customNum || `esc ${String(sceneNum).padStart(2,'0')}`;
    const scene = { id:'s_'+uid(), num, title, done:false, depts:[], notes:'', momento };
    save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{...d,scenes:[...d.scenes,scene]})});
  };

  const deleteScene = (dayId, sceneId) => {
    save({ ...project, days: project.days.map(d=>d.id!==dayId?d:{...d,scenes:d.scenes.filter(s=>s.id!==sceneId)})});
  };

  const updateScene = (dayId, updatedScene) => {
    save({ ...project, days: project.days.map(d => d.id!==dayId ? d : {
      ...d, scenes: d.scenes.map(s => s.id!==updatedScene.id ? s : updatedScene)
    })});
  };
  
  // Editar nombre de la escena
  const editSceneName = (dayId, sceneId, newName) => {
    save({ ...project, days: project.days.map(d => d.id!==dayId ? d : {
      ...d, scenes: d.scenes.map(s => s.id!==sceneId ? s : { ...s, num: newName })
    })});
  };

  const selectSceneFromDept = (scene) => {
    const day = project.days.find(d => d.scenes.some(s => s.id === scene.id));
    if (!day) return;
    setActiveDayId(day.id);
    setActiveSceneId(scene.id);
    setView('scene');
  };

  // Borrar este proyecto y volver al inicio
  const deleteProject = async () => {
    await fb().deleteProject(project.id);
    // Si tenía productora, volver a su hub; si no, al landing
    if (project.productoraId) {
      window.location.href = buildProductoraUrl(project.productoraId);
    } else {
      window.location.href = window.location.origin + window.location.pathname;
    }
  };

  // Ir a "crear proyecto" desde dentro de un proyecto
  const handleNewProject = () => {
    if (project.productoraId) {
      window.location.href = buildProductoraUrl(project.productoraId);
    } else {
      window.location.href = window.location.origin + window.location.pathname;
    }
  };

  if (view==='export') return <ExportView project={project} onBack={()=>setView('home')} onDelete={deleteProject}/>;

  return (
    <div style={{ maxWidth:'var(--app-max-width)', margin:'0 auto', minHeight:'100vh', background:'var(--bg-primary)', position:'relative' }}>
      {view==='home' && project && (
        <HomeView
          project={project} isAdmin={isAdmin} theme={theme} setTheme={setTheme}
          onSelectDay={id=>{ setActiveDayId(id); setView('day'); }}
          onUnlock={()=>setShowPin(true)} onLock={()=>setIsAdmin(false)}
          onExport={()=>setView('export')} onNewProject={handleNewProject}
          onUpdateProject={save} onSelectDept={k=>{ setActiveDeptKey(k); setView('dept'); }}
          onOpenMessages={()=>setView('messages')}
          onOpenCitaciones={()=>setView('citaciones')}
          onOpenScouting={()=>setView('scouting')}
        />
      )}
      {view==='scouting' && project && (
        <ScoutingView project={project} onBack={()=>setView('home')}/>
      )}
      {view==='day' && activeDay && (
        <DayView
          day={activeDay} dayIndex={activeDayIndex} depts={project.depts} isAdmin={isAdmin}
          onBack={()=>setView('home')} onSelectScene={scene=>{ setActiveSceneId(scene.id); setView('scene'); }}
          onToggleScene={sceneId=>toggleScene(activeDayId, sceneId)}
          onAddScene={addScene} onDeleteScene={deleteScene} onEditSceneName={editSceneName}
        />
      )}
      {view==='messages'    && <MessagesView project={project} onBack={()=>setView('home')}/>}
      {view==='citaciones'  && <CitacionesGlobalesView project={project} onBack={()=>setView('home')}/>}
      {view==='dept' && activeDeptKey && project.depts[activeDeptKey] && (
        <DeptDetailView
          deptKey={activeDeptKey} deptMeta={project.depts[activeDeptKey]}
          isAdmin={isAdmin} onBack={()=>setView('home')} projectId={project.id}
          project={project} onSelectSceneFromDept={selectSceneFromDept}
          onUpdateProject={save}
        />
      )}
      {view==='scene' && activeScene && (
        <SceneView
          scene={activeScene} depts={project.depts} isAdmin={isAdmin}
          onBack={()=>setView('day')} onToggleDone={()=>toggleScene(activeDayId, activeSceneId)}
          onUpdateScene={(updated)=>updateScene(activeDayId, updated)}
          projectId={project.id}
          onOpenLocaciones={project.depts['locaciones'] ? ()=>{ setActiveDeptKey('locaciones'); setView('dept'); } : null}
        />
      )}
      {showPin && (
        <PinModal title="Acceso Admin" subtitle="Ingresá el PIN del proyecto"
          correctPin={project.pin}
          onSuccess={()=>{ setIsAdmin(true); setShowPin(false); }}
          onCancel={()=>setShowPin(false)}
        />
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      console.log('[App] SW registrado:', reg.scope);

      // Cuando hay una nueva versión disponible, avisar al usuario
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Hay nueva versión — mostrar banner de actualización
            const banner = document.createElement('div');
            banner.innerHTML = `
              <div style="
                position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
                background:rgba(255,255,255,0.9); color:#005a72; 
                padding:12px 20px; 
                font-family:'Inter',sans-serif; font-size:13px; font-weight:700;
                box-shadow: 4px 4px 0px rgba(0,0,0,0.4);
                z-index:99999; display:flex; align-items:center; gap:12px;
                letter-spacing:0.02em;
              ">
                ✦ NUEVA VERSIÓN DISPONIBLE
                <button onclick="window.location.reload()" style="
                  background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.8); border:none;
                  padding:6px 14px; font-family:'Inter',sans-serif;
                  font-size:12px; font-weight:900; cursor:pointer;
                  letter-spacing:0.05em;
                ">ACTUALIZAR</button>
              </div>
            `;
            document.body.appendChild(banner);
          }
        });
      });

      // Escuchar mensajes del SW (sync disponible, etc.)
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data?.type === 'SYNC_AVAILABLE') {
          console.log('[App] Conexión restaurada — sincronizando con Firebase...');
        }
      });

    } catch (err) {
      console.log('[App] SW no disponible:', err.message);
    }
  });

  // Detectar cambios de conectividad y registrar sync
  window.addEventListener('online', async () => {
    console.log('[App] Conexión restaurada');
    try {
      const reg = await navigator.serviceWorker.ready;
      await reg.sync.register('sync-data');
    } catch {}
  });

  window.addEventListener('offline', () => {
    console.log('[App] Sin conexión — usando caché local');
  });
}
</script>
