              <div style={{ background:'#e8f8f0', borderRadius:10, padding:'12px 14px', border:'1px solid #0fa87e22' }}>
                <div style={{ fontSize:10, color:'#0fa87e', fontFamily:'inherit', marginBottom:4, letterSpacing:'0.05em', fontWeight:600 }}>ENTREGADO</div>
                <div style={{ fontSize:15, fontWeight:700, color:'#0fa87e', fontFamily:'inherit' }}>{gs(dineroEntregado || 0)}</div>
              </div>
            </div>

            {/* Fila 2: Gastos Producción + Otros Depts */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 }}>
              <div style={{ background:'var(--bg-primary)', borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:10, color:'var(--text-tertiary)', fontFamily:'inherit', marginBottom:4, letterSpacing:'0.05em', fontWeight:600 }}>GASTOS PRODUCCIÓN</div>
                <div style={{ fontSize:15, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{gs(totalPresup)}</div>
              </div>
              <div style={{ background:'var(--bg-primary)', borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:10, color:'var(--text-tertiary)', fontFamily:'inherit', marginBottom:4, letterSpacing:'0.05em', fontWeight:600 }}>OTROS DEPTS</div>
                <div style={{ fontSize:15, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>
                  {gs(Object.values(gastosDepts).reduce((acc, gastos) => 
                    acc + gastos.reduce((a, g) => a + (g.presupuestado || 0), 0), 0
                  ))}
                </div>
              </div>
            </div>

            {/* Fila 3: Falta cobrar */}
            {dineroEntregado != null && (
              <div style={{ background:'#fff8ec', borderRadius:10, padding:'12px 14px', border:'1px solid #d48c0e22', marginBottom:12 }}>
                <div style={{ fontSize:10, color:'#d48c0e', fontFamily:'inherit', marginBottom:4, letterSpacing:'0.05em', fontWeight:600 }}>⏳ FALTA POR COBRAR</div>
                <div style={{ fontSize:15, fontWeight:700, color:'#d48c0e', fontFamily:'inherit' }}>{gs(Math.max(0, presupGeneral - dineroEntregado))}</div>
              </div>
            )}

            {/* Fila Final: Ganancia Total */}
            {(() => {
              const gastosTotal = totalPresup + Object.values(gastosDepts).reduce((acc, gastos) => 
                acc + gastos.reduce((a, g) => a + (g.presupuestado || 0), 0), 0
              );
              const ganancia = (dineroEntregado || 0) - gastosTotal;
              const gananciaPorciento = presupGeneral > 0 ? ((ganancia / presupGeneral) * 100).toFixed(1) : 0;
              
              return (
                <div style={{ 
                  background: ganancia >= 0 ? '#e8f8f0' : '#fff0f0', 
                  borderRadius:10, 
                  padding:'14px 16px', 
                  border: `1px solid ${ganancia >= 0 ? '#0fa87e33' : '#d94f2b33'}`,
                  textAlign:'center'
                }}>
                  <div style={{ fontSize:10, color: ganancia >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit', marginBottom:6, letterSpacing:'0.05em', fontWeight:700, textTransform:'uppercase' }}>
                    {ganancia >= 0 ? '✓ GANANCIA TOTAL' : '⚠️ PÉRDIDA TOTAL'}
                  </div>
                  <div style={{ fontSize:20, fontWeight:700, color: ganancia >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit', marginBottom:4 }}>
                    {ganancia >= 0 ? '+' : ''}{gs(ganancia)}
                  </div>
                  <div style={{ fontSize:12, color: ganancia >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit', fontWeight:600 }}>
                    {gananciaPorciento}% del presupuesto
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

function CitacionesTab({ color, deptKey, projectId, project }) {
  const [citas, setCitas] = useFirestoreList(projectId, deptKey, 'citas', []);
  const [locsDepto, setLocsDepto] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ tipo:'', hora:'', lugar:'', dia:'', notas:'' });
  const [lugarCustom, setLugarCustom] = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Cargar locaciones del depto de locaciones para el selector
  useEffect(() => {
    if (!window._fb || !projectId) return;
    return fb().onDeptData(projectId, 'locaciones', 'locs', d => setLocsDepto(d||[]));
  }, [projectId]);

  // Obtener días y locaciones existentes
  const diasExistentes = project ? project.days.map(d => d.label) : [];
  const lugaresDeLocaciones = locsDepto.map(l => l.nombre).filter(Boolean);
  const lugaresDeHistorial = [...new Set(citas.map(c => c.lugar).filter(Boolean))];
  const todosLugares = [...new Set([...lugaresDeLocaciones, ...lugaresDeHistorial])];
  const diasUnicos = [...new Set(citas.map(c => c.dia).filter(Boolean))];
  const todosDias = [...diasUnicos, ...diasExistentes].filter((v, i, a) => a.indexOf(v) === i);

  const openAdd = () => {
    setEditId(null);
    setForm({ tipo:'', hora:'', lugar:'', dia:'', notas:'' });
    setLugarCustom('');
    setShowAdd(true);
  };

  const openEdit = (c) => {
    setEditId(c.id);
    setForm({ tipo:c.tipo||'', hora:c.hora||'', lugar:c.lugar||'', dia:c.dia||'', notas:c.notas||'' });
    // Si el lugar no está en la lista conocida, lo ponemos en custom
    setLugarCustom(todosLugares.includes(c.lugar||'') ? '' : (c.lugar||''));
    setShowAdd(true);
  };

  const add = () => {
    if (!form.tipo||!form.hora) return;
    const lugarFinal = form.lugar === '__nuevo__' ? lugarCustom.trim() : form.lugar;
    const data = { ...form, lugar: lugarFinal };
    if (editId) {
      setCitas(citas.map(c => c.id===editId ? {...c,...data} : c));
    } else {
      setCitas([...citas, { id:Date.now(), ...data }]);
    }
    setForm({ tipo:'', hora:'', lugar:'', dia:'', notas:'' });
    setLugarCustom('');
    setShowAdd(false);
    setEditId(null);
  };

  const del = (id) => setCitas(citas.filter(c=>c.id!==id));

  const byDay = {};
  citas.forEach(c => { const d = c.dia||'Sin día'; (byDay[d]=byDay[d]||[]).push(c); });

  const greenShades = ['#FF006E','#FF1493','#E91E63','#EC4899','#F0388C','#FF3399','#FF5BA8','#FF7DBA','#FFA0CC'];
  const toMin = s => { if(!s) return 0; const [h,m]=(s||'0:0').split(':'); return +h*60+(+m||0); };

  // Ordenar días según el orden del proyecto, luego los sin asignar
  const projectDays = project ? project.days : [];
  const resolveDayMeta = (diaLabel) => {
    const exact = projectDays.find(d => d.label === diaLabel);
    if (exact) return { date: exact.date || '', colorIdx: projectDays.indexOf(exact) };
    const m = diaLabel.match(/d[íi]a\s*(\d+)/i);
    if (m) { const idx = parseInt(m[1])-1; if (projectDays[idx]) return { date: projectDays[idx].date||'', colorIdx: idx }; }
    return { date: '', colorIdx: projectDays.length };
  };
  const orderedEntries = Object.keys(byDay).map(diaLabel => ({
    dia: diaLabel, ...resolveDayMeta(diaLabel)
  })).sort((a,b) => a.colorIdx - b.colorIdx);

  return (
    <div>
      {orderedEntries.map(({ dia, date, colorIdx }) => {
        const cs = byDay[dia];
        if (!cs) return null;
        const diaColor = greenShades[colorIdx % greenShades.length];

        // Ordenar eventos por hora
        const sorted = [...cs].sort((a,b) => toMin(a.hora) - toMin(b.hora));

        // Rango de horas a mostrar
        const mins = sorted.map(c => toMin(c.hora)).filter(m => m > 0);
        const minH = mins.length ? Math.floor(Math.min(...mins)/60) : 7;
        const maxH = mins.length ? Math.ceil(Math.max(...mins)/60) : 20;

        // Agrupar por hora entera
        const byHour = {};
        sorted.forEach(c => {
          const h = c.hora ? String(c.hora.split(':')[0]).padStart(2,'0') : '??';
          (byHour[h] = byHour[h] || []).push(c);
        });

        const hourSlots = [];
        for (let h = minH; h <= maxH; h++) {
          hourSlots.push(String(h).padStart(2,'0'));
        }

        return (
          <div key={dia} style={{ marginBottom:28 }}>
            {/* Header de día — mismo estilo que HomeView */}
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
              <div style={{ background:diaColor, color:'#fff', borderRadius:8, padding:'5px 12px', fontSize:13, fontWeight:700, fontFamily:'inherit', letterSpacing:'0.04em' }}>
                {(date || dia).toUpperCase()}
              </div>
              {date && dia !== date && <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'inherit' }}>{dia}</div>}
              <div style={{ marginLeft:'auto', fontSize:10, color:diaColor, fontFamily:'inherit', fontWeight:700 }}>
                {cs.length} evento{cs.length!==1?'s':''}
              </div>
            </div>
            <div style={{ borderBottom:`2px solid ${diaColor}33`, marginBottom:14 }}/>

            {/* Timeline */}
            <div>
              {hourSlots.map(h => {
                const events = byHour[h] || [];
                const hasEvents = events.length > 0;
                return (
                  <div key={h} style={{ display:'flex', alignItems:'stretch', minHeight: hasEvents ? 'auto' : 26 }}>
                    {/* Hora */}
                    <div style={{ width:32, flexShrink:0, paddingTop:3, fontSize:10, color: hasEvents ? 'var(--text-secondary)' : 'var(--text-muted)', fontFamily:'inherit', fontWeight: hasEvents ? 700 : 400 }}>
                      {h}
                    </div>
                    {/* Línea vertical */}
                    <div style={{ width:1, background: hasEvents ? diaColor+'55' : 'var(--border-light)', flexShrink:0, position:'relative' }}>
                      {hasEvents && <div style={{ width:7, height:7, borderRadius:'50%', background:diaColor, position:'absolute', top:4, left:-3 }}/>}
                    </div>
                    {/* Eventos */}
                    <div style={{ flex:1, padding: hasEvents ? '2px 0 10px 12px' : '0 0 0 12px' }}>
                      {events.map(c => (
                        <div key={c.id} style={{ background:'var(--bg-secondary)', borderRadius:'0 10px 10px 0', borderLeft:`3px solid ${color}`, border:`1px solid ${color}20`, borderLeft:`3px solid ${color}`, padding:'8px 10px', marginBottom:4 }}>
                          <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                            <div style={{ flex:1 }}>
                              <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit', marginBottom:1 }}>{c.hora}</div>
                              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{c.tipo}</div>
                              {c.lugar ? <div style={{ fontSize:11, color:'var(--text-tertiary)', fontFamily:'inherit', marginTop:2 }}>📍 {c.lugar}</div> : null}
                              {c.notas ? <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'inherit', marginTop:2 }}>📝 {c.notas}</div> : null}
                            </div>
                            <div style={{ display:'flex', gap:4, flexShrink:0 }}>
                              <button onClick={()=>openEdit(c)} style={{ background:'var(--bg-card-dark-secondary)', border:'none', borderRadius:7, color:'var(--text-tertiary)', fontSize:12, cursor:'pointer', padding:'3px 7px' }}>✎</button>
                              <button onClick={()=>del(c.id)} style={{ background:'var(--bg-error)', border:'none', borderRadius:7, color:'var(--color-primary)', fontSize:12, cursor:'pointer', padding:'3px 7px' }}>✕</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
      {citas.length === 0 && !showAdd && <div style={{ textAlign:'center', padding:'28px 20px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin citaciones todavía</div>}
      {!showAdd
        ? <AddButton label="+ Agregar citación" color={color} onClick={openAdd}/>
        : (
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30` }}>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.08em', marginBottom:12, fontFamily:'inherit' }}>{editId?'✎ EDITAR CITACIÓN':'NUEVA CITACIÓN'}</div>
            <input value={form.tipo} onChange={e=>set('tipo',e.target.value)} placeholder="Quién (ej: Equipo técnico) *"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <div style={{ display:'flex', gap:8, marginBottom:8 }}>
              <input value={form.hora} onChange={e=>set('hora',e.target.value)} placeholder="Hora *"
                style={{ flex:1, fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              <select value={form.dia} onChange={e=>set('dia',e.target.value)}
                style={{ flex:1, fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', cursor:'pointer' }}>
                <option value="">— Día</option>
                {todosDias.map(d => <option key={d} value={d}>✓ {d}</option>)}
              </select>
            </div>
            <select value={form.lugar} onChange={e=>set('lugar',e.target.value)}
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color: form.lugar ? 'var(--text-primary)' : 'var(--text-muted)', outline:'none', marginBottom:8, cursor:'pointer' }}>
              <option value="">— Lugar / punto de encuentro</option>
              {lugaresDeLocaciones.length > 0 && (
                <optgroup label="📍 Locaciones del proyecto">
                  {lugaresDeLocaciones.map(l => <option key={'loc_'+l} value={l}>{l}</option>)}
                </optgroup>
              )}
              {lugaresDeHistorial.filter(l => !lugaresDeLocaciones.includes(l)).length > 0 && (
                <optgroup label="🕐 Lugares anteriores">
                  {lugaresDeHistorial.filter(l => !lugaresDeLocaciones.includes(l)).map(l => <option key={'his_'+l} value={l}>{l}</option>)}
                </optgroup>
              )}
              <option value="__nuevo__">✏️ Escribir nuevo lugar...</option>
            </select>
            {form.lugar === '__nuevo__' && (
              <input value={lugarCustom} onChange={e=>setLugarCustom(e.target.value)} placeholder="Escribí el lugar..."
                autoFocus
                style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:`1px solid ${color}44`, borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            )}
            <input value={form.notas} onChange={e=>set('notas',e.target.value)} placeholder="Notas adicionales"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:10 }}/>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setEditId(null); setForm({ tipo:'', hora:'', lugar:'', dia:'', notas:'' }); setLugarCustom(''); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={add} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>{editId?'Guardar cambios':'Guardar citación'}</button>
            </div>
          </div>
        )
      }
    </div>
  );
}

/* ── LocacionesTab ── */
function LocacionesTab({ color, deptKey, projectId, project }) {
  const [locs, setLocs] = useFirestoreList(projectId, deptKey, 'locs', []);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]     = useState(null);
  const [form, setForm] = useState({ nombre:'', url:'', escenas:[], notas:'', fotos:[], archivos:[], rating:0, comentarioReview:'' });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Foto en pantalla completa (visor con anotación)
  const [viewerPhoto, setViewerPhoto] = useState(null); // {locId, photo}

  // Escenas del proyecto para el dropdown
  const todasEscenas = project
    ? project.days.flatMap((d,di) => d.scenes.map(s=>({ id:s.id, label:`${s.num} — ${s.title.slice(0,25)}`, day:d.label })))
    : [];

  const toggleEscena = (scId) => {
    const curr = form.escenas || [];
    set('escenas', curr.includes(scId) ? curr.filter(x=>x!==scId) : [...curr, scId]);
  };

  const openAdd = () => {
    setEditId(null);
    setForm({ nombre:'', url:'', escenas:[], notas:'', fotos:[], archivos:[], rating:0, comentarioReview:'' });
    setShowForm(true);
  };
  const openEdit = (l) => {
    setEditId(l.id);
    // Migración hacia atrás: si la locación vieja tenía `foto` única, la incorporo a fotos[]
    const fotosBase = Array.isArray(l.fotos) ? l.fotos : [];
    const fotosMigradas = (!fotosBase.length && l.foto)
      ? [{ id: 'mig_'+l.id, data: l.foto, nombre: 'foto.jpg' }]
      : fotosBase;
    setForm({
      nombre: l.nombre||'', url: l.url||'', escenas: l.escenas||[], notas: l.notas||'',
      fotos: fotosMigradas,
      archivos: Array.isArray(l.archivos) ? l.archivos : [],
      rating: l.rating||0, comentarioReview: l.comentarioReview||''
    });
    setShowForm(true);
  };
  const save = () => {
    if (!form.nombre) return;
    if (editId) {
      setLocs(locs.map(l => {
        if (l.id !== editId) return l;
        const { foto, ...rest } = l; // descartar campo legacy
        return { ...rest, ...form };
      }));
    } else {
      setLocs([...locs, { id:Date.now(), ...form, estado:'pendiente' }]);
    }
    setShowForm(false); setEditId(null);
  };
  const del        = (id) => setLocs(locs.filter(l=>l.id!==id));
  const toggleOk   = (id) => setLocs(locs.map(l=>l.id===id?{...l,estado:l.estado==='confirmada'?'pendiente':'confirmada'}:l));

  // Helpers para fotos en la tarjeta (vista, no en form)
  const getFotosDe = (l) => {
    const arr = Array.isArray(l.fotos) ? l.fotos : [];
    if (!arr.length && l.foto) return [{ id:'mig_'+l.id, data:l.foto, nombre:'foto.jpg' }];
    return arr;
  };
  const getArchivosDe = (l) => Array.isArray(l.archivos) ? l.archivos : [];

  // Reemplazar una foto puntual de una locación (al guardar anotación)
  const replaceFotoEnLocacion = (locId, photoId, newDataUrl) => {
    setLocs(locs.map(l => {
      if (l.id !== locId) return l;
      const fotosBase = Array.isArray(l.fotos) ? l.fotos : (l.foto ? [{ id:'mig_'+l.id, data:l.foto, nombre:'foto.jpg' }] : []);
      const newFotos = fotosBase.map(f => f.id === photoId ? { ...f, data: newDataUrl } : f);
      const { foto, ...rest } = l;
      return { ...rest, fotos: newFotos };
    }));
  };

  return (
    <div>
      <SectionLabel>LOCACIONES — {locs.length} cargadas</SectionLabel>

      {locs.map(l=>{
        const escenaLabels = (l.escenas||[]).map(scId => todasEscenas.find(x=>x.id===scId)?.label?.split('—')[0]?.trim()).filter(Boolean);
        const fotosCard = getFotosDe(l);
        const archivosCard = getArchivosDe(l);
        return (
          <div key={l.id} style={{ background:'var(--bg-secondary)', borderRadius:14, border:`1px solid ${color}20`, marginBottom:12, overflow:'hidden' }}>
            <div style={{ padding:'12px 14px' }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{l.nombre}</div>
                  {(l.rating > 0) && (
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:3 }}>
                      <div style={{ display:'flex', gap:1 }}>
                        {[1,2,3,4,5].map(n => (
                          <span key={n} style={{ fontSize:13, color: n <= l.rating ? '#f5a623' : '#e5e2dd', lineHeight:1 }}>★</span>
                        ))}
                      </div>
                      <span style={{ fontSize:11, color:'var(--text-tertiary)', fontFamily:'inherit', fontWeight:700 }}>{l.rating}/5</span>
                    </div>
                  )}
                  {escenaLabels.length > 0 && (
                    <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginTop:4 }}>
                      {escenaLabels.map((lb,i)=>(
                        <span key={i} style={{ fontSize:10, padding:'2px 7px', borderRadius:8, background:color+'15', color, fontFamily:'inherit' }}>{lb}</span>
                      ))}
                    </div>
                  )}
                  {l.url && <a href={l.url} target="_blank" rel="noreferrer" style={{ fontSize:11, color, fontFamily:'inherit', display:'block', marginTop:4 }}>🔗 Ver en Maps</a>}
                  {l.notas && <div style={{ fontSize:13.75, color:'var(--text-tertiary)', fontFamily:'inherit', marginTop:4 }}>📝 {l.notas}</div>}
                  {l.comentarioReview && <div style={{ fontSize:11, color:'#666', fontFamily:'inherit', marginTop:6, background:'var(--bg-card-dark)', borderRadius:8, padding:'7px 10px', border:'1px solid var(--border-light)', lineHeight:1.4, fontStyle:'italic' }}>“{l.comentarioReview}”</div>}
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:6, alignItems:'flex-end', flexShrink:0 }}>
                  <div onClick={()=>toggleOk(l.id)} style={{ fontSize:10, fontWeight:700, padding:'4px 10px', borderRadius:10, cursor:'pointer', fontFamily:'inherit',
                    background:l.estado==='confirmada'?'#e8f8f0':'#fff8ec',
                    color:l.estado==='confirmada'?'#0fa87e':'#d48c0e',
                    border:`1px solid ${l.estado==='confirmada'?'#0fa87e44':'#d48c0e44'}`,
                  }}>{l.estado==='confirmada'?'✓ OK':'PEND.'}</div>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={()=>openEdit(l)} style={{ background:'var(--bg-card-dark-secondary)', border:'none', borderRadius:8, color:'var(--text-tertiary)', fontSize:13, cursor:'pointer', padding:'4px 8px' }}>✎</button>
                    <button onClick={()=>del(l.id)} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:13, cursor:'pointer', padding:'4px 8px' }}>✕</button>
                  </div>
                </div>
              </div>

              {/* Grid de fotos — tap para abrir visor con anotación */}
              {fotosCard.length > 0 && (
                <div style={{ marginTop:12 }}>
                  <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:6, fontFamily:'inherit' }}>📷 FOTOS ({fotosCard.length}) · TOCAR PARA DIBUJAR</div>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
                    {fotosCard.map(f => (
                      <div key={f.id} onClick={()=>setViewerPhoto({ locId:l.id, photo:f })} style={{ position:'relative', paddingTop:'75%', background:'var(--bg-card-dark-secondary)', borderRadius:8, overflow:'hidden', cursor:'pointer' }}>
                        <img src={f.data} alt={f.nombre||''} style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }}/>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Archivos adjuntos */}
              {archivosCard.length > 0 && (
                <div style={{ marginTop:12 }}>
                  <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:6, fontFamily:'inherit' }}>📎 ARCHIVOS ({archivosCard.length})</div>
                  <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                    {archivosCard.map(a => (
                      <a key={a.id} href={a.data} download={a.nombre} style={{ display:'flex', alignItems:'center', gap:8, background:'var(--bg-card-dark)', borderRadius:8, padding:'7px 10px', border:'1px solid var(--border-light)', textDecoration:'none' }}>
                        {a.tipo === 'imagen'
                          ? <img src={a.data} alt={a.nombre} style={{ width:28, height:28, borderRadius:5, objectFit:'cover', flexShrink:0 }}/>
                          : <span style={{ fontSize:18 }}>📄</span>
                        }
                        <span style={{ flex:1, minWidth:0, fontSize:11, color:'var(--text-secondary)', fontFamily:'inherit', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{a.nombre}</span>
                      </a>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })}

      {locs.length===0 && !showForm && <div style={{ textAlign:'center', padding:'28px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin locaciones cargadas todavía</div>}

      {!showForm
        ? <AddButton label="+ Agregar locación" color={color} onClick={openAdd}/>
        : (
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30` }}>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.08em', marginBottom:12, fontFamily:'inherit' }}>{editId?'✎ EDITAR LOCACIÓN':'NUEVA LOCACIÓN'}</div>
            <input value={form.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Nombre del lugar *"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <input value={form.url} onChange={e=>set('url',e.target.value)} placeholder="Link Google Maps"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <input value={form.notas} onChange={e=>set('notas',e.target.value)} placeholder="Notas (acceso, permisos...)"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:10 }}/>

            {/* Fotos múltiples */}
            <div style={{ marginBottom:12 }}>
              <MultiPhotoUploader fotos={form.fotos||[]} setFotos={(arr)=>set('fotos', arr)} color={color} label="Fotos del lugar" max={24}/>
            </div>

            {/* Archivos adjuntos (planos, permisos, etc.) */}
            <div style={{ marginBottom:12 }}>
              <FilesUploader files={form.archivos||[]} setFiles={(arr)=>set('archivos', arr)} color={color} label="Archivos del lugar"/>
            </div>

            {/* Selección de escenas */}
            {todasEscenas.length > 0 && (
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:8, fontFamily:'inherit' }}>ESCENAS DE ESTA LOCACIÓN</div>
                <div style={{ display:'flex', flexDirection:'column', gap:4, maxHeight:160, overflowY:'auto' }}>
                  {todasEscenas.map(sc=>{
                    const sel = (form.escenas||[]).includes(sc.id);
                    return (
                      <div key={sc.id} onClick={()=>toggleEscena(sc.id)} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px', borderRadius:8, cursor:'pointer', background:sel?color+'12':'#faf8f5', border:`1px solid ${sel?color+'44':'#e5e2dd'}` }}>
                        <div style={{ width:16, height:16, borderRadius:4, background:sel?color:'transparent', border:sel?'none':`2px solid ${color}66`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                          {sel && <span style={{ color:'#fff', fontSize:10, fontWeight:700 }}>✓</span>}
                        </div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:11, color:'var(--text-secondary)', fontFamily:'inherit' }}>{sc.label}</div>
                          <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit' }}>{sc.day}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Reseña: rating con estrellas + comentario */}
            <div style={{ background:'var(--bg-card-dark)', borderRadius:12, padding:'12px 14px', border:'1px solid var(--border-light)', marginBottom:12 }}>
              <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:8, fontFamily:'inherit' }}>⭐ RESEÑA DE LA LOCACIÓN</div>
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:10 }}>
                <StarRating value={form.rating||0} onChange={(n)=>set('rating', n)}/>
                <span style={{ fontSize:12, color:'var(--text-tertiary)', fontFamily:'inherit' }}>{form.rating ? `${form.rating}/5` : 'Sin puntuar'}</span>
              </div>
              <textarea value={form.comentarioReview||''} onChange={e=>set('comentarioReview', e.target.value)}
                placeholder="Comentarios sobre esta locación (review)…" rows={3}
                style={{ width:'100%', fontFamily:'inherit', fontSize:12, background:'var(--bg-secondary)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'vertical', lineHeight:1.5 }}/>
            </div>

            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={save} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>{editId?'Guardar cambios':'Guardar locación'}</button>
            </div>
          </div>
        )
      }

      {/* Visor de foto con anotación */}
      {viewerPhoto && (
        <PhotoAnnotatorModal
          photo={viewerPhoto.photo}
          onClose={()=>setViewerPhoto(null)}
          onSave={(newDataUrl)=>{
            replaceFotoEnLocacion(viewerPhoto.locId, viewerPhoto.photo.id, newDataUrl);
            setViewerPhoto(null);
          }}
        />
      )}
    </div>
  );
}
/* ── ChecklistTab ── */
function ChecklistTab({ color, deptKey, projectId, project }) {
  const [items, setItems] = useFirestoreList(projectId, deptKey, 'checklist', []);
  const [texto, setTexto]   = useState('');
  const [escenas, setEscenas] = useState([]); // múltiples escenas por ítem
  const [showAdd, setShowAdd] = useState(false);
  const [filterEstado,  setFilterEstado]  = useState('todos');
  const [filterEscena, setFilterEscena] = useState('todas');

  const todasEscenas = project
    ? project.days.flatMap(d => d.scenes.map(s => ({ id: s.id, label: `${s.num} — ${s.title.slice(0,30)}` })))
    : [];

  const toggleEscenaForm = (id) => setEscenas(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);

  const add = () => {
    if (!texto.trim()) return;
    setItems([{ id:Date.now(), texto:texto.trim(), done:false, escenas: escenas.length ? escenas : ['general'], ts:Date.now() }, ...items]);
    setTexto(''); setEscenas([]); setShowAdd(false);
  };
  const toggle = (id) => setItems(items.map(i=>i.id===id?{...i,done:!i.done}:i));
  const del    = (id) => setItems(items.filter(i=>i.id!==id));

  const fmtTs = (ts) => {
    if (!ts) return null;
    const d = new Date(ts);
    return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  };

  const done = items.filter(i=>i.done).length;
  const pct  = items.length ? done/items.length : 0;

  // Filtrado: un ítem se muestra si alguna de sus escenas coincide con el filtro
  const visible = items.filter(i => {
    const estadoOk = filterEstado==='pendientes'?!i.done : filterEstado==='listos'?i.done : true;
    if (!estadoOk) return false;
    if (filterEscena==='todas') return true;
    const itemEscenas = i.escenas || (i.escena ? [i.escena] : ['general']);
    return itemEscenas.includes(filterEscena);
  });

  return (
    <div>
      <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'14px 16px', border:'1px solid var(--border-light)', marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <div style={{ fontFamily:'inherit', fontSize:13, color:'var(--text-primary)', fontWeight:700 }}>{done} / {items.length} completados</div>
          <div style={{ fontFamily:'inherit', fontSize:16, fontWeight:700, color }}>{Math.round(pct*100)}%</div>
        </div>
        <div style={{ height:6, background:'var(--bg-card-dark-secondary)', borderRadius:3, overflow:'hidden' }}>
          <div style={{ width:`${pct*100}%`, height:'100%', background:color, borderRadius:3, transition:'width 0.4s' }}/>
        </div>
      </div>

      <div style={{ display:'flex', gap:6, marginBottom:8 }}>
        {[['todos','TODOS'],['pendientes','PEND.'],['listos','LISTOS']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilterEstado(k)} style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, letterSpacing:'0.05em', padding:'5px 12px', borderRadius:20, cursor:'pointer', border:'none', background:filterEstado===k?color:'#f0ede8', color:filterEstado===k?'#fff':'#999' }}>{l}</button>
        ))}
      </div>

      {todasEscenas.length > 0 && (
        <select value={filterEscena} onChange={e=>setFilterEscena(e.target.value)}
          style={{ width:'100%', fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'8px 12px', color:'var(--text-secondary)', outline:'none', marginBottom:14 }}>
          <option value="todas">📋 Todas las escenas</option>
          <option value="general">🗂 General</option>
          {todasEscenas.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
      )}

      {visible.length===0 && <div style={{ textAlign:'center', padding:'24px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>{filterEstado==='pendientes'?'¡Todo listo!':'Sin ítems.'}</div>}
      {visible.map(item => {
        const itemEscenas = item.escenas || (item.escena ? [item.escena] : ['general']);
        const escenaLabels = itemEscenas.filter(x=>x!=='general').map(id=>todasEscenas.find(s=>s.id===id)?.label).filter(Boolean);
        return (
          <div key={item.id} style={{ display:'flex', alignItems:'flex-start', gap:12, background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:item.done?'1px solid #ede9e3':`1px solid ${color}25`, opacity:item.done?0.55:1 }}>
            <div onClick={()=>toggle(item.id)} style={{ width:24, height:24, borderRadius:7, flexShrink:0, cursor:'pointer', marginTop:1, background:item.done?color:'var(--bg-card-dark)', border:item.done?'none':`2px solid ${color}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
              {item.done && <span style={{ color:'#fff', fontSize:13, fontWeight:700 }}>✓</span>}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, color:item.done?'var(--text-muted)':'var(--text-primary)', fontFamily:'inherit', textDecoration:item.done?'line-through':'none' }}>{item.texto}</div>
              {escenaLabels.length > 0 && (
                <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginTop:4 }}>
                  {escenaLabels.map((lb,i)=><span key={i} style={{ fontSize:10, color, background:color+'15', borderRadius:6, padding:'1px 6px', fontFamily:'inherit' }}>🎬 {lb}</span>)}
                </div>
              )}
              {item.ts && <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit', marginTop:3 }}>🕐 {fmtTs(item.ts)}</div>}
            </div>
            <button onClick={()=>del(item.id)} style={{ background:'none', border:'none', color:'#e5e2dd', fontSize:16, cursor:'pointer', padding:0, flexShrink:0 }}>✕</button>
          </div>
        );
      })}

      {!showAdd
        ? <button onClick={()=>setShowAdd(true)} style={{ width:'100%', fontFamily:'inherit', fontSize:13, fontWeight:700, color:'#fff', background:color, border:'none', borderRadius:14, padding:'14px', cursor:'pointer', marginTop:4 }}>+ Agregar ítem</button>
        : (
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30`, marginTop:4 }}>
            <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Descripción del ítem..." rows={2} autoFocus
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'none', marginBottom:10 }}/>
            {todasEscenas.length > 0 && (
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:6, fontFamily:'inherit' }}>ESCENAS (puede ser más de una)</div>
                <div style={{ maxHeight:140, overflowY:'auto', display:'flex', flexDirection:'column', gap:4 }}>
                  {todasEscenas.map(s=>{
                    const sel = escenas.includes(s.id);
                    return (
                      <div key={s.id} onClick={()=>toggleEscenaForm(s.id)} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:8, cursor:'pointer', background:sel?color+'12':'#faf8f5', border:`1px solid ${sel?color+'44':'#e5e2dd'}` }}>
                        <div style={{ width:16, height:16, borderRadius:4, background:sel?color:'transparent', border:sel?'none':`2px solid ${color}66`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                          {sel && <span style={{ color:'#fff', fontSize:10, fontWeight:700 }}>✓</span>}
                        </div>
                        <span style={{ fontSize:11, color:'var(--text-secondary)', fontFamily:'inherit' }}>{s.label}</span>
                      </div>
                    );
                  })}
                </div>
                {escenas.length===0 && <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit', marginTop:4 }}>Sin escena = ítem general del depto</div>}
              </div>
            )}
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setTexto(''); setEscenas([]); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={add} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Agregar</button>
            </div>
          </div>
        )
      }
    </div>
  );
}
/* ── PedidosTab ── */
function PedidosTab({ color, projectId }) {
  const [items, setItems] = useFirestoreList(projectId, 'general', 'pedidos', []);
  const [texto, setTexto] = useState('');
  const [de, setDe]       = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [filter, setFilter]   = useState('todos');

  const add = () => {
    if (!texto.trim()) return;
    setItems([{ id:Date.now(), texto:texto.trim(), de:de.trim()||'Sin especificar', done:false, ts:Date.now() }, ...items]);
    setTexto(''); setDe(''); setShowAdd(false);
  };
  const toggle = (id) => setItems(items.map(i=>i.id===id?{...i,done:!i.done}:i));
  const del    = (id) => setItems(items.filter(i=>i.id!==id));

  const pending = items.filter(i=>!i.done).length;
  const done    = items.filter(i=>i.done).length;
  const visible = items.filter(i=>filter==='pendientes'?!i.done:filter==='listos'?i.done:true);
  const fmt = (ts) => {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  };

  return (
    <div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:20 }}>
        {[{l:'Total',v:items.length,c:'#1a1714'},{l:'Pendientes',v:pending,c:'#d48c0e'},{l:'Listos',v:done,c:'#0fa87e'}].map((s,i)=>(
          <div key={i} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', border:'1px solid var(--border-light)', textAlign:'center' }}>
            <div style={{ fontSize:22, fontWeight:700, color:s.c, fontFamily:'inherit' }}>{s.v}</div>
            <div style={{ fontSize:10, color:'var(--text-muted)', letterSpacing:'0.06em', fontFamily:'inherit' }}>{s.l.toUpperCase()}</div>
          </div>
        ))}
      </div>
      <div style={{ display:'flex', gap:6, marginBottom:16 }}>
        {[['todos','TODOS'],['pendientes','PENDIENTES'],['listos','LISTOS']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, letterSpacing:'0.05em', padding:'5px 14px', borderRadius:20, cursor:'pointer', border:'none', background:filter===k?color:'#f0ede8', color:filter===k?'#fff':'#999' }}>{l}</button>
        ))}
      </div>
      {visible.map(item => (
        <div key={item.id} style={{ display:'flex', alignItems:'flex-start', gap:12, background:'var(--bg-secondary)', borderRadius:14, padding:'14px', marginBottom:8, border:item.done?'1px solid #ede9e3':`1px solid ${color}25`, opacity:item.done?0.6:1 }}>
          <div onClick={()=>toggle(item.id)} style={{ width:26, height:26, borderRadius:8, flexShrink:0, cursor:'pointer', marginTop:1, background:item.done?'#0fa87e':'transparent', border:item.done?'none':`2px solid ${color}66`, display:'flex', alignItems:'center', justifyContent:'center' }}>
            {item.done && <span style={{ color:'#fff', fontSize:14, fontWeight:700 }}>✓</span>}
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:14, color:item.done?'var(--text-muted)':'var(--text-primary)', fontFamily:'inherit', lineHeight:1.4, textDecoration:item.done?'line-through':'none' }}>{item.texto}</div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:6 }}>
              <span style={{ fontSize:10, padding:'2px 8px', borderRadius:10, fontFamily:'inherit', fontWeight:700, background:color+'15', color, border:`1px solid ${color}33` }}>{item.de}</span>
              <span style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit' }}>{fmt(item.ts)}</span>
            </div>
          </div>
          <button onClick={()=>del(item.id)} style={{ background:'none', border:'none', color:'#e5e2dd', fontSize:16, cursor:'pointer', padding:0, flexShrink:0 }}>✕</button>
        </div>
      ))}
      {visible.length===0 && <div style={{ textAlign:'center', padding:'32px 20px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>{filter==='pendientes'?'¡Todo listo!':'Sin pedidos todavía.'}</div>}
      {!showAdd
        ? <button onClick={()=>setShowAdd(true)} style={{ width:'100%', fontFamily:'inherit', fontSize:13, fontWeight:700, color:'#fff', background:color, border:'none', borderRadius:14, padding:'14px', cursor:'pointer', marginTop:8, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>+ Nuevo pedido</button>
        : (
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30`, marginTop:8 }}>
            <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="¿Qué necesitás? *" rows={2}
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'none', marginBottom:8 }}/>
            <input value={de} onChange={e=>setDe(e.target.value)} placeholder="De parte de (ej: Dirección, Arte...)"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:10 }}/>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setTexto(''); setDe(''); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={add} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Agregar pedido</button>
            </div>
          </div>
        )
      }
    </div>
  );
}

function CastingPrincipales({ color, projectId, project }) {
  const [actores, setActores] = useFirestoreList(projectId, 'casting', 'principales', []);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]     = useState(null);
  const [form, setForm] = useState({ nombre:'', personaje:'', altura:'', talla:'', telefono:'', correo:'', notas:'', foto:'', escenas:[], citacion:'' });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Lista de escenas del proyecto
  const todasEscenas = project
    ? project.days.flatMap((d,di) => d.scenes.map(s=>({ id:s.id, label:`${s.num} — ${s.title.slice(0,25)}`, day:d.label })))
    : [];

  const toggleEscena = (scId) => {
    const curr = form.escenas || [];
    set('escenas', curr.includes(scId) ? curr.filter(x=>x!==scId) : [...curr, scId]);
  };

  const handleFoto = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try { set('foto', await window.compressImage(file, 800, 0.70)); }
    catch { const r = new FileReader(); r.onload = ev=>set('foto',ev.target.result); r.readAsDataURL(file); }
  };

  const openAdd = () => {
    setEditId(null);
    setForm({ nombre:'', personaje:'', altura:'', talla:'', telefono:'', correo:'', notas:'', foto:'', escenas:[], citacion:'' });
    setShowForm(true);
  };
  const openEdit = (a) => {
    setEditId(a.id);
    setForm({ nombre:a.nombre||'', personaje:a.personaje||'', altura:a.altura||'', talla:a.talla||'', telefono:a.telefono||'', correo:a.correo||'', notas:a.notas||'', foto:a.foto||'', escenas:a.escenas||[], citacion:a.citacion||'' });
    setShowForm(true);
  };
  const save = () => {
    if (!form.nombre) return;
    if (editId) {
      setActores(actores.map(a=>a.id===editId?{...a,...form}:a));
    } else {
      setActores([...actores, { id:Date.now(), ...form }]);
    }
    setShowForm(false);
  };
  const del = (id) => setActores(actores.filter(a=>a.id!==id));

  return (
    <div>
      <SectionLabel>ACTORES PRINCIPALES — {actores.length} cargados</SectionLabel>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:12 }}>
        {actores.map(a => (
          <div key={a.id} style={{ background:'var(--bg-secondary)', borderRadius:14, border:`1px solid ${color}20`, overflow:'hidden', position:'relative' }}>
            <div style={{ width:'100%', aspectRatio:'3/4', background:'var(--bg-card-dark-secondary)', overflow:'hidden' }}>
              {a.foto
                ? <img src={a.foto} alt={a.nombre} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:36 }}>🎭</div>
              }
            </div>
            <div style={{ padding:'10px 10px 12px' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit', marginBottom:2 }}>{a.nombre}</div>
              {a.personaje && <div style={{ fontSize:11, color, fontFamily:'inherit', marginBottom:4, fontStyle:'italic' }}>"{a.personaje}"</div>}
              {a.altura    && <div style={{ fontSize:11, color:'var(--text-tertiary)', fontFamily:'inherit' }}>📏 {a.altura}</div>}
              {a.talla     && <div style={{ fontSize:11, color:'var(--text-tertiary)', fontFamily:'inherit' }}>👕 {a.talla}</div>}
              {a.telefono  && <div style={{ fontSize:11, color:'var(--text-tertiary)', fontFamily:'inherit' }}>📱 {a.telefono}</div>}
              {a.citacion  && <div style={{ fontSize:11, color:color, fontFamily:'inherit', marginTop:4 }}>🕐 {a.citacion}</div>}
              {(a.escenas||[]).length > 0 && (
                <div style={{ marginTop:6 }}>
                  <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'inherit', marginBottom:3 }}>ESCENAS</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:3 }}>
                    {(a.escenas||[]).map(scId => {
                      const sc = todasEscenas.find(x=>x.id===scId);
                      return sc ? <span key={scId} style={{ fontSize:9, padding:'2px 6px', borderRadius:8, background:color+'15', color, fontFamily:'inherit' }}>{sc.label.split('—')[0].trim()}</span> : null;
                    })}
                  </div>
                </div>
              )}
            </div>
            <div style={{ position:'absolute', top:6, right:6, display:'flex', gap:4 }}>
              <button onClick={()=>openEdit(a)} style={{ width:24, height:24, borderRadius:'50%', background:'rgba(0,0,0,0.4)', border:'none', color:'#fff', fontSize:11, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>✎</button>
              <button onClick={()=>del(a.id)} style={{ width:24, height:24, borderRadius:'50%', background:'rgba(200,0,0,0.5)', border:'none', color:'#fff', fontSize:11, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
            </div>
          </div>
        ))}
      </div>

      {!showForm
        ? <AddButton label="+ Agregar actor principal" color={color} onClick={openAdd}/>
        : (
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30` }}>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.08em', marginBottom:12, fontFamily:'inherit' }}>{editId?'✎ EDITAR ACTOR':'NUEVO ACTOR PRINCIPAL'}</div>
            <div style={{ marginBottom:12 }}>
              {form.foto
                ? <div style={{ position:'relative', borderRadius:10, overflow:'hidden', maxHeight:160 }}>
                    <img src={form.foto} alt="preview" style={{ width:'100%', objectFit:'cover', maxHeight:160 }}/>
                    <button onClick={()=>set('foto','')} style={{ position:'absolute', top:6, right:6, background:'rgba(0,0,0,0.5)', border:'none', borderRadius:'50%', width:26, height:26, color:'#fff', fontSize:13, cursor:'pointer' }}>✕</button>
                  </div>
                : <label style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, background:'var(--bg-card-dark)', border:'1px dashed #ccc', borderRadius:10, padding:'16px', cursor:'pointer', fontFamily:'inherit', fontSize:12, color:'#aaa' }}>
                    📷 Foto del actor
                    <input type="file" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" onChange={handleFoto} style={{ display:'none' }}/>
