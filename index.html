function ContinuidadFotosTab({ color, deptKey, projectId }) {
  const [fotos, setFotos] = useFirestoreList(projectId, deptKey, 'continuidad_fotos', []);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ escena:'', descripcion:'', data:'' });
  const [cameraMode, setCameraMode] = useState(false);
  const fileInputRef = React.useRef(null);
  const videoRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const convertToBase64 = (file) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  };

  const handleFileSelect = async (e) => {
    const file = e.target.files?.[0];
    if (file) {
      const base64 = await convertToBase64(file);
      set('data', base64);
    }
  };

  const startCamera = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        setCameraMode(true);
      }
    } catch (err) {
      console.error('Camera access denied:', err);
      alert('No se puede acceder a la cámara');
    }
  };

  const takePhoto = () => {
    if (canvasRef.current && videoRef.current) {
      const ctx = canvasRef.current.getContext('2d');
      canvasRef.current.width = videoRef.current.videoWidth;
      canvasRef.current.height = videoRef.current.videoHeight;
      ctx.drawImage(videoRef.current, 0, 0);
      const imageData = canvasRef.current.toDataURL('image/jpeg');
      set('data', imageData);
      stopCamera();
    }
  };

  const stopCamera = () => {
    if (videoRef.current && videoRef.current.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      setCameraMode(false);
    }
  };

  const save = () => {
    if (!form.escena || !form.data) return;
    const item = { id: editId||Date.now(), ...form };
    if (editId) { setFotos(fotos.map(f=>f.id===editId?item:f)); }
    else { setFotos([...fotos, item]); }
    setForm({ escena:'', descripcion:'', data:'' }); setEditId(null); setShowAdd(false); setCameraMode(false);
  };

  const del = (id) => setFotos(fotos.filter(f=>f.id!==id));

  return (
    <div>
      <SectionLabel>FOTOS DE CONTINUIDAD — {fotos.length} fotos</SectionLabel>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
        {fotos.map(foto => (
          <div key={foto.id} style={{ position:'relative', borderRadius:12, overflow:'hidden', background:'var(--bg-secondary)', border:`1px solid ${color}20` }}>
            {foto.data && <img src={foto.data} alt="continuidad" style={{ width:'100%', height:150, objectFit:'cover' }}/>}
            <div style={{ padding:10 }}>
              <div style={{ fontSize:11, fontWeight:700, color:color, marginBottom:4 }}>📷 Escena {foto.escena}</div>
              <div style={{ fontSize:10, color:'var(--text-secondary)', marginBottom:6, minHeight:30 }}>{foto.descripcion}</div>
              <div style={{ display:'flex', gap:4 }}>
                <button onClick={()=>{ setEditId(foto.id); setForm(foto); setShowAdd(true); }} style={{ flex:1, background:'var(--bg-card-dark)', border:'none', borderRadius:6, color:'var(--text-secondary)', fontSize:11, cursor:'pointer', padding:'4px' }}>✎</button>
                <button onClick={()=>del(foto.id)} style={{ flex:1, background:'var(--bg-error)', border:'none', borderRadius:6, color:'#fff', fontSize:11, cursor:'pointer', padding:'4px' }}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {!showAdd
        ? <AddButton label="+ Agregar foto" color={color} onClick={()=>setShowAdd(true)}/>
        : (
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30` }}>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.08em', marginBottom:12, fontWeight:700 }}>{editId?'✎ EDITAR':'NUEVA FOTO'}</div>
            <input value={form.escena} onChange={e=>set('escena',e.target.value)} placeholder="Número de escena *"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            
            {!cameraMode ? (
              <div style={{ marginBottom:8 }}>
                <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                  <button onClick={()=>fileInputRef.current?.click()} style={{ flex:1, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>📁 Subir foto</button>
                  <button onClick={startCamera} style={{ flex:1, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>📷 Tomar foto</button>
                </div>
                <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileSelect} style={{ display:'none' }}/>
                {form.data && <div style={{ fontSize:10, color:'#0fa87e', fontWeight:700, marginBottom:8 }}>✓ Foto seleccionada</div>}
              </div>
            ) : (
              <div style={{ marginBottom:8 }}>
                <video ref={videoRef} autoPlay style={{ width:'100%', borderRadius:10, marginBottom:8, maxHeight:300 }}/>
                <canvas ref={canvasRef} style={{ display:'none' }}/>
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={takePhoto} style={{ flex:1, fontFamily:'inherit', fontSize:12, fontWeight:700, background:'#0fa87e', color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>📸 Tomar</button>
                  <button onClick={stopCamera} style={{ flex:1, fontFamily:'inherit', fontSize:12, fontWeight:700, background:'#888', color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar cámara</button>
                </div>
              </div>
            )}
            
            <textarea value={form.descripcion} onChange={e=>set('descripcion',e.target.value)} placeholder="Descripción"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8, minHeight:'60px' }}/>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setCameraMode(false); stopCamera(); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={save} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Guardar</button>
            </div>
          </div>
        )}
    </div>
  );
}


function CrewTotalTab({ color, projectId, project }) {
  const [allCrew, setAllCrew] = useState([]);
  const [loaded, setLoaded]   = useState(false);

  useEffect(() => {
    if (!window._fb || !project) return;
    const deptKeys = Object.keys(project.depts);
    Promise.all(
      deptKeys.map(dk =>
        fb().getDeptData(projectId, dk, 'integrantes').then(d =>
          (d||[]).map(p => ({ ...p, deptKey:dk, deptLabel:project.depts[dk]?.label||dk, deptColor:project.depts[dk]?.color||'#888', deptIcon:project.depts[dk]?.icon||'🎬' }))
        ).catch(()=>[])
      )
    ).then(results => { setAllCrew(results.flat()); setLoaded(true); });
  }, [projectId, project]);

  const exportarExcel = async () => {
    if (!window.XLSX) {
      await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    }
    const XL = window.XLSX;
    const wb = XL.utils.book_new();
    const rows = [
      [`CREW COMPLETO — ${project?.title||''}`, '', '', '', ''],
      [`Exportado: ${new Date().toLocaleDateString('es-AR')} · ${allCrew.length} integrantes`, '', '', '', ''],
      ['', '', '', '', ''],
      ['N°', 'NOMBRE Y APELLIDO', 'ROL / CARGO', 'N° CÉDULA', 'DEPARTAMENTO'],
      ...allCrew.map((p,i)=>[i+1, p.nombre||'', p.rol||'', p.cedula||'', p.deptLabel||'']),
    ];
    const ws = XL.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:4},{wch:30},{wch:25},{wch:16},{wch:20}];
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:4}},{s:{r:1,c:0},e:{r:1,c:4}}];
    const styled = (r,c,fill,font,align) => {
      const ref=XL.utils.encode_cell({r,c}); if(!ws[ref]) ws[ref]={t:'z',v:''}; ws[ref].s={};
      if(fill) ws[ref].s.fill={patternType:'solid',...fill};
      if(font) ws[ref].s.font=font; if(align) ws[ref].s.alignment=align;
    };
    for(let c=0;c<=4;c++){
      styled(0,c,{fgColor:{rgb:'D94F2B'}},{bold:true,color:{rgb:'FFFFFF'},sz:14,name:'Arial'},{horizontal:'center'});
      styled(1,c,{fgColor:{rgb:'1A1714'}},{color:{rgb:'888888'},sz:9,name:'Arial'},{horizontal:'left'});
      styled(3,c,{fgColor:{rgb:'1A1714'}},{bold:true,color:{rgb:'FFFFFF'},sz:10,name:'Arial'},{horizontal:'center'});
    }
    // Agrupar por depto para colorear
    let lastDept = ''; let rowBg = 'FFFFFF';
    allCrew.forEach((p,i) => {
      const r = 4+i;
      const bg = p.deptLabel!==lastDept ? (lastDept=p.deptLabel, rowBg=rowBg==='FFFFFF'?'F7F5F2':'FFFFFF', rowBg) : rowBg;
      const dHex = (p.deptColor||'#888888').replace('#','');
      for(let c=0;c<=4;c++) styled(r,c,{fgColor:{rgb:bg}},{color:{rgb:c===4?dHex:'333333'},sz:10,name:'Arial'},c===0?{horizontal:'center'}:{horizontal:'left'});
    });
    XL.utils.book_append_sheet(wb, ws, 'Crew Total');
    XL.writeFile(wb, `Crew_${(project?.title||'').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  // Agrupar por depto
  const byDept = {};
  allCrew.forEach(p => { (byDept[p.deptKey]=byDept[p.deptKey]||[]).push(p); });

  return (
    <div>
      <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'12px 16px', border:'1px solid var(--border-light)', marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:11, color:'#aaa', fontFamily:'inherit' }}>CREW TOTAL DEL PROYECTO</div>
          <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{allCrew.length} personas</div>
        </div>
        <button onClick={exportarExcel} disabled={!loaded||allCrew.length===0} style={{ fontFamily:'inherit', fontSize:12, fontWeight:700, color:'#217346', background:'#e8f5ee', border:'1px solid #21734633', borderRadius:12, padding:'10px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ fontSize:15 }}>📊</span> Exportar Excel
        </button>
      </div>

      {!loaded && <div style={{ textAlign:'center', padding:'32px', color:'#ccc', fontFamily:'inherit' }}>Cargando crew...</div>}

      {loaded && Object.entries(byDept).map(([dk, personas])=>{
        const dm = project?.depts?.[dk];
        if (!dm) return null;
        return (
          <div key={dk} style={{ marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, padding:'6px 0' }}>
              <span style={{ fontSize:16 }}>{dm.icon}</span>
              <span style={{ fontSize:11, fontWeight:700, color:dm.color, letterSpacing:'0.08em', fontFamily:'inherit' }}>{dm.label.toUpperCase()}</span>
              <span style={{ fontSize:10, color:'#ccc', fontFamily:'inherit' }}>— {personas.length}</span>
            </div>
            {personas.map(p=>(
              <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12, background:'var(--bg-secondary)', borderRadius:12, padding:'10px 14px', marginBottom:6, border:`1px solid ${dm.color}20` }}>
                <div style={{ width:32, height:32, borderRadius:8, background:dm.color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, flexShrink:0 }}>👤</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{p.nombre}</div>
                  <div style={{ display:'flex', gap:8, marginTop:2 }}>
                    {p.rol && <span style={{ fontSize:11, color:dm.color, fontFamily:'inherit' }}>{p.rol}</span>}
                    {p.cedula && <span style={{ fontSize:11, color:'#aaa', fontFamily:'inherit' }}>CI: {p.cedula}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      })}

      {loaded && allCrew.length===0 && (
        <div style={{ textAlign:'center', padding:'40px 20px', color:'#ccc', fontFamily:'inherit' }}>
          <div style={{ fontSize:36, marginBottom:12 }}>👥</div>
          <div>Ningún departamento cargó integrantes todavía.</div>
          <div style={{ fontSize:12, marginTop:6 }}>Cada depto puede agregar su crew en el tab 👥 CREW.</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  SCENE DEPT PANEL — lee del checklist del depto, filtrado por escena
// ═══════════════════════════════════════════════════════════
function SceneDeptPanel({ projectId, sceneId, deptKey, deptMeta, isAdmin, onClose, project }) {
  const color = deptMeta.color;
  // Abre directo en checklist de esta escena
  const [subTab, setSubTab] = useState('escena');

  const [allItems, setAllItemsRaw]       = useState([]);
  const [citas, setCitasRaw]             = useState([]);
  const [comentarios, setComentariosRaw] = useState([]);
  const [infoData, setInfoDataRaw]       = useState({});
  const [actoresPrincipales, setActoresPrincipalesRaw] = useState([]);
  const [actoresExtras, setActoresExtrasRaw]           = useState([]);

  useEffect(() => {
    if (!window._fb) return;
    const u1 = fb().onDeptData(projectId, deptKey, 'checklist', d => setAllItemsRaw(d||[]));
    const u2 = fb().onDeptData(projectId, 'scenes', `${sceneId}__${deptKey}__cita`, d => setCitasRaw(d||[]));
    const u3 = fb().onDeptData(projectId, 'scenes', `${sceneId}__${deptKey}__com`,  d => setComentariosRaw(d||[]));
    const u4 = fb().onDeptData(projectId, deptKey, 'info', d => setInfoDataRaw(Array.isArray(d)?d[0]||{}:d||{}));
    // Si es casting, cargar actores principales y extras
    const u5 = fb().onDeptData(projectId, 'casting', 'principales', d => setActoresPrincipalesRaw(d||[]));
    const u6 = fb().onDeptData(projectId, 'casting', 'extras',      d => setActoresExtrasRaw(d||[]));
    return () => { u1(); u2(); u3(); u4(); u5(); u6(); };
  }, [projectId, sceneId, deptKey]);

  const items        = allItems.filter(i => (i.escena || 'general') === sceneId);
  const generalItems = allItems.filter(i => !i.escena || i.escena === 'general');
  const doneCount    = items.filter(i=>i.done).length;

  // Actores convocados para esta escena (principales + extras)
  const principalesEscena = actoresPrincipales.filter(a => (a.escenas||[]).includes(sceneId));
  const extrasEscena      = actoresExtras.filter(a => (a.escenas||[]).includes(sceneId));
  const actoresEscena     = [...principalesEscena, ...extrasEscena];

  const setAllItems    = (v) => { setAllItemsRaw(v); fb().saveDeptData(projectId, deptKey, 'checklist', v); };
  const setCitas       = (v) => { setCitasRaw(v);    fb().saveDeptData(projectId, 'scenes', `${sceneId}__${deptKey}__cita`, v); };
  const setComentarios = (v) => { setComentariosRaw(v); fb().saveDeptData(projectId, 'scenes', `${sceneId}__${deptKey}__com`, v); };

  const toggleItem = (id) => setAllItems(allItems.map(i=>i.id===id?{...i,done:!i.done}:i));
  const delItem    = (id) => setAllItems(allItems.filter(i=>i.id!==id));

  const [texto, setTexto] = useState('');
  const [showAddCk, setShowAddCk] = useState(false);
  const addItem = () => {
    if (!texto.trim()) return;
    setAllItems([...allItems, { id:Date.now(), texto:texto.trim(), done:false, escena:sceneId, ts:Date.now() }]);
    setTexto(''); setShowAddCk(false);
  };

  const fmtTs = (ts) => {
    if (!ts) return null;
    const d = new Date(ts);
    return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  };

  const [citaForm, setCitaForm] = useState({ hora:'', lugar:'', notas:'' });
  const [showAddCita, setShowAddCita] = useState(false);
  const addCita = () => {
    if (!citaForm.hora) return;
    setCitas([...citas, { id:Date.now(), ...citaForm }]);
    setCitaForm({ hora:'', lugar:'', notas:'' }); setShowAddCita(false);
  };

  const [comTexto, setComTexto] = useState('');
  const addCom = () => {
    if (!comTexto.trim()) return;
    setComentarios([...comentarios, { id:Date.now(), texto:comTexto.trim(), ts:Date.now() }]);
    setComTexto('');
  };
  const delCom = (id) => setComentarios(comentarios.filter(c=>c.id!==id));

  const renderItem = (item) => (
    <div key={item.id} style={{ display:'flex', alignItems:'center', gap:10, background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:item.done?'1px solid #ede9e3':`1px solid ${color}25`, opacity:item.done?0.6:1 }}>
      <div onClick={()=>toggleItem(item.id)} style={{ width:22, height:22, borderRadius:6, flexShrink:0, cursor:'pointer', background:item.done?color:'var(--bg-card-dark)', border:item.done?'none':`2px solid ${color}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
        {item.done && <span style={{ color:'#fff', fontSize:12, fontWeight:700 }}>✓</span>}
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:13, color:item.done?'var(--text-muted)':'var(--text-primary)', fontFamily:'inherit', textDecoration:item.done?'line-through':'none' }}>{item.texto}</div>
        {item.ts && <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit', marginTop:2 }}>🕐 {fmtTs(item.ts)}</div>}
      </div>
      {isAdmin && <button onClick={()=>delItem(item.id)} style={{ background:'none', border:'none', color:'#e5e2dd', fontSize:15, cursor:'pointer', padding:0 }}>✕</button>}
    </div>
  );

  const subTabs = [
    ['escena', `✓ Checklist (${doneCount}/${items.length})`],
    ['info', '👤 Info'],
    ['citacion', '🕐 Citación'],
    ['notas', '💬 Notas'],
  ];
  if (deptKey === 'casting') subTabs.splice(1, 0, ['casting', `🎭 Actores (${actoresEscena.length})`]);

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center', padding:'16px' }} onClick={onClose}>
      <div style={{ background:'var(--bg-primary)', borderRadius:20, width:'100%', maxWidth:'var(--app-max-width)', maxHeight:'90vh', display:'flex', flexDirection:'column', overflow:'hidden' }} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{ background:'var(--bg-secondary)', padding:'16px 20px 14px', borderBottom:'1px solid #ede9e3' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
            <DeptAvatar photo={deptMeta.photo} icon={deptMeta.icon} color={color} size={44} borderRadius={12} fontSize={22}/>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:17, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{deptMeta.label}</div>
              <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'inherit' }}>en esta escena · {doneCount}/{items.length} completados</div>
            </div>
            <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, color:'var(--text-muted)', cursor:'pointer', padding:4, flexShrink:0 }}>✕</button>
          </div>
          <div style={{ display:'flex', gap:5, overflowX:'auto' }}>
            {subTabs.map(([k,l])=>(
              <button key={k} onClick={()=>setSubTab(k)} style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, padding:'6px 12px', borderRadius:20, cursor:'pointer', border:'none', background:subTab===k?color:'#f0ede8', color:subTab===k?'#fff':'#999', flexShrink:0 }}>{l}</button>
            ))}
          </div>
        </div>

        <div style={{ overflowY:'auto', flex:1, padding:'16px 16px 28px' }}>

          {/* CHECKLIST ESTA ESCENA — expandido por defecto */}
          {subTab==='escena' && (
            <div>
              {items.length===0 && !showAddCk && (
                <div style={{ textAlign:'center', padding:'28px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>
                  {isAdmin ? 'Agregar ítems específicos para esta escena.' : 'Sin ítems para esta escena todavía.'}
                </div>
              )}
              {items.map(renderItem)}
              {!showAddCk
                ? <button onClick={()=>setShowAddCk(true)} style={{ width:'100%', fontFamily:'inherit', fontSize:12, fontWeight:700, color:'#fff', background:color, border:'none', borderRadius:12, padding:'12px', cursor:'pointer', marginTop:4 }}>+ Agregar ítem</button>
                : <div style={{ background:'var(--bg-secondary)', borderRadius:12, padding:14, border:`1px solid ${color}30`, marginTop:4 }}>
                    <input value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Ítem del checklist..." autoFocus
                      style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
                    <div style={{ display:'flex', gap:8 }}>
                      <button onClick={()=>setShowAddCk(false)} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
                      <button onClick={addItem} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Agregar</button>
                    </div>
                  </div>
              }
              {/* General del depto también */}
              {generalItems.length > 0 && (
                <div style={{ marginTop:20 }}>
                  <div style={{ fontSize:10, color:'var(--text-muted)', letterSpacing:'0.08em', marginBottom:8, fontFamily:'inherit' }}>CHECKLIST GENERAL DEL DEPTO</div>
                  {generalItems.map(renderItem)}
                </div>
              )}
            </div>
          )}

          {/* INFO DEL DEPARTAMENTO */}
          {subTab==='info' && (
            <div>
              {infoData.responsable && (
                <div style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:`1px solid ${color}20` }}>
                  <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit', marginBottom:4 }}>RESPONSABLE</div>
                  <div style={{ fontSize:14, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>👤 {infoData.responsable}</div>
                  {infoData.contacto && <div style={{ fontSize:12, color:'var(--text-tertiary)', fontFamily:'inherit', marginTop:4 }}>📱 {infoData.contacto}</div>}
                </div>
              )}
              {infoData.notas && (
                <div style={{ background:'var(--bg-card-dark)', borderRadius:12, padding:'12px 14px', border:'1px solid #f5e8c0' }}>
                  <div style={{ fontSize:10, color:'#d48c0e', fontFamily:'inherit', marginBottom:4 }}>NOTAS</div>
                  <div style={{ fontSize:13, color:'var(--text-secondary)', fontFamily:'inherit', lineHeight:1.5 }}>{infoData.notas}</div>
                </div>
              )}
              {!infoData.responsable && !infoData.notas && (
                <div style={{ textAlign:'center', padding:'28px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin info cargada. Completala desde el depto.</div>
              )}
            </div>
          )}

          {/* CASTING — actores convocados para esta escena (principales + extras) */}
          {subTab==='casting' && (
            <div>
              {actoresEscena.length === 0
                ? <div style={{ textAlign:'center', padding:'28px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin actores asignados a esta escena todavía.</div>
                : <div>
                    {principalesEscena.length > 0 && (
                      <div style={{ marginBottom: extrasEscena.length > 0 ? 18 : 0 }}>
                        <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.08em', marginBottom:8, fontFamily:'inherit' }}>🎭 PRINCIPALES — {principalesEscena.length}</div>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                          {principalesEscena.map(a=>(
                            <div key={a.id} style={{ background:'var(--bg-secondary)', borderRadius:14, border:`1px solid ${color}20`, overflow:'hidden' }}>
                              <div style={{ width:'100%', aspectRatio:'3/4', background:'var(--bg-card-dark-secondary)', overflow:'hidden' }}>
                                {a.foto
                                  ? <img src={a.foto} alt={a.nombre} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                                  : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:32 }}>🎭</div>
                                }
                              </div>
                              <div style={{ padding:'8px 10px' }}>
                                <div style={{ fontSize:12, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{a.nombre}</div>
                                {a.personaje && <div style={{ fontSize:11, color, fontFamily:'inherit', fontStyle:'italic' }}>"{a.personaje}"</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {extrasEscena.length > 0 && (
                      <div>
                        <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.08em', marginBottom:8, fontFamily:'inherit' }}>👥 EXTRAS — {extrasEscena.length}</div>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
                          {extrasEscena.map(e=>(
                            <div key={e.id} style={{ background:'var(--bg-secondary)', borderRadius:12, border:'1px solid var(--border-light)', overflow:'hidden' }}>
                              <div style={{ width:'100%', aspectRatio:'1', background:'var(--bg-card-dark-secondary)', overflow:'hidden' }}>
                                {e.foto
                                  ? <img src={e.foto} alt={e.nombre} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                                  : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:26 }}>👤</div>
                                }
                              </div>
                              <div style={{ padding:'6px 8px' }}>
                                <div style={{ fontSize:11, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{e.nombre}</div>
                                {e.notas && <div style={{ fontSize:9, color:'#aaa', fontFamily:'inherit', marginTop:2 }}>{e.notas}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
              }
            </div>
          )}

          {/* CITACIÓN */}
          {subTab==='citacion' && (
            <div>
              {citas.map(c=>(
                <div key={c.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'14px', marginBottom:10, border:`1px solid ${color}20` }}>
                  <div style={{ fontSize:22, fontWeight:700, color, fontFamily:'inherit', marginBottom:4 }}>{c.hora}</div>
                  {c.lugar && <div style={{ fontSize:13, color:'var(--text-secondary)', fontFamily:'inherit' }}>📍 {c.lugar}</div>}
                  {c.notas && <div style={{ fontSize:12, color:'#aaa', fontFamily:'inherit', marginTop:4 }}>📝 {c.notas}</div>}
                </div>
              ))}
              {citas.length===0 && !showAddCita && <div style={{ textAlign:'center', padding:'24px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin citación para esta escena</div>}
              {isAdmin && !showAddCita && <AddButton label="+ Agregar citación" color={color} onClick={()=>setShowAddCita(true)}/>}
              {isAdmin && showAddCita && (
                <div style={{ background:'var(--bg-secondary)', borderRadius:12, padding:14, border:`1px solid ${color}30` }}>
                  <input value={citaForm.hora} onChange={e=>setCitaForm(f=>({...f,hora:e.target.value}))} placeholder="Hora *"
                    style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
                  <input value={citaForm.lugar} onChange={e=>setCitaForm(f=>({...f,lugar:e.target.value}))} placeholder="Lugar"
                    style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
                  <input value={citaForm.notas} onChange={e=>setCitaForm(f=>({...f,notas:e.target.value}))} placeholder="Notas adicionales"
                    style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:10 }}/>
                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={()=>setShowAddCita(false)} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
                    <button onClick={addCita} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Guardar</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* NOTAS */}
          {subTab==='notas' && (
            <div>
              <div style={{ background:'var(--bg-secondary)', borderRadius:12, padding:14, marginBottom:12, border:`1px solid ${color}20` }}>
                <textarea value={comTexto} onChange={e=>setComTexto(e.target.value)} placeholder="Dejá una nota para esta escena..." rows={3}
                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'none', marginBottom:8 }}/>
                <button onClick={addCom} disabled={!comTexto.trim()} style={{ width:'100%', fontFamily:'inherit', fontSize:12, fontWeight:700, background:comTexto.trim()?color:'#e5e2dd', color:comTexto.trim()?'#fff':'#bbb', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Publicar nota</button>
              </div>
              {comentarios.length===0 && <div style={{ textAlign:'center', padding:'16px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin notas todavía</div>}
              {[...comentarios].reverse().map(c=>(
                <div key={c.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:'1px solid var(--border-light)', display:'flex', gap:10 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit', lineHeight:1.5 }}>{c.texto}</div>
                    <div style={{ fontSize:10, color:'#ccc', fontFamily:'inherit', marginTop:6 }}>{new Date(c.ts).toLocaleString('es-AR',{dateStyle:'short',timeStyle:'short'})}</div>
                  </div>
                  <button onClick={()=>delCom(c.id)} style={{ background:'none', border:'none', color:'#e5e2dd', fontSize:15, cursor:'pointer', padding:0, alignSelf:'flex-start' }}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
// ═══════════════════════════════════════════════════════════
//  SCENE VIEW — con planos técnicos, storyboard y deptos
// ═══════════════════════════════════════════════════════════

const TIPOS_PLANO = ['General','Americano','Medio','Primer plano','Primerísimo','Detalle','Cenital','Contrapicado','Picado','Holandés','Drone aéreo','Drone bajo','Travelling','Steadicam','Subjetivo','Otro'];
const TIPOS_MOVIMIENTO = ['Estático','Paneo','Tilt','Travelling','Dollly in','Dolly out','Grúa','Drone','Handheld','Steadicam'];

function PlanoCard({ plano, depts, color, onToggle, onEdit, onDelete, onOpenDept, onSaveComentario, onToggleEstrella, onUpdateRepeticiones }) {
  const done = plano.done;
  const estrella = plano.estrella || false;
  const repeticiones = plano.repeticiones || 0;
  const camara = plano.camara || 'CAM 1';
  const [comentario, setComentario] = useState(plano.comentario || '');
  const [editing, setEditing] = useState(false);

  return (
    <div style={{ background:'var(--bg-secondary)', borderRadius:16, border:`1px solid ${done?'#ede9e3':color+'33'}`, marginBottom:16, overflow:'hidden', opacity:done?0.75:1 }}>

      {/* ── Header: check + número + descripción + estrella + botones ── */}
      <div style={{ display:'flex', alignItems:'center', padding:'12px 14px 10px', gap:10 }}>
        <div onClick={onToggle} style={{ width:28, height:28, borderRadius:8, flexShrink:0, cursor:'pointer', background:done?'#0fa87e':'transparent', border:done?'none':`2px solid ${color}66`, display:'flex', alignItems:'center', justifyContent:'center' }}>
          {done && <span style={{ color:'#fff', fontSize:14, fontWeight:700 }}>✓</span>}
        </div>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
            <span style={{ fontSize:12, fontWeight:700, color, fontFamily:'inherit', letterSpacing:'0.06em' }}>TOMA {plano.numero}</span>
            {plano.tipo       && <span style={{ fontSize:10, color:'#fff', fontFamily:'inherit', background:color, borderRadius:6, padding:'2px 7px' }}>{plano.tipo}</span>}
            {plano.movimiento && <span style={{ fontSize:10, color:'#2f7ed8', fontFamily:'inherit', background:'#f0f7ff', borderRadius:6, padding:'2px 7px' }}>{plano.movimiento}</span>}
          </div>
          {plano.descripcion && <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit', marginTop:3, lineHeight:1.3 }}>{plano.descripcion}</div>}
        </div>
        <button onClick={()=>onToggleEstrella && onToggleEstrella()} style={{ background:'transparent', border:'none', color:'transparent', fontSize:20, cursor:'pointer', padding:0, width:24, height:24, textShadow:'0 0 0 ' + (estrella?color:'#ccc') }}>★</button>
        <div style={{ display:'flex', gap:4, flexShrink:0 }}>
          {onEdit   && <button onClick={onEdit}   style={{ background:'var(--bg-card-dark-secondary)', border:'none', borderRadius:8, color:'var(--text-tertiary)', fontSize:13, cursor:'pointer', padding:'5px 8px' }}>✎</button>}
          {onDelete && <button onClick={onDelete} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:13, cursor:'pointer', padding:'5px 8px' }}>✕</button>}
        </div>
      </div>

      {/* ── Repeticiones, Duración, Cámara en Grid ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, padding:'12px 14px 0' }}>
        {/* Repeticiones con cuadritos y estrellas */}

          {/* Grid de cuadritos */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:6, justifyContent:'center', marginBottom:8 }}>
            {repeticiones === 0 ? (
              <div style={{ fontSize:11, color:'var(--text-muted)', fontStyle:'italic' }}>Sin tomas</div>
            ) : (
              Array.from({ length: repeticiones }).map((_, i) => {
                const tieneEstrella = (plano.estrellasPorRepeticion || []).includes(i);
                return (
                  <button
                    key={i}
                    onClick={() => {
                      const arr = plano.estrellasPorRepeticion || [];
                      const nueva = tieneEstrella
                        ? arr.filter(x => x !== i)
                        : [...arr, i];
                      onUpdateRepeticiones && onUpdateRepeticiones(repeticiones, nueva);
                    }}
                    style={{
                      width: 36,
                      height: 48,
                      borderRadius: 6,
                      background: 'var(--bg-secondary)',
                      border: `1px solid ${tieneEstrella ? '#ffb700' : 'var(--border-light)'}`,
                      cursor: 'pointer',
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'center',
                      justifyContent: 'center',
                      gap: 2,
                      padding: 0,
                      transition: 'all 0.2s'
                    }}
                  >
                    <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>{i + 1}</span>
                    <span style={{ fontSize: 12, color: tieneEstrella ? '#ffb700' : 'var(--text-muted)' }}>
                      {tieneEstrella ? '★' : '☆'}
                    </span>
                  </button>
                );
              })
            )}
          </div>

          {/* Botones +/− para agregar/quitar repeticiones */}
          <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
            <button
              onClick={() => onUpdateRepeticiones && onUpdateRepeticiones(Math.max(0, repeticiones - 1), (plano.estrellasPorRepeticion || []).filter(x => x < repeticiones - 1))}
              style={{
                width: 24,
                height: 24,
                borderRadius: 4,
                background: color,
                border: 'none',
                color: '#fff',
                cursor: 'pointer',
                fontSize: 12,
                fontWeight: 700,
                padding: 0
              }}
            >
              −
            </button>
            <button
              onClick={() => onUpdateRepeticiones && onUpdateRepeticiones(repeticiones + 1, plano.estrellasPorRepeticion || [])}
              style={{
                width: 24,
                height: 24,
                borderRadius: 4,
                background: color,
                border: 'none',
                color: '#fff',
                cursor: 'pointer',
                fontSize: 12,
                fontWeight: 700,
                padding: 0
              }}
            >
              +
            </button>
          </div>
        </div>

        {/* Duración */}
        {plano.duracion && (
          <div style={{ background:'var(--bg-card-dark)', borderRadius:10, padding:'8px 10px', border:'1px solid var(--border-light)', display:'flex', flexDirection:'column', alignItems:'center' }}>
            <div style={{ fontSize:9, color:'#d48c0e', letterSpacing:'0.06em', marginBottom:2, fontFamily:'inherit' }}>DURACIÓN EST.</div>
            <div style={{ fontSize:13, fontWeight:700, color:'#d48c0e', fontFamily:'inherit' }}>⏱ {plano.duracion}</div>
          </div>
        )}

        {/* Cámara */}
        <div style={{ background:'var(--bg-card-dark)', borderRadius:10, padding:'8px 10px', border:'1px solid var(--border-light)', display:'flex', flexDirection:'column', alignItems:'center' }}>
          <div style={{ fontSize:9, color:'#2f7ed8', letterSpacing:'0.06em', marginBottom:2, fontFamily:'inherit' }}>CÁMARA</div>
          <div style={{ fontSize:12, fontWeight:700, color:'#2f7ed8', fontFamily:'inherit' }}>{camara}</div>
        </div>
      </div>

      {/* ── Foto del plano ── */}
      {plano.foto
        ? <div style={{ background:'#f5f5f5', display:'flex', alignItems:'center', justifyContent:'center', minHeight:140, borderRadius:10, overflow:'hidden', margin:'12px 14px 0' }}>
            <img src={plano.foto} alt={`Toma ${plano.numero}`} style={{ maxWidth:'100%', maxHeight:220, objectFit:'contain', display:'block' }}/>

        <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'inherit', letterSpacing:'0.06em', marginBottom:4 }}>NOTA</div>
        {editing
          ? <div>
              <textarea value={comentario} onChange={e=>setComentario(e.target.value)} rows={3} autoFocus
                style={{ width:'100%', fontFamily:'inherit', fontSize:16.25, background:'var(--bg-card-dark)', border:`1px solid ${color}44`, borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'none', lineHeight:1.5 }}/>
              <div style={{ display:'flex', gap:6, marginTop:6 }}>
                <button onClick={()=>setEditing(false)} style={{ flex:1, fontFamily:'inherit', fontSize:11, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:8, padding:'7px', cursor:'pointer' }}>Cancelar</button>

              </div>
            </div>
          : <div onClick={()=>setEditing(true)} style={{ background:'var(--bg-card-dark)', borderRadius:10, padding:'10px 12px', fontSize:16.25, color:comentario?'var(--text-primary)':'var(--text-muted)', fontFamily:'inherit', lineHeight:1.5, cursor:'text', border:'1px solid var(--border-light)', minHeight:42 }}>

      {(plano.deptos||[]).filter(dk=>depts[dk]).length > 0 && (
        <div style={{ padding:'10px 14px 14px', display:'flex', flexWrap:'wrap', gap:5 }}>
          {(plano.deptos||[]).filter(dk=>depts[dk]).map(dk=>{

    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  SUN POSITION WIDGET — Visualiza posición del sol
// ═══════════════════════════════════════════════════════════
function SunPositionWidget({ lat, lng, sceneDate }) {
  if (!lat || !lng || !sceneDate) return null;

  // SunCalc devuelve azimuth (0-360 desde norte) y altitude (ángulo sobre horizonte)
  const sunrise = window.SunCalc.getTimes(sceneDate, lat, lng).sunrise;
  const sunset  = window.SunCalc.getTimes(sceneDate, lat, lng).sunset;
  const sunrise_pos = window.SunCalc.getPosition(sunrise, lat, lng);
  const sunset_pos   = window.SunCalc.getPosition(sunset, lat, lng);

  // Ángulo en el círculo: azimuth (0=norte, 90=este, 180=sur, 270=oeste)
  const sunriseAz = sunrise_pos.azimuth * 180 / Math.PI; // convertir a grados
  const sunsetAz  = sunset_pos.azimuth * 180 / Math.PI;

  // Normalizar: azimuth está en -180 a 180, queremos 0-360
  const normalizeAz = (az) => (az + 360) % 360;
  const riseAz = normalizeAz(sunriseAz);
  const setAz  = normalizeAz(sunsetAz);

  // Para dibujar: en un círculo, 0° arriba (norte), 90° derecha (este), etc.
  const angleToXY = (angle, radius = 40) => {
    const rad = (angle - 90) * Math.PI / 180; // restar 90 para que 0 sea arriba
    return {
      x: 50 + radius * Math.cos(rad),
      y: 50 + radius * Math.sin(rad),
    };
  };

  const riseXY = angleToXY(riseAz);
  const setXY  = angleToXY(setAz);

  const fmt = (d) => d ? d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '—';

  return (
    <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'14px 16px', border:'1px solid #fdf2e3', marginBottom:16 }}>
      <div style={{ fontSize:11, color:'#d48c0e', letterSpacing:'0.08em', fontWeight:700, marginBottom:10, fontFamily:'inherit' }}>🌅 POSICIÓN DEL SOL</div>
      
      <div style={{ display:'flex', gap:16, alignItems:'center' }}>
        {/* Brújula SVG */}
        <svg width={120} height={120} viewBox="0 0 100 100" style={{ borderRadius:10, border:'1px solid #f5e8c0', background:'var(--bg-card-dark)' }}>
          {/* Círculo base */}
          <circle cx={50} cy={50} r={45} fill="none" stroke="#f5e8c0" strokeWidth={1} />
          
          {/* Puntos cardinales */}
          <text x={50} y={8} textAnchor="middle" fontSize={10} fill="#d48c0e" fontWeight="700">N</text>
          <text x={92} y={53} textAnchor="middle" fontSize={10} fill="#d48c0e" fontWeight="700">E</text>
          <text x={50} y={95} textAnchor="middle" fontSize={10} fill="#d48c0e" fontWeight="700">S</text>
          <text x={8} y={53} textAnchor="middle" fontSize={10} fill="#d48c0e" fontWeight="700">O</text>

          {/* Líneas cardinales */}
          <line x1={50} y1={8} x2={50} y2={20} stroke="#f5e8c0" strokeWidth={1} />
          <line x1={92} y1={50} x2={80} y2={50} stroke="#f5e8c0" strokeWidth={1} />
          <line x1={50} y1={92} x2={50} y2={80} stroke="#f5e8c0" strokeWidth={1} />
          <line x1={8} y1={50} x2={20} y2={50} stroke="#f5e8c0" strokeWidth={1} />

          {/* Salida del sol (amarillo) */}
          <circle cx={riseXY.x} cy={riseXY.y} r={4} fill="#ffc107" stroke="#d48c0e" strokeWidth={1} />
          <text x={riseXY.x} y={riseXY.y - 8} textAnchor="middle" fontSize={8} fill="#d48c0e" fontWeight="700">↑</text>

          {/* Puesta del sol (naranja) */}
          <circle cx={setXY.x} cy={setXY.y} r={4} fill="#ff9800" stroke="#d48c0e" strokeWidth={1} />
          <text x={setXY.x} y={setXY.y - 8} textAnchor="middle" fontSize={8} fill="#d48c0e" fontWeight="700">↓</text>
        </svg>

        {/* Info al lado */}
        <div>
          <div style={{ fontSize:12, color:'var(--text-primary)', fontFamily:'inherit', marginBottom:4 }}>
            <span style={{ fontWeight:700 }}>📍</span> {lat.toFixed(3)}°, {lng.toFixed(3)}°
          </div>
          <div style={{ fontSize:11, color:'var(--text-secondary)', fontFamily:'inherit', marginBottom:8 }}>
            <span style={{ fontWeight:700, color:'#ffc107' }}>↑ Salida:</span> {fmt(sunrise)}<br/>
            <span style={{ fontWeight:700, color:'#ff9800' }}>↓ Puesta:</span> {fmt(sunset)}
          </div>
          <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', fontStyle:'italic' }}>
            {sceneDate.toLocaleDateString('es-AR')}
          </div>
        </div>
      </div>
    </div>
  );
}

function SceneView({ scene, depts, isAdmin, onBack, onToggleDone, onUpdateScene, projectId, onOpenLocaciones }) {
  const [activeDeptPanel, setActiveDeptPanel] = useState(null);
  const [storyboard, setStoryboardRaw]        = useState([]);
  const [planos, setPlanosRaw]                = useState([]);
  const [showPlanoForm, setShowPlanoForm]     = useState(false);
  const [editPlano, setEditPlano]             = useState(null);
  const [section, setSection]                 = useState('planos');
  const [locaciones, setLocacionesRaw]        = useState([]);
  const [editingNum, setEditingNum]           = useState(false);
  const [numDraft, setNumDraft]               = useState('');

  // Modo día/noche — guardado en la escena

  useEffect(() => {
    if (!window._fb) return;
    const u1 = fb().onDeptData(projectId, 'scenes', `${scene.id}__storyboard`, d => setStoryboardRaw(d||[]));
    const u2 = fb().onDeptData(projectId, 'scenes', `${scene.id}__planos`,     d => setPlanosRaw(d||[]));
    // Cargar locaciones si existe el depto
    const deptKey = Object.keys(depts).find(k => depts[k].label.toLowerCase().includes('locacion'));
    let u3;
    if (deptKey) {
      u3 = fb().onDeptData(projectId, deptKey, 'locs', d => setLocacionesRaw(d||[]));
    }
    return () => { u1(); u2(); u3 && u3(); };
  }, [projectId, scene.id, JSON.stringify(Object.keys(depts))]);

  // Encontrar locación de esta escena
  const locacionEscena = locaciones.find(l => (l.escenas||[]).includes(scene.id));
  const tieneCoords = locacionEscena && locacionEscena.url;
  let coords = null;
  if (tieneCoords) {
    // Extraer lat,lng del URL de Google Maps
    // Formatos: https://maps.google.com/?q=lat,lng o https://www.google.com/maps/place/.../@lat,lng,... 
    const urlMatch = locacionEscena.url.match(/@?([-\d.]+),([-\d.]+)/);
    if (urlMatch) {
      coords = { lat: parseFloat(urlMatch[1]), lng: parseFloat(urlMatch[2]) };
    }
  }

  const saveStoryboard = (v) => { setStoryboardRaw(v); fb().saveDeptData(projectId, 'scenes', `${scene.id}__storyboard`, v); };
  const savePlanos = (v) => {
    // Calcular tiempo total y guardarlo en la escena también
    const total = v.reduce((acc, p) => {
      if (!p.duracion) return acc;
      const m = p.duracion.match(/(\d+)\s*(h|hs|hora|min|m)/i);
      if (!m) return acc;
      const val = parseInt(m[1]);
      return acc + (m[2].toLowerCase().startsWith('h') ? val*60 : val);
    }, 0);
    setPlanosRaw(v);
    if (window._fb && fb) {
      fb().saveDeptData(projectId, 'scenes', `${scene.id}__planos`, v);
    }
    onUpdateScene({ ...scene, tiempoTotal: total });
  };

  const handleStoryImg = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try { saveStoryboard([...storyboard, { id:Date.now(), img:await window.compressImage(file, 1200, 0.80) }]); }
    catch {}
  };

  const handleSavePlano = (form) => {
    if (!form.numero) return;
    if (editPlano) {
      savePlanos(planos.map(p=>p.id===editPlano.id?{...p,...form}:p));
    } else {
      savePlanos([...planos, { id:Date.now(), ...form }]);
    }
    setShowPlanoForm(false); setEditPlano(null);
  };

  const togglePlano   = (id) => savePlanos(planos.map(p=>p.id===id?{...p,done:!p.done}:p));
  const toggleEstrella = (id) => savePlanos(planos.map(p=>p.id===id?{...p,estrella:!p.estrella}:p));
  const updateRepeticiones = (id, val, estrellas) => savePlanos(planos.map(p=>p.id===id?{...p,repeticiones:val,estrellasPorRepeticion:estrellas||[]}:p));
  const deletePlano   = (id) => savePlanos(planos.filter(p=>p.id!==id));

  const toggleDept = (dk) => {
    const curr = scene.depts || [];
    onUpdateScene({ ...scene, depts: curr.includes(dk)?curr.filter(k=>k!==dk):[...curr,dk] });
  };

  const assignedDepts = (scene.depts || []).filter(k=>depts[k]);
  const otherDepts    = Object.keys(depts).filter(k=>!(scene.depts||[]).includes(k));
  const donePlanos    = planos.filter(p=>p.done).length;

  // Tiempo total de planos
  const tiempoTotal = planos.reduce((acc, p) => {
    if (!p.duracion) return acc;
    const m = p.duracion.match(/(\d+)\s*(h|hs|hora|min|m)/i);
    if (!m) return acc;
    const val = parseInt(m[1]);
    return acc + (m[2].toLowerCase().startsWith('h') ? val*60 : val);
  }, 0);
  const tiempoStr = tiempoTotal > 0 ? (tiempoTotal>=60 ? `${Math.floor(tiempoTotal/60)}h ${tiempoTotal%60}m` : `${tiempoTotal}m`) : null;

  const color = '#d94f2b';

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg-primary)', display:'flex', flexDirection:'column', transition:'background 0.4s' }} className="slide-r">
      {/* Header */}
      <div style={{ background:'var(--bg-header)', padding:'14px 20px 0', borderBottom:'1px solid var(--border-light)', position:'sticky', top:0, zIndex:10, transition:'background 0.4s' }}>
        <div style={{ display:'flex', alignItems:'center', marginBottom:8 }}>
          <button onClick={onBack} className="tap pwa-back-top" style={{ background:'none', border:'none', fontSize:13, color:'var(--text-secondary)', cursor:'pointer', fontFamily:'inherit', padding:0 }}>‹ Volver</button>
          <div style={{ flex:1 }}/>
        </div>
        <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>
              {editingNum ? (
                <input
                  value={numDraft}
                  onChange={e=>setNumDraft(e.target.value)}
                  onBlur={() => { if (numDraft.trim()) onUpdateScene({...scene, num: numDraft.trim()}); setEditingNum(false); }}
                  onKeyDown={e => {
                    if (e.key==='Enter') { if (numDraft.trim()) onUpdateScene({...scene, num: numDraft.trim()}); setEditingNum(false); }
                    if (e.key==='Escape') setEditingNum(false);
                  }}
                  autoFocus
                  style={{ fontSize:12, letterSpacing:'0.08em', color:'var(--text-tertiary)', fontFamily:'inherit', fontWeight:700, border:'1.5px solid var(--color-primary)', background:'var(--bg-primary)', borderRadius:6, padding:'3px 8px', outline:'none', maxWidth:160 }}
                />
              ) : (
                <span style={{ fontSize:11, letterSpacing:'0.1em', color:'var(--text-tertiary)', fontFamily:'inherit' }}>{scene.num}</span>
              )}
              <button
                onClick={() => { setNumDraft(scene.num); setEditingNum(true); }}
                title="Editar nombre de escena"
                style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:12, padding:'2px 4px', lineHeight:1, borderRadius:4, opacity:0.6 }}
              >✎</button>
            </div>
            <div style={{ fontSize:16, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit', lineHeight:1.3 }}>{scene.title}</div>
            <div style={{ fontSize:11, color:'var(--text-secondary)', fontFamily:'inherit', marginTop:3 }}>
              {planos.length > 0 && <span>{donePlanos}/{planos.length} planos</span>}
              {tiempoStr && <span> · ⏱ {tiempoStr} total</span>}
            </div>
          </div>
          {onOpenLocaciones && (
            <button onClick={onOpenLocaciones} title="Ver locación" style={{ width:36, height:36, borderRadius:10, background:'var(--bg-accent)', border:'1px solid var(--border-light)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0, cursor:'pointer' }}>
              📍
            </button>
          )}
          <div onClick={onToggleDone} className="tap" style={{ cursor:'pointer', width:36, height:36, borderRadius:'50%', background:scene.done?'#0fa87e':'var(--bg-accent)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>
            {scene.done ? '✓' : '○'}
          </div>
        </div>

        {/* Tabs de sección */}
        <div style={{ display:'flex', gap:0, marginBottom:0 }}>
          {[['planos',`🎥 Tomas (${planos.length})`],['storyboard','🎞️ Story'],['deptos','🎬 Deptos']].map(([k,l])=>(
            <button key={k} onClick={()=>setSection(k)} style={{ flex:1, fontFamily:'inherit', fontSize:11, fontWeight:700, padding:'10px 4px', border:'none', background:'none', cursor:'pointer', color:section===k?color:'var(--text-tertiary)', borderBottom:section===k?`2px solid ${color}`:'2px solid transparent', transition:'color 0.2s' }}>{l}</button>
          ))}
        </div>
      </div>

      <div className="has-bottom-bar" style={{ flex:1, padding:'16px 16px 32px' }}>
          <div style={{ background:'var(--bg-accent)', borderRadius:12, padding:'10px 14px', border:'1px solid var(--border-light)', marginBottom:16 }}>
            <div style={{ fontSize:10, color:'#d48c0e', letterSpacing:'0.08em', marginBottom:3, fontFamily:'inherit' }}>NOTAS DE DIRECCIÓN</div>
            <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit', lineHeight:1.5 }}>{scene.notes}</div>
          </div>
        )}

        {/* ── PLANOS ── */}
        {section==='planos' && (
          <div>
            {/* Descripción libre de la escena */}
            <div style={{ marginBottom:16 }}>
              <input
                value={scene.descripcionLabel || 'DESCRIPCIÓN / NOTAS DE LA ESCENA'}
                onChange={e=>onUpdateScene({...scene, descripcionLabel:e.target.value})}
                style={{ width:'100%', fontSize:10, color:'var(--text-tertiary)', letterSpacing:'0.06em', marginBottom:6, fontFamily:'inherit', background:'transparent', border:'1px solid transparent', outline:'none', padding:0, fontWeight:700, cursor:'pointer' }}
                onBlur={e=>e.target.value || onUpdateScene({...scene, descripcionLabel:'DESCRIPCIÓN / NOTAS DE LA ESCENA'})}
              />
              <textarea
                value={scene.descripcion || ''}
                onChange={e=>onUpdateScene({...scene, descripcion:e.target.value})}
                placeholder="Describí la escena, acción, atmósfera, lo que necesite el equipo saber..."
                rows={3}
                style={{ width:'100%', fontFamily:'inherit', fontSize:16.25, background:'var(--bg-secondary)', border:'1px solid var(--border-light)', borderRadius:12, padding:'12px 14px', color:'var(--text-primary)', outline:'none', resize:'none', lineHeight:1.6 }}
              />
            </div>

            {/* Widget posición del sol */}
            {coords && (
              <SunPositionWidget lat={coords.lat} lng={coords.lng} sceneDate={new Date()} />
            )}
            {showPlanoForm && (
              <PlanoForm
                plano={editPlano}
                depts={depts}
                allDepts={depts}
                color={color}
                onSave={handleSavePlano}
                onCancel={()=>{ setShowPlanoForm(false); setEditPlano(null); }}
              />
            )}
            {!showPlanoForm && planos.length===0 && (
              <div style={{ textAlign:'center', padding:'32px 20px', color:'#ccc', fontFamily:'inherit' }}>
                <div style={{ fontSize:32, marginBottom:10 }}>🎥</div>
                <div style={{ fontSize:14 }}>Sin tomas todavía</div>
                <div style={{ fontSize:12, marginTop:4, color:'#ddd' }}>Creá la primera toma de la escena</div>
              </div>
            )}
            {planos.map(p=>(
              <PlanoCard
                key={p.id} plano={p} depts={depts} color={color}
                onToggle={()=>togglePlano(p.id)}
                onEdit={()=>{ setEditPlano(p); setShowPlanoForm(true); }}
                onDelete={()=>deletePlano(p.id)}
                onOpenDept={(dk)=>setActiveDeptPanel(dk)}
                onToggleEstrella={()=>toggleEstrella(p.id)}
                onUpdateRepeticiones={(val, estrellas)=>updateRepeticiones(p.id, val, estrellas)}
                onSaveComentario={(txt)=>savePlanos(planos.map(x=>x.id===p.id?{...x,comentario:txt}:x))}
              />
            ))}
            {!showPlanoForm && (
              <button onClick={()=>{ setEditPlano(null); setShowPlanoForm(true); }} style={{ width:'100%', fontFamily:'inherit', fontSize:13, fontWeight:700, color:'#fff', background:color, border:'none', borderRadius:14, padding:'14px', cursor:'pointer', marginTop:4 }}>+ Agregar toma</button>
            )}
          </div>
        )}

        {/* ── STORYBOARD ── */}
        {section==='storyboard' && (
          <div>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
              <div style={{ fontSize:11, color:'var(--text-muted)', letterSpacing:'0.1em', fontFamily:'inherit' }}>STORYBOARD ({storyboard.length} frames)</div>
              <label style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, color:'#7c3fbf', background:'#7c3fbf15', border:'1px solid #7c3fbf33', borderRadius:20, padding:'5px 12px', cursor:'pointer' }}>
                + Subir frame
                <input type="file" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" onChange={handleStoryImg} style={{ display:'none' }}/>
              </label>
            </div>
            {storyboard.length===0
              ? <div style={{ background:'var(--bg-primary)', borderRadius:12, padding:'28px', textAlign:'center', color:'#ccc', fontFamily:'inherit', fontSize:12, border:'1px dashed #e5e2dd' }}>Sin frames todavía — subí las imágenes del storyboard</div>
              : <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {storyboard.map((f,i)=>(
                    <div key={f.id} style={{ position:'relative', borderRadius:12, overflow:'hidden' }}>
                      <img src={f.img} alt={`Frame ${i+1}`} style={{ width:'100%', display:'block', borderRadius:12, border:'1px solid #e5e2dd' }}/>
                      <div style={{ position:'absolute', top:8, left:8, fontSize:11, color:'#fff', fontFamily:'inherit', fontWeight:700, background:'rgba(0,0,0,0.5)', borderRadius:6, padding:'2px 8px' }}>Frame {i+1}</div>
                      <button onClick={()=>saveStoryboard(storyboard.filter(x=>x.id!==f.id))} style={{ position:'absolute', top:8, right:8, width:24, height:24, borderRadius:'50%', background:'rgba(0,0,0,0.5)', border:'none', color:'#fff', fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                    </div>
                  ))}
                </div>
            }
          </div>
        )}

        {/* ── DEPARTAMENTOS ── */}
        {section==='deptos' && (
          <div>
            {assignedDepts.length > 0 && (
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', letterSpacing:'0.1em', marginBottom:10, fontFamily:'inherit' }}>ASIGNADOS — tocá para ver checklist</div>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {assignedDepts.map(dk=>{
                    const m = depts[dk];
                    return (
                      <div key={dk} style={{ display:'flex', alignItems:'center', background:'var(--bg-secondary)', borderRadius:14, border:`1px solid ${m.color}30`, overflow:'hidden' }}>
                        <button onClick={()=>setActiveDeptPanel(dk)} className="tap" style={{ flex:1, display:'flex', alignItems:'center', gap:12, padding:'14px 16px', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', textAlign:'left' }}>
                          <div style={{ width:36, height:36, borderRadius:10, flexShrink:0 }}><DeptAvatar photo={m.photo} icon={m.icon} color={m.color} size={36} borderRadius={10} fontSize={18}/></div>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{m.label}</div>
                            <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'inherit' }}>Checklist · Citación · Notas →</div>
                          </div>
                          <div style={{ fontSize:18, color:'#ccc' }}>›</div>
                        </button>
                        {isAdmin && <button onClick={()=>toggleDept(dk)} style={{ width:44, alignSelf:'stretch', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg-error)', border:'none', borderLeft:'1px solid #ffe0e0', cursor:'pointer', color:'#ffb3b3', fontSize:16 }}>✕</button>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {isAdmin && otherDepts.length > 0 && (
              <div>
                <div style={{ fontSize:11, color:'var(--text-muted)', letterSpacing:'0.1em', marginBottom:10, fontFamily:'inherit' }}>AGREGAR DEPARTAMENTO</div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
                  {otherDepts.map(dk=>{
                    const m = depts[dk];
                    return (
                      <button key={dk} onClick={()=>toggleDept(dk)} className="tap" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, background:'var(--bg-secondary)', borderRadius:12, padding:'12px 8px', border:'1px dashed #e0ddd8', cursor:'pointer', fontFamily:'inherit' }}>
                        <DeptAvatar photo={m.photo} icon={m.icon} color={m.color} size={32} borderRadius={10} fontSize={18}/>
                        <span style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', textAlign:'center' }}>{m.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
            {assignedDepts.length===0 && !isAdmin && <div style={{ textAlign:'center', padding:'28px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin departamentos asignados</div>}
          </div>
        )}
      </div>

      {/* ── Barra inferior PWA (fix notch iPhone) ── */}
      <div className="pwa-bottom-bar-wrap no-print">
        <div className="pwa-bottom-bar">
          <button onClick={onBack} className="tap" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, background:'none', border:'none', cursor:'pointer', padding:'4px 20px', borderRadius:12, color:'var(--text-secondary)', fontFamily:'inherit', minWidth:72 }}>
            <span style={{ fontSize:22 }}>‹</span>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.04em' }}>VOLVER</span>
          </button>
          <div style={{ width:1, height:36, background:'var(--border-light)' }}/>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'4px 20px', color:'#d94f2b', fontFamily:'inherit', minWidth:72 }}>
            <span style={{ fontSize:20 }}>🎬</span>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.04em', maxWidth:80, textAlign:'center', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{scene.num}</span>
          </div>
        </div>
      </div>

      {activeDeptPanel && depts[activeDeptPanel] && (
        <SceneDeptPanel
          projectId={projectId} sceneId={scene.id}
          deptKey={activeDeptPanel} deptMeta={depts[activeDeptPanel]}
          isAdmin={isAdmin} onClose={()=>setActiveDeptPanel(null)}
        />
      )}
    </div>
  );
}
// ═══════════════════════════════════════════════════════════
//  DAY VIEW
// ═══════════════════════════════════════════════════════════
function DayView({ day, dayIndex, depts, isAdmin, onBack, onSelectScene, onToggleScene, onAddScene, onDeleteScene, onEditSceneName }) {
  const done  = day.scenes.filter(s=>s.done).length;
  const pct   = day.scenes.length ? done/day.scenes.length : 0;
  const color = DAY_COLORS[dayIndex % DAY_COLORS.length];
  const [addTitle, setAddTitle] = useState('');
  const [addNum, setAddNum]     = useState('');
  const [addMomento, setAddMomento] = useState('mañana');
  const [showAdd, setShowAdd]   = useState(false);
  const [editingSceneId, setEditingSceneId] = useState(null);
  const [editingSceneName, setEditingSceneName] = useState('');

  const submitAdd = () => {
    if (!addTitle.trim()) return;
    onAddScene(day.id, addTitle.trim(), addMomento, addNum.trim() || null);
    setAddTitle(''); setAddNum(''); setShowAdd(false);
  };

  // Agrupar escenas por momento del día
  const momentos = ['mañana','tarde','noche','sin definir'];
  const iconMomento = { mañana:'🌅', tarde:'🌤️', noche:'🌙', 'sin definir':'🎬' };
  const colorMomento = { mañana:'#f5a623', tarde:'#2f7ed8', noche:'#4a3fbf', 'sin definir':'#888' };
  const byMomento = {};
  momentos.forEach(m => { byMomento[m] = []; });
  day.scenes.forEach(s => {
    const m = s.momento || 'sin definir';
    if (!byMomento[m]) byMomento[m] = [];
    byMomento[m].push(s);
  });

  // Tonos según momento del día (respeta tema global)
  const bgMomento = {
    mañana:       'var(--bg-secondary)',
    tarde:        'var(--bg-secondary)',
    noche:        'var(--bg-secondary)',
    'sin definir':'var(--bg-secondary)'
  };
  const borderMomento = {
    mañana:       'var(--border-light)',
    tarde:        'var(--border-light)',
    noche:        'var(--border-light)',
    'sin definir':'var(--border-light)'
  };
  const textMomento = {
    mañana:       'var(--text-primary)',
    tarde:        'var(--text-primary)',
    noche:        'var(--text-primary)',
    'sin definir':'var(--text-primary)'
  };

  const SceneCard = ({ scene, momento, sceneIndex, dayScenes, depts }) => {
    // Calcular tiempo total de planos (guardado en scene.tiempoTotal o computed)
    const tiempoMin = scene.tiempoTotal || 0;
    const tiempoStr = tiempoMin > 0 ? (tiempoMin>=60 ? `${Math.floor(tiempoMin/60)}h ${tiempoMin%60}m` : `${tiempoMin}m`) : null;
    const cardBg    = scene.done ? 'var(--bg-card-dark-secondary)' : (bgMomento[momento] || 'var(--bg-card-dark)');
    const cardBord  = scene.done ? 'var(--border-light)' : (borderMomento[momento] || `${color}25`);
    const titleCol  = scene.done ? 'var(--text-muted)' : (textMomento[momento] || 'var(--text-on-dark-bg)');
    
    // Calcular traslado a la siguiente escena
    let trasladoInfo = null;
    if (sceneIndex < dayScenes.length - 1) {
      const proximaEscena = dayScenes[sceneIndex + 1];
      // Intentar obtener coordenadas de las locaciones
      // Asumiendo que scene.locacion es el URL de maps de la primera locación
      const coordsActual = extraerCoordsDeGoogleMaps(scene.locacion);
      const coordsProxima = extraerCoordsDeGoogleMaps(proximaEscena.locacion);
      if (coordsActual && coordsProxima) {
        const km = distanciaEnKm(coordsActual.lat, coordsActual.lon, coordsProxima.lat, coordsProxima.lon);
        const minutos = calcularTrasladoMinutos(km);
        trasladoInfo = { km: km.toFixed(1), minutos };
      }
    }
    
    return (
    <div style={{ display:'flex', alignItems:'stretch', background:cardBg, borderRadius:14, border:`1px solid ${cardBord}`, overflow:'hidden', boxShadow:'0 1px 6px rgba(0,0,0,0.05)', opacity:scene.done?0.6:1 }}>
      <div style={{ width:4, alignSelf:'stretch', background:scene.done?'#e0ddd8':color, flexShrink:0 }}/>
      <div style={{ flex:1, padding:'12px 14px', cursor:'pointer', display:'flex', flexDirection:'column' }}>
        {/* Fila superior: nombre editable + botón editar + tiempo — NO abre escena */}
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
          {editingSceneId === scene.id ? (
            <input 
              type="text"
              value={editingSceneName}
              onChange={(e) => setEditingSceneName(e.target.value)}
              onBlur={() => {
                if (editingSceneName.trim()) {
                  onEditSceneName(day.id, scene.id, editingSceneName);
                }
                setEditingSceneId(null);
              }}
              onKeyDown={(e) => {
                if (e.key === 'Enter') {
                  if (editingSceneName.trim()) {
                    onEditSceneName(day.id, scene.id, editingSceneName);
                  }
                  setEditingSceneId(null);
                }
                if (e.key === 'Escape') setEditingSceneId(null);
              }}
              autoFocus
              onClick={e => e.stopPropagation()}
              style={{
                fontSize:11,
                letterSpacing:'0.08em',
                color: color,
                fontFamily:'inherit',
                fontWeight:700,
                border:`1.5px solid ${color}`,
                background:'var(--bg-primary)',
                borderRadius:6,
                padding:'3px 8px',
                maxWidth:'150px',
                outline:'none',
              }}
            />
          ) : (
            <span style={{ fontSize:10, letterSpacing:'0.1em', color:scene.done?'var(--text-muted)':color, fontFamily:'inherit', fontWeight:700 }}>
              {scene.num}
            </span>
          )}
          {/* Botón ✎ para editar nombre — toque directo, no abre escena */}
          {editingSceneId !== scene.id && (
            <button
              onClick={(e) => { e.stopPropagation(); setEditingSceneId(scene.id); setEditingSceneName(scene.num); }}
              title="Editar nombre de escena"
              style={{ background:'none', border:'none', cursor:'pointer', color:color, fontSize:12, padding:'2px 4px', lineHeight:1, borderRadius:4, opacity:0.6 }}
            >✎</button>
          )}
