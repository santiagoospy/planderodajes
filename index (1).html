  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f7f5f2; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }
  #root { width: 100%; min-height: 100vh; }

  /* ──────────────────────────────────────────────────────────────
     TEMAS: CLARO (DEFAULT) Y OSCURO
     ────────────────────────────────────────────────────────────── */
  
  :root {
    /* Breakpoints */
    --app-max-width: 480px;
    --app-padding: 20px;
    --grid-cols: 1;
    
    /* COLORES GAFFER - VIBRANTES PARA LANDING */
    --gaffer-blue: #0052CC;
    --gaffer-orange: #FF5722;
    --gaffer-lime: #CCFF00;
    --gaffer-pink: #FF0080;
    --gaffer-gray: #2A2A2A;
    
    /* COLORES GAFFER APAGADOS - PARA DENTRO DE LA APP */
    --gaffer-orange-soft: #E8603B;
    --gaffer-lime-soft: #B3D500;
    --gaffer-pink-soft: #D63366;
    --gaffer-blue-soft: #0043A8;
    --gaffer-gray-soft: #4A4A4A;
    
    /* TEMA CLARO (DEFAULT) */
    --bg-primary: #f7f5f2;
    --bg-secondary: #ffffff;
    --bg-tertiary: #faf8f5;
    --bg-header: #ffffff;
    --bg-hover: #fffbf0;
    --bg-accent: #fffbf0;
    --bg-success: #e8f8f0;
    --bg-error: #ffe8e8;
    --bg-card-dark: #ede9e3;      /* Gris oscuro para tarjetas */
    --bg-card-dark-secondary: #e5e2dd; /* Gris más oscuro */
    
    --text-primary: #1a1714;
    --text-secondary: #555555;
    --text-tertiary: #888888;
    --text-light: #aaaaaa;
    --text-muted: #bbbbbb;
    --text-pale: #cccccc;
    --text-on-dark-bg: #1a1714;   /* Texto sobre fondo oscuro */
    
    --border-light: #ede9e3;
    --border-lighter: #f5f2ed;
    --border-accent: #f5e8c0;
    --border-success: #0fa87e22;
    --border-error: #d94f2b44;
    
    --shadow-light: rgba(0, 0, 0, 0.04);
    --shadow-medium: rgba(0, 0, 0, 0.05);
    
    /* COLORS LEGACY - AHORA USANDO GAFFER VIBRANTE */
    --color-primary: #0052CC;
    --color-secondary: #FF5722;
    --color-success: #CCFF00;
    --color-danger: #FF0080;
  }

  /* TEMA OSCURO */
  [data-theme="dark"] {
    --bg-primary: #002a38;
    --bg-secondary: #003d52;
    --bg-tertiary: #004a62;
    --bg-header: #002030;
    --bg-hover: #004060;
    --bg-accent: #005070;
    --bg-success: #0fa87e15;
    --bg-error: #d94f2b15;
    --bg-card-dark: #003345;
    --bg-card-dark-secondary: #004055;
    
    --text-primary: #e8f6ff;
    --text-secondary: #8cc5d8;
    --text-tertiary: #5a9ab0;
    --text-light: #4a8aa0;
    --text-muted: #3a7a90;
    --text-pale: #5a5652;
    --text-on-dark-bg: #f5f2ed;   /* Texto claro sobre fondo oscuro */
    
    --border-light: #3a3430;
    --border-lighter: #2a2420;
    --border-accent: #5a4a2a;
    --border-success: #0fa87e22;
    --border-error: #d94f2b22;
    
    --shadow-light: rgba(0, 0, 0, 0.3);
    --shadow-medium: rgba(0, 0, 0, 0.4);
    
    --color-primary: #ff6b3b;
    --color-secondary: #ffaa22;
    --color-success: #22dd99;
    --color-danger: #ff6b3b;
  }

  /* Aplicar variables a body */
  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  
  html { scroll-behavior: smooth; }
  body { -webkit-overflow-scrolling: touch; }

  /* Mobile (< 480px) — portrait */
  @media (max-width: 479px) {
    :root {
      --app-max-width: 100%;
      --app-padding: 16px;
      --grid-cols: 1;
    }
    body { font-size: 13px; }
    /* En móvil, inputs >= 16px para evitar zoom en iOS */
    input[type="text"], input[type="email"], input[type="number"], input[type="password"], input[type="tel"], input[type="search"], input[type="url"], textarea, select { font-size: 16px !important; }
  }

  /* Tablet (480px – 1023px) */
  @media (min-width: 480px) and (max-width: 1023px) {
    :root {
      --app-max-width: 600px;
      --app-padding: 24px;
      --grid-cols: 2;
    }
    body { font-size: 14px; }
  }

  /* Desktop (>= 1024px) */
  @media (min-width: 1024px) {
    :root {
      --app-max-width: 1200px;
      --app-padding: 28px;
      --grid-cols: 3;
    }
    body { font-size: 15px; }
  }

  /* Desktop grande (>= 1400px) */
  @media (min-width: 1400px) {
    :root {
      --app-max-width: 1400px;
      --app-padding: 32px;
      --grid-cols: 4;
    }
  }

  /* Smooth scroll */
  html { scroll-behavior: smooth; }

  /* Permitir scroll con momentum en iOS */
  body { -webkit-overflow-scrolling: touch; }

  /* Grid responsivo para departamentos y componentes */
  .responsive-grid {
    display: grid;
    grid-template-columns: repeat(var(--grid-cols), 1fr);
    gap: 12px;
    width: 100%;
  }

  @media (min-width: 480px) and (max-width: 1023px) {
    .responsive-grid { gap: 16px; }
  }

  @media (min-width: 1024px) {
    .responsive-grid { gap: 20px; }
  }

  /* Flex responsivo para layouts principales */
  .app-container {
    width: 100%;
    max-width: var(--app-max-width);
    margin: 0 auto;
    padding: 0 var(--app-padding);
  }

  .app-full {
    width: 100%;
    max-width: var(--app-max-width);
    margin: 0 auto;
  }

  /* Ajustes para vistas amplias en desktop */
  @media (min-width: 1024px) {
    .view-container {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .main-panel {
      flex: 1;
      min-width: 500px;
    }

    .sidebar-panel {
      width: 300px;
      max-height: 80vh;
      overflow-y: auto;
    }

    /* Mejorar grid de departamentos en desktop */
    .dept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    /* Cards de días con mejor layout en desktop */
    .day-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 12px;
    }

    /* Grid responsivo de archivos importantes */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
  }

  /* Ajustes para tablet */
  @media (min-width: 480px) and (max-width: 1023px) {
    .dept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .day-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .files-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
  }

  /* Móvil */
  @media (max-width: 479px) {
    .dept-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .day-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .files-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
  }

  /* Contenedor principal responsivo */
  .main-content {
    flex: 1;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
  }

  @media (min-width: 480px) and (max-width: 1023px) {
    .main-content {
      padding: 24px 20px 32px;

  @media (min-width: 1024px) {
    .main-content {
      padding: 28px 24px 32px;
      gap: 32px;
      max-width: var(--app-max-width);
      margin: 0 auto;
    }
  }

  /* Mejoras de spacing para tarjetas */
  @media (min-width: 1024px) {
    .admin-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
  }

<script type="module">
  // ── Netlify Blobs backend (reemplaza Firebase) ──────────────────
  const API = '/.netlify/functions';

  async function apiCall(fn, method, body, params) {
    const url = params ? `${API}/${fn}?${new URLSearchParams(params)}` : `${API}/${fn}`;
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    return res.json();
  }

  // Almacenamiento local como cache
  function localGet(key) {
    try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
  }
  function localSet(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }
  function localDel(key) {
    try { localStorage.removeItem(key); } catch {}
  }

  // Listeners para simular onSnapshot
  const listeners = {};
  function notify(channel, data) {
    (listeners[channel] || []).forEach(cb => cb(data));
  }

  window._db = {};
  window._fb = {
    // ── Productoras ──
    async getProductora(id) {
      try {
        const p = await apiCall('data', 'GET', null, { store: 'productoras', key: id });
        localSet(`productora:${id}`, p);
        return p;
      } catch {
        return localGet(`productora:${id}`);
      }
    },
    async saveProductora(prod) {
      localSet(`productora:${prod.id}`, prod);
      try { await apiCall('data', 'POST', { store: 'productoras', key: prod.id, data: prod }); }
      catch(e) { console.warn('Save productora offline:', e.message); }
      notify('productoras', null);
    },
    async productoraExists(id) {
      const p = await window._fb.getProductora(id);
      return !!p;
    },
    async getAllProductoras() {
      try {
        const res = await apiCall('data', 'GET', null, { store: 'productoras', list: 'true' });
        (res.items || []).forEach(p => localSet(`productora:${p.id}`, p));
        return res.items || [];
      } catch {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('productora:'));
        return keys.map(k => JSON.parse(localStorage.getItem(k))).filter(Boolean);
      }
    },
    async deleteProductora(id) {
      localDel(`productora:${id}`);
      try { await apiCall('data', 'POST', { store: 'productoras', key: id, delete: true }); } catch {}
      notify('productoras', null);
    },

    // ── Proyectos ──
    onProjectsByProductora(productoraId, cb) {
      const fn = async () => {
        const all = await window._fb.getProjectsByProductora(productoraId);
        cb(all);
      };
      fn();
      const key = `projects:${productoraId}`;
      if (!listeners[key]) listeners[key] = [];
      listeners[key].push(cb);
      return () => { listeners[key] = listeners[key].filter(c => c !== cb); };
    },
    async getProjectsByProductora(productoraId) {
      try {
        const res = await apiCall('data', 'GET', null, { store: 'projects', list: 'true' });
        const all = res.items || [];
        all.forEach(p => localSet(`project:${p.id}`, p));
        return all.filter(p => p.productoraId === productoraId);
      } catch {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('project:'));
        return keys.map(k => JSON.parse(localStorage.getItem(k))).filter(Boolean)
          .filter(p => p.productoraId === productoraId);
      }
    },
    async getProject(id) {
      try {
        const p = await apiCall('data', 'GET', null, { store: 'projects', key: id });
        localSet(`project:${id}`, p);
        return p;
      } catch {
        return localGet(`project:${id}`);
      }
    },
    onProject(id, cb) {
      window._fb.getProject(id).then(p => cb(p));
      const key = `project:${id}`;
      if (!listeners[key]) listeners[key] = [];
      listeners[key].push(cb);
      return () => { listeners[key] = listeners[key].filter(c => c !== cb); };
    },
    async getProjects() {
      try {
        const res = await apiCall('data', 'GET', null, { store: 'projects', list: 'true' });
        const all = res.items || [];
        all.forEach(p => localSet(`project:${p.id}`, p));
        return all;
      } catch {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('project:'));
        return keys.map(k => JSON.parse(localStorage.getItem(k))).filter(Boolean);
      }
    },
    async saveProject(proj) {
      localSet(`project:${proj.id}`, proj);
      try { await apiCall('data', 'POST', { store: 'projects', key: proj.id, data: proj }); }
      catch(e) { console.warn('Save project offline:', e.message); }
      notify(`project:${proj.id}`, proj);
      notify(`projects:${proj.productoraId}`, null);
    },
    onProjects(cb) {
      window._fb.getProjects().then(p => cb(p));
      if (!listeners['allprojects']) listeners['allprojects'] = [];
      listeners['allprojects'].push(cb);
      return () => { listeners['allprojects'] = listeners['allprojects'].filter(c => c !== cb); };
    },

    // ── Dept data ──
    async getDeptData(projectId, deptKey, section) {
      const storeKey = `${projectId}_${deptKey}_${section}`;
      try {
        const res = await apiCall('data', 'GET', null, { store: 'depts', key: storeKey });
        localSet(`dept:${storeKey}`, res);
        return res ? res.items : null;
      } catch {
        const d = localGet(`dept:${storeKey}`);
        return d ? d.items : null;
      }
    },
    async saveDeptData(projectId, deptKey, section, items) {
      const storeKey = `${projectId}_${deptKey}_${section}`;
      const data = { items, updatedAt: new Date().toISOString() };
      localSet(`dept:${storeKey}`, data);
      try { await apiCall('data', 'POST', { store: 'depts', key: storeKey, data }); }
      catch(e) { console.warn('Save dept offline:', e.message); }
      notify(`dept:${storeKey}`, items);
    },
    onDeptData(projectId, deptKey, section, cb) {
      window._fb.getDeptData(projectId, deptKey, section).then(d => cb(d));
      const storeKey = `dept:${projectId}_${deptKey}_${section}`;
      if (!listeners[storeKey]) listeners[storeKey] = [];
      listeners[storeKey].push(cb);
      return () => { listeners[storeKey] = listeners[storeKey].filter(c => c !== cb); };
    },

    // ── Mensajes ──
    async getMsg(projectId) {
      try {
        const res = await apiCall('data', 'GET', null, { store: 'messages', key: projectId });
        localSet(`msg:${projectId}`, res);
        return res;
      } catch {
        return localGet(`msg:${projectId}`);
      }
    },
    async saveMsg(projectId, msg) {
      const data = msg || { deleted: true };
      localSet(`msg:${projectId}`, data);
      try { await apiCall('data', 'POST', { store: 'messages', key: projectId, data }); } catch {}
      notify(`msg:${projectId}`, data.deleted ? null : data);
    },
    onMsg(projectId, cb) {
      window._fb.getMsg(projectId).then(d => cb(d && !d.deleted ? d : null));
      const key = `msg:${projectId}`;
      if (!listeners[key]) listeners[key] = [];
      listeners[key].push(cb);
      return () => { listeners[key] = listeners[key].filter(c => c !== cb); };
    },

    // ── Borrar proyecto ──
    async deleteProject(projectId) {
      try {
        localDel(`project:${projectId}`);
        // Limpiar dept data y mensajes locales
        Object.keys(localStorage).filter(k => k.includes(projectId)).forEach(k => localStorage.removeItem(k));
        await apiCall('data', 'POST', { store: 'projects', key: projectId, delete: true });
        return true;
      } catch(e) {
        console.error('deleteProject error:', e);
        return false;
      }
    },

    // ── Archivo de mensajes ──
    async getMsgArchive(projectId) {
      try {
        const res = await apiCall('data', 'GET', null, { store: 'msgarchive', key: projectId });
        localSet(`msgarchive:${projectId}`, res);
        return res ? (res.items || []) : [];
      } catch {
        const d = localGet(`msgarchive:${projectId}`);
        return d ? (d.items || []) : [];
      }
    },
    async saveMsgArchive(projectId, items) {
      const data = { items };
      localSet(`msgarchive:${projectId}`, data);
      try { await apiCall('data', 'POST', { store: 'msgarchive', key: projectId, data }); } catch {}
    },

    // ── Chat conversacional ──
    async getChat(projectId) {
      try {
        const res = await apiCall('data', 'GET', null, { store: 'chat', key: projectId });
        localSet(`chat:${projectId}`, res);
        return res ? (res.messages || []) : [];
      } catch {
        const d = localGet(`chat:${projectId}`);
        return d ? (d.messages || []) : [];
      }
    },
    async saveChat(projectId, messages) {
      const data = { messages };
      localSet(`chat:${projectId}`, data);
      try { await apiCall('data', 'POST', { store: 'chat', key: projectId, data }); } catch {}
      notify(`chat:${projectId}`, messages);
    },
    onChat(projectId, cb) {
      window._fb.getChat(projectId).then(msgs => cb(msgs || []));
      const key = `chat:${projectId}`;
      if (!listeners[key]) listeners[key] = [];
      listeners[key].push(cb);
      return () => { listeners[key] = listeners[key].filter(c => c !== cb); };
    },
  };

  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
// Compresión de imágenes — disponible globalmente antes de que cargue React
// Redimensiona a máx 800px y comprime al 70% de calidad
// Compresión fuerte para múltiples fotos (scouting): 1000px máx, calidad 60%
window.compressImageStrong = function(file) {
  return window.compressImage(file, 1000, 0.60);
};
window.compressImage = function(file, maxPx, quality) {
  maxPx   = maxPx   || 800;
  quality = quality || 0.70;
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        // Detectar tipo de imagen original
        var mimeType = file.type || 'image/jpeg';
        if (!mimeType.startsWith('image/')) mimeType = 'image/jpeg';
        // Convertir PNG a JPEG para máxima compresión manteniendo calidad
        // JPEG es más eficiente que PNG para fotos/screenshots
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};
</script>

// Calcular distancia entre dos puntos (lat/lon) en km usando Haversine
function distanciaEnKm(lat1, lon1, lat2, lon2) {
  const R = 6371; // Radio de la Tierra en km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Extraer coordenadas de un URL de Google Maps
function extraerCoordsDeGoogleMaps(url) {
  if (!url) return null;
  // Formato: https://www.google.com/maps/place/.../@lat,lon,17z
  const match = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (match) return { lat: parseFloat(match[1]), lon: parseFloat(match[2]) };
  return null;
}

// Calcular tiempo de traslado en minutos (asumiendo 60 km/h promedio en ruta)
function calcularTrasladoMinutos(km) {
  if (!km || km <= 0) return 0;
  // Suposición: 60 km/h promedio en ruta en Paraguay (incluye tráfico, caminos, paradas)
  // Además, agregar 15 minutos por carga/descarga de equipo
  const tiempoRuta = Math.round((km / 60) * 60); // minutos
  const margenEquipo = 15;
  return tiempoRuta + margenEquipo;
}

// ── Firebase helpers (accedidos cuando están disponibles) ────
const fb = () => window._fb;

// ── Hook genérico para datos de departamento sincronizados ───
function useFirestoreList(projectId, deptKey, section, defaultItems) {
  const [items, setItems] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!projectId || !deptKey || !window._fb) return;
    // Suscripción en tiempo real
    const unsub = fb().onDeptData(projectId, deptKey, section, (data) => {
      setItems(data !== null ? data : defaultItems);
      setReady(true);
    });
    return unsub;
  }, [projectId, deptKey, section]);

  const save = useCallback((newItems) => {
    setItems(newItems);
    if (projectId && window._fb) {
      fb().saveDeptData(projectId, deptKey, section, newItems);
    }
  }, [projectId, deptKey, section]);

  return [ready ? items : defaultItems, save, ready];
}

function ProgressRing({ pct, size = 64, stroke = 5, color = '#d94f2b' }) {

  );
}

              <a href={m.adjunto.data} download={m.adjunto.nombre||'imagen.jpg'} style={{ position:'absolute', bottom:8, right:8, background:'rgba(0,0,0,0.65)', border:'none', borderRadius:8, color:'#fff', fontSize:12, fontWeight:700, padding:'6px 12px', cursor:'pointer', textDecoration:'none', display:'flex', alignItems:'center', gap:5 }}>⬇ Descargar</a>
            </div>
          )}
          {m.adjunto && m.adjunto.tipo==='video' && (
            <div style={{ position:'relative' }}>
              <video src={m.adjunto.data} controls style={{ width:'100%', borderRadius:8, maxHeight:260 }}/>
              <a href={m.adjunto.data} download={m.adjunto.nombre||'video.mp4'} style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(0,0,0,0.15)', borderRadius:8, padding:'7px 12px', textDecoration:'none', color:'var(--text-secondary)', fontFamily:'inherit', fontSize:12, marginTop:4, border:'1px solid var(--border-light)' }}>
                <span style={{ fontSize:16 }}>⬇</span>
                <span style={{ flex:1 }}>Descargar video</span>
              </a>
            </div>
          )}
          {m.adjunto && m.adjunto.tipo==='archivo' && (
            <a href={m.adjunto.data} download={m.adjunto.nombre} style={{ display:'flex', alignItems:'center', gap:8, background:'var(--bg-primary)', borderRadius:8, padding:'10px 12px', textDecoration:'none', color:'var(--text-secondary)', fontFamily:'inherit', fontSize:12 }}>
              <span style={{ fontSize:20 }}>📄</span>
              <span style={{ flex:1 }}>{m.adjunto.nombre}</span>
              <span style={{ color, fontWeight:700 }}>↓ Descargar</span>
            </a>
          )}
          {m.adjunto && m.adjunto.tipo==='link' && (
            <a href={m.adjunto.url} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:10, background:'var(--bg-primary)', borderRadius:8, padding:'10px 12px', textDecoration:'none', border:`1px solid ${color}22` }}>
              <span style={{ fontSize:22, flexShrink:0 }}>{m.adjunto.linkIcon||'🔗'}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:700, color, fontFamily:'inherit', marginBottom:2 }}>{m.adjunto.nombre}</div>
                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.adjunto.url}</div>
              </div>
              <span style={{ fontSize:12, color, fontWeight:700, flexShrink:0 }}>→ Abrir</span>
            </a>
          )}
          {/* Compat: mensajes viejos con texto */}
          {m.texto && <div style={{ fontSize:12, color:'var(--text-tertiary)', fontFamily:'inherit', lineHeight:1.5, marginTop:m.adjunto?6:0, fontStyle:'italic' }}>{m.texto}</div>}
        </div>
      ))}
    </div>
  );
}
/* ── InfoTab ── */
/* ── GastosTab ── */
function GastosTab({ color, isAdmin, deptKey, projectId, project, requirePin }) {
  const [expenses, setExpenses] = useFirestoreList(projectId, deptKey, 'gastos', []);
  const [presupGeneral, setPresupGeneralRaw] = useState(null);
  const [showAdd, setShowAdd]   = useState(false);
  const [editId, setEditId]     = useState(null);
  const [pinUnlocked, setPinUnlocked]   = useState(!requirePin);
  const [showPinModal, setShowPinModal] = useState(false);
  const [form, setForm] = useState({ desc:'', presupuestado:'', cerrado:'', pagado:'', fecha:'', estado:'pendiente' });
  const [gastosDepts, setGastosDepts] = useState({}); // gastos de otros departamentos
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  // Cargar gastos de todos los departamentos (para Producción)
  useEffect(() => {
    if (!window._fb || deptKey !== 'produccion') return;
    const DEPTS_TO_LOAD = ['direccion', 'fotografia', 'sonido', 'arte', 'locaciones', 'casting', 'catering'];
    Promise.all(DEPTS_TO_LOAD.map(d => 
      fb().getDeptData(projectId, d, 'gastos').then(data => ({ dept: d, gastos: data || [] }))
        .catch(() => ({ dept: d, gastos: [] }))
    )).then(results => {
      const gastos = {};
      results.forEach(r => {
        gastos[r.dept] = (r.gastos || []).map(g => ({
          ...g,
          presupuestado: parseFloat(g.presupuestado) || 0
        }));
      });
      setGastosDepts(gastos);
    });
  }, [projectId, deptKey]);

  useEffect(() => {
    if (!window._fb) return;
    fb().getDeptData(projectId, deptKey, 'presup_general').then(d => {
      setPresupGeneralRaw(d && d[0] ? d[0].valor : null);
    }).catch(()=>{});
  }, [projectId, deptKey]);

  const [dineroEntregado, setDineroEntregadoRaw] = useState(null);
  const [porcentajeEntregado, setPorcentajeEntregadoRaw] = useState(null);

  useEffect(() => {
    if (!window._fb || deptKey !== 'produccion') return;
    fb().getDeptData(projectId, deptKey, 'dinero_entregado').then(d => {
      setDineroEntregadoRaw(d && d[0] ? d[0].valor : null);
    }).catch(()=>{});
    fb().getDeptData(projectId, deptKey, 'porcentaje_entregado').then(d => {
      setPorcentajeEntregadoRaw(d && d[0] ? d[0].valor : null);
    }).catch(()=>{});
  }, [projectId, deptKey]);

  const saveDineroEntregado = (val) => {
    setDineroEntregadoRaw(val);
    fb().saveDeptData(projectId, deptKey, 'dinero_entregado', [{ valor: val }]);
  };

  const savePorcentajeEntregado = (val) => {
    setPorcentajeEntregadoRaw(val);
    fb().saveDeptData(projectId, deptKey, 'porcentaje_entregado', [{ valor: val }]);
  };

  const savePresupGeneral = (val) => {
    setPresupGeneralRaw(val);
    fb().saveDeptData(projectId, deptKey, 'presup_general', [{ valor: val }]);
  };

  const totalPresup  = expenses.reduce((a,e)=>a+(parseFloat(e.presupuestado)||0),0);
  const totalCerrado = expenses.filter(e=>e.cerrado!=null).reduce((a,e)=>a+(parseFloat(e.cerrado)||0),0);
  const diferencia   = totalPresup - totalCerrado;
  const vsGeneral    = presupGeneral!=null ? presupGeneral - totalPresup : null;
  const totalPagado  = expenses.reduce((a,e)=>a+(parseFloat(e.pagado)||0),0);
  const totalPorPagar = totalCerrado - totalPagado;
  const gs = (n) => `Gs. ${Math.round(n||0).toLocaleString('es-PY')}`;

  const add = () => {
    if (!form.desc || !form.presupuestado) return;
    const item = { id: editId||Date.now(), ...form, presupuestado:parseFloat(form.presupuestado), cerrado:form.cerrado?parseFloat(form.cerrado):null, pagado:form.pagado?parseFloat(form.pagado):null };
    if (editId) { setExpenses(expenses.map(e=>e.id===editId?item:e)); }
    else { setExpenses([...expenses, item]); }
    setForm({ desc:'', presupuestado:'', cerrado:'', pagado:'', fecha:'', estado:'pendiente' });
    setEditId(null); setShowAdd(false);
  };

  const startEdit = (e) => {
    setForm({ desc:e.desc, presupuestado:String(e.presupuestado||''), cerrado:e.cerrado!=null?String(e.cerrado):'', pagado:e.pagado!=null?String(e.pagado):'', fecha:e.fecha||'', estado:e.estado||'pendiente' });
    setEditId(e.id); setShowAdd(true);
  };

  const toggleEstado = (id) => setExpenses(expenses.map(e=>e.id===id?{...e,estado:e.estado==='aprobado'?'pendiente':'aprobado'}:e));
  const del = (id) => setExpenses(expenses.filter(e=>e.id!==id));

  const exportarExcel = async () => {
    if (!window.XLSX) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const XL = window.XLSX;
    const wb = XL.utils.book_new();
    const deptName = project?.depts?.[deptKey]?.label || deptKey;
    const rows = [
      [`GASTOS — ${deptName.toUpperCase()}`, '', '', '', '', '', ''],
      [`Proyecto: ${project?.title || ''}`, '', '', '', '', '', ''],
      [`Fecha de exportación: ${new Date().toLocaleDateString('es-AR')}`, '', '', '', '', '', ''],
      ['', '', '', '', '', '', ''],
      ['RESUMEN', '', '', '', '', '', ''],
      ['Presupuesto General', gs(presupGeneral||0), '', '', '', '', ''],
      ['Total Presupuestado', gs(totalPresup), '', '', '', '', ''],
      ['Total Cerrado', gs(totalCerrado), '', '', '', '', ''],
      ['Saldo Final', gs(diferencia), '', '', '', '', ''],
      ['', '', '', '', '', '', ''],
      ['N°', 'DESCRIPCIÓN', 'FECHA', 'PRESUPUESTADO (Gs.)', 'CERRADO (Gs.)', 'DIFERENCIA (Gs.)', 'ESTADO'],
    ];
    expenses.forEach((e, i) => {
      const pres = parseFloat(e.presupuestado)||0;
      const cerr = e.cerrado!=null ? parseFloat(e.cerrado) : null;
      const diff = cerr!=null ? pres - cerr : '';
      rows.push([i+1, e.desc||'', e.fecha||'', pres, cerr!=null?cerr:'', diff, e.estado==='aprobado'?'✓ OK':'PENDIENTE']);
    });
    const ws = XL.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:4},{wch:38},{wch:14},{wch:22},{wch:22},{wch:22},{wch:12}];
    ws['!merges'] = [
      {s:{r:0,c:0},e:{r:0,c:6}},{s:{r:1,c:0},e:{r:1,c:6}},
      {s:{r:2,c:0},e:{r:2,c:6}},{s:{r:4,c:0},e:{r:4,c:6}},
    ];
    // Estilos
    const styled = (r, c, fill, font, align) => {
      const ref = XL.utils.encode_cell({r,c});
      if (!ws[ref]) ws[ref] = {t:'z',v:''};
      ws[ref].s = {};
      if (fill) ws[ref].s.fill = {patternType:'solid',...fill};
      if (font) ws[ref].s.font = font;
      if (align) ws[ref].s.alignment = align;
    };
    const cHex = color.replace('#','');
    // Título fila 0
    for (let c=0;c<=6;c++) styled(0,c,{fgColor:{rgb:'D94F2B'}},{bold:true,color:{rgb:'FFFFFF'},sz:13,name:'Arial'},{horizontal:'center',vertical:'center'});
    // Subtítulos filas 1-2
    for (let r=1;r<=2;r++) for (let c=0;c<=6;c++) styled(r,c,{fgColor:{rgb:'1A1714'}},{color:{rgb:'888888'},sz:9,name:'Arial'},{horizontal:'left'});
    // Resumen fila 4
    for (let c=0;c<=6;c++) styled(4,c,{fgColor:{rgb:'F0EDE8'}},{bold:true,color:{rgb:'888888'},sz:9,name:'Arial'},{horizontal:'left'});
    // Filas resumen 5-8
    [[5,'777777','F7F5F2'],[6,'777777','F7F5F2'],[7,'777777','F7F5F2'],[8,diferencia>=0?'0FA87E':'D94F2B',diferencia>=0?'E8F8F0':'FFF0F0']].forEach(([r,tc,bg])=>{
      styled(r,0,{fgColor:{rgb:bg}},{color:{rgb:'888888'},sz:10,name:'Arial'},{horizontal:'left'});
      styled(r,1,{fgColor:{rgb:bg}},{bold:true,color:{rgb:tc},sz:11,name:'Arial'},{horizontal:'left'});
      for (let c=2;c<=6;c++) styled(r,c,{fgColor:{rgb:bg}},{},{});
    });
    // Encabezados tabla fila 10
    for (let c=0;c<=6;c++) styled(10,c,{fgColor:{rgb:cHex}},{bold:true,color:{rgb:'FFFFFF'},sz:10,name:'Arial'},{horizontal:'center',vertical:'center',wrapText:true});
    // Filas de datos
    expenses.forEach((e,i) => {
      const r = 11+i;
      const pres = parseFloat(e.presupuestado)||0;
      const cerr = e.cerrado!=null?parseFloat(e.cerrado):null;
      const diff = cerr!=null?pres-cerr:null;
      const rowBg = i%2===0?'FFFFFF':'F9F7F5';
      for (let c=0;c<=6;c++) {
        let bg=rowBg, tc='333333';
        if (c===4&&cerr!=null&&diff<0){bg='FFF0F0';tc='D94F2B';}
        if (c===4&&cerr!=null&&diff>0){bg='E8F8F0';tc='0FA87E';}
        if (c===5&&diff!=null&&diff<0){bg='FFF0F0';tc='D94F2B';}
        if (c===5&&diff!=null&&diff>0){bg='E8F8F0';tc='0FA87E';}
        if (c===6){bg=e.estado==='aprobado'?'E8F8F0':'FFF8EC';tc=e.estado==='aprobado'?'0FA87E':'D48C0E';}
        styled(r,c,{fgColor:{rgb:bg}},{color:{rgb:tc},sz:10,name:'Arial'},c===0?{horizontal:'center'}:c>=3?{horizontal:'right'}:{horizontal:'left'});
      }
    });
    XL.utils.book_append_sheet(wb, ws, 'Gastos');
    XL.writeFile(wb, `Gastos_${deptName.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  if (requirePin && !pinUnlocked && !isAdmin) {
    return (
      <div style={{ textAlign:'center', padding:'40px 20px' }}>
        <div style={{ fontSize:36, marginBottom:12 }}>🔒</div>
        <div style={{ fontSize:16, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit', marginBottom:8 }}>Gastos protegidos</div>
        <div style={{ fontSize:12, color:'#aaa', fontFamily:'inherit', marginBottom:20 }}>Ingresá el PIN del proyecto para ver los gastos</div>
        <button onClick={()=>setShowPinModal(true)} style={{ fontFamily:'inherit', fontSize:14, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:14, padding:'12px 28px', cursor:'pointer' }}>🔑 Ingresar PIN</button>
        {showPinModal && <PinModal title="Gastos" subtitle="Ingresá el PIN del proyecto" correctPin={project?.pin} onSuccess={()=>{ setPinUnlocked(true); setShowPinModal(false); }} onCancel={()=>setShowPinModal(false)}/>}
      </div>
    );
  }

  return (
    <div>
      {/* 1. PRESUPUESTO GENERAL DEL PROYECTO */}
      <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'14px 16px', border:'1px solid var(--border-light)', marginBottom:12 }}>
        <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.06em', marginBottom:8, fontFamily:'inherit' }}>💵 PRESUPUESTO GENERAL DEL PROYECTO</div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontSize:12, color:'var(--text-tertiary)', fontFamily:'inherit' }}>Gs.</span>
          <input type="number" value={presupGeneral??''} onChange={e=>savePresupGeneral(e.target.value?parseFloat(e.target.value):null)} placeholder="0"
            style={{ flex:1, fontFamily:'inherit', fontSize:20, fontWeight:700, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'12px 14px', color:'var(--text-primary)', outline:'none' }}/>
        </div>
      </div>

      {/* 2. DINERO ENTREGADO - Solo en Producción */}
      {deptKey === 'produccion' && (
        <div style={{ background:'#e8f8f0', borderRadius:14, padding:'14px 16px', border:'1px solid #0fa87e33', marginBottom:12 }}>
          <div style={{ fontSize:11, color:'#0fa87e', letterSpacing:'0.06em', marginBottom:8, fontFamily:'inherit', fontWeight:700 }}>✓ DINERO ENTREGADO</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr', gap:8, marginBottom:10 }}>
            <div>
              <label style={{ fontSize:10, color:'#0fa87e', fontFamily:'inherit', marginBottom:4, display:'block', fontWeight:600 }}>Monto Entregado (Gs.)</label>
              <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                <span style={{ fontSize:11, color:'#0fa87e', fontFamily:'inherit' }}>Gs.</span>
                <input type="number" value={dineroEntregado??''} onChange={e=>saveDineroEntregado(e.target.value?parseFloat(e.target.value):null)} placeholder="0"
                  style={{ flex:1, fontFamily:'inherit', fontSize:16, fontWeight:700, background:'#ffffff', border:'1px solid #0fa87e44', borderRadius:10, padding:'10px 12px', color:'#0fa87e', outline:'none' }}/>
              </div>
            </div>
          </div>
          {presupGeneral != null && dineroEntregado != null && (
            <>
              <div style={{ background:'var(--bg-primary)', borderRadius:10, padding:'12px 14px', marginTop:8, marginBottom:8, border:'1px solid #0fa87e22' }}>
                <div style={{ fontSize:10, color:'#0fa87e', fontFamily:'inherit', marginBottom:4, fontWeight:600 }}>⏳ FALTA POR COBRAR</div>
                <div style={{ fontSize:16, fontWeight:700, color:'#0fa87e', fontFamily:'inherit' }}>
                  {gs(Math.max(0, presupGeneral - dineroEntregado))}
                </div>
              </div>
              
              {/* Monto en Caja = Falta por Cobrar - Gastos */}
              {(() => {
                const faltaPorCobrar = Math.max(0, presupGeneral - dineroEntregado);
                const montoEnCaja = faltaPorCobrar - totalPresup;
                return (
                  <div style={{ 
                    background: montoEnCaja >= 0 ? '#e8f8f0' : '#fff0f0', 
                    borderRadius:10, 
                    padding:'12px 14px', 
                    marginBottom:8,
                    border: `1px solid ${montoEnCaja >= 0 ? '#0fa87e33' : '#d94f2b33'}`
                  }}>
                    <div style={{ fontSize:10, color: montoEnCaja >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit', marginBottom:4, fontWeight:600 }}>
                      {montoEnCaja >= 0 ? '💰 MONTO EN CAJA' : '⚠️ DÉFICIT EN CAJA'}
                    </div>
                    <div style={{ fontSize:16, fontWeight:700, color: montoEnCaja >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit' }}>
                      {montoEnCaja >= 0 ? '+' : ''}{gs(montoEnCaja)}
                    </div>
                  </div>
                );
              })()}
              
              {/* Monto Neto = Presupuesto - Gastos */}
              {(() => {
                const montoNeto = presupGeneral - totalPresup;
                return (
                  <div style={{ 
                    background: montoNeto >= 0 ? '#e8f8f0' : '#fff0f0', 
                    borderRadius:10, 
                    padding:'12px 14px', 
                    border: `1px solid ${montoNeto >= 0 ? '#0fa87e33' : '#d94f2b33'}`
                  }}>
                    <div style={{ fontSize:10, color: montoNeto >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit', marginBottom:4, fontWeight:600 }}>
                      {montoNeto >= 0 ? '✓ MONTO NETO PROYECTADO' : '⚠️ PÉRDIDA PROYECTADA'}
                    </div>
                    <div style={{ fontSize:16, fontWeight:700, color: montoNeto >= 0 ? '#0fa87e' : '#d94f2b', fontFamily:'inherit' }}>
                      {montoNeto >= 0 ? '+' : ''}{gs(montoNeto)}
                    </div>
                  </div>
                );
              })()}
            </>
          )}
        </div>
      )}

      {/* 3. GASTOS DE PRODUCCIÓN */}
      <SectionLabel>GASTOS DE PRODUCCIÓN ({expenses.length})</SectionLabel>
      {expenses.map(e=>{
        const pres = parseFloat(e.presupuestado)||0;
        const cerr = e.cerrado!=null ? parseFloat(e.cerrado) : null;
        const diff = cerr!=null ? pres-cerr : null;
        const enRojo  = diff!=null && diff < 0;
        const enVerde = diff!=null && diff > 0;
        return (
          <div key={e.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:`1px solid ${enRojo?'#d94f2b33':enVerde?'#0fa87e33':'#ede9e3'}` }}>
            <div style={{ display:'flex', alignItems:'flex-start', gap:8, marginBottom:8 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit', fontWeight:700 }}>{e.desc}</div>
                {e.fecha && <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit', marginTop:2 }}>📅 {e.fecha}</div>}
              </div>
              <div style={{ display:'flex', gap:5, alignItems:'center', flexShrink:0 }}>
                <div onClick={()=>toggleEstado(e.id)} style={{ fontSize:10, fontWeight:700, padding:'3px 7px', borderRadius:10, cursor:'pointer', fontFamily:'inherit',
                  background:e.estado==='aprobado'?'#e8f8f0':'#fff8ec', color:e.estado==='aprobado'?'#0fa87e':'#d48c0e',
                  border:`1px solid ${e.estado==='aprobado'?'#0fa87e44':'#d48c0e44'}`
                }}>{e.estado==='aprobado'?'✓':'PEND.'}</div>
                <button onClick={()=>startEdit(e)} style={{ background:'var(--bg-card-dark-secondary)', border:'none', borderRadius:8, color:'var(--text-tertiary)', fontSize:13, cursor:'pointer', padding:'4px 7px' }}>✎</button>
                <button onClick={()=>del(e.id)} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:13, cursor:'pointer', padding:'4px 7px' }}>✕</button>
              </div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <div style={{ flex:1, background:'var(--bg-card-dark)', borderRadius:8, padding:'6px 10px' }}>
                <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'inherit' }}>PRESUP.</div>
                <div style={{ fontSize:12, fontWeight:700, color:'var(--text-secondary)', fontFamily:'inherit' }}>{gs(pres)}</div>
              </div>
              {cerr!=null && <div style={{ flex:1, background:enRojo?'#fff0f0':enVerde?'#e8f8f0':'#faf8f5', borderRadius:8, padding:'6px 10px' }}>
                <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'inherit' }}>CERRADO</div>
                <div style={{ fontSize:12, fontWeight:700, color:enRojo?'#d94f2b':enVerde?'#0fa87e':'#555', fontFamily:'inherit' }}>{gs(cerr)}</div>
              </div>}
              {e.pagado!=null && <div style={{ flex:1, background:'#e8f8f0', borderRadius:8, padding:'6px 10px', border:'1px solid #0fa87e22' }}>
                <div style={{ fontSize:9, color:'var(--color-success)', fontFamily:'inherit' }}>PAGADO</div>
                <div style={{ fontSize:12, fontWeight:700, color:'var(--color-success)', fontFamily:'inherit' }}>{gs(parseFloat(e.pagado))}</div>
              </div>}
              {diff!=null && <div style={{ flex:1, background:enRojo?'#fff0f0':'#e8f8f0', borderRadius:8, padding:'6px 10px' }}>
                <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'inherit' }}>DIF.</div>
                <div style={{ fontSize:12, fontWeight:700, color:enRojo?'#d94f2b':'#0fa87e', fontFamily:'inherit' }}>{diff>=0?'+':''}{gs(diff)}</div>
              </div>}
            </div>
          </div>
        );
      })}
      {expenses.length===0 && !showAdd && <div style={{ textAlign:'center', padding:'20px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin gastos todavía</div>}

      {!showAdd

                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', marginBottom:4 }}>PRESUPUESTADO *</div>

                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', marginBottom:4 }}>CERRADO</div>
                <input value={form.cerrado} onChange={e=>setF('cerrado',e.target.value)} placeholder="0" type="number"
                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              </div>
            </div>
            <div style={{ display:'flex', gap:8, marginBottom:8 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10, color:'var(--color-success)', fontFamily:'inherit', marginBottom:4, fontWeight:700 }}>✓ PAGADO (adelanto)</div>
                <input value={form.pagado} onChange={e=>setF('pagado',e.target.value)} placeholder="0" type="number"
                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'#e8f8f0', border:'1px solid #0fa87e33', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', marginBottom:4 }}>FECHA</div>
                <input value={form.fecha} onChange={e=>setF('fecha',e.target.value)} placeholder="Fecha"
                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              </div>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setEditId(null); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={add} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>{editId?'Guardar cambios':'Agregar'}</button>
            </div>
          </div>
      }

      {/* Exportar a Excel */}
      {expenses.length > 0 && (
        <button onClick={exportarExcel} style={{ width:'100%', fontFamily:'inherit', fontSize:12, fontWeight:700, color:'#217346', background:'#e8f5ee', border:'1px solid #21734633', borderRadius:14, padding:'13px', cursor:'pointer', marginTop:10, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
          <span style={{ fontSize:16 }}>📊</span> Exportar a Excel (.xlsx)
        </button>
      )}
    </div>
  );
}

/* ── GastosTabSimple — para departamentos que no son producción ── */
function GastosTabSimple({ color, deptKey, projectId, project }) {
  const [expenses, setExpenses] = useFirestoreList(projectId, deptKey, 'gastos', []);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId]   = useState(null);
  const [form, setForm] = useState({ desc:'', monto:'', fecha:'', estado:'pendiente' });
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const gs = (n) => `Gs. ${Math.round(n||0).toLocaleString('es-PY')}`;
  const total = expenses.reduce((a,e)=>a+(parseFloat(e.monto)||0),0);

  const add = () => {
    if (!form.desc || !form.monto) return;
    const item = { id:editId||Date.now(), ...form, monto:parseFloat(form.monto) };
    if (editId) { setExpenses(expenses.map(e=>e.id===editId?item:e)); }
    else { setExpenses([...expenses, item]); }
    setForm({ desc:'', monto:'', fecha:'', estado:'pendiente' });
    setEditId(null); setShowAdd(false);
  };

  const startEdit = (e) => {
    setForm({ desc:e.desc||'', monto:String(e.monto||''), fecha:e.fecha||'', estado:e.estado||'pendiente' });
    setEditId(e.id); setShowAdd(true);
  };

  const toggleEstado = (id) => setExpenses(expenses.map(e=>e.id===id?{...e,estado:e.estado==='aprobado'?'pendiente':'aprobado'}:e));
  const del = (id) => setExpenses(expenses.filter(e=>e.id!==id));

  const exportarExcel = async () => {
    if (!window.XLSX) {
      await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    }
    const XL = window.XLSX;
    const wb = XL.utils.book_new();
    const deptName = project?.depts?.[deptKey]?.label || deptKey;
    const rows = [
      [`GASTOS — ${deptName.toUpperCase()}`, '', '', '', ''],
      [`Proyecto: ${project?.title || ''}  ·  Total: ${gs(total)}`, '', '', '', ''],
      [`Exportado: ${new Date().toLocaleDateString('es-AR')}`, '', '', '', ''],
      ['', '', '', '', ''],
      ['N°', 'DESCRIPCIÓN', 'FECHA', 'MONTO (Gs.)', 'ESTADO'],
      ...expenses.map((e,i)=>[i+1, e.desc||'', e.fecha||'', parseFloat(e.monto)||0, e.estado==='aprobado'?'✓ OK':'PENDIENTE']),
      ['', '', '', '', ''],
      ['', '', 'TOTAL', total, ''],
    ];
    const ws = XL.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:4},{wch:38},{wch:14},{wch:20},{wch:12}];
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:4}},{s:{r:1,c:0},e:{r:1,c:4}},{s:{r:2,c:0},e:{r:2,c:4}}];
    const cHex = color.replace('#','');
    const styled = (r,c,fill,font,align) => {
      const ref=XL.utils.encode_cell({r,c}); if(!ws[ref]) ws[ref]={t:'z',v:''}; ws[ref].s={};
      if(fill) ws[ref].s.fill={patternType:'solid',...fill};
      if(font) ws[ref].s.font=font; if(align) ws[ref].s.alignment=align;
    };
    for(let c=0;c<=4;c++){
      styled(0,c,{fgColor:{rgb:cHex}},{bold:true,color:{rgb:'FFFFFF'},sz:13,name:'Arial'},{horizontal:'center'});
      styled(1,c,{fgColor:{rgb:'1A1714'}},{color:{rgb:'888888'},sz:9,name:'Arial'},{horizontal:'left'});
      styled(2,c,{fgColor:{rgb:'1A1714'}},{color:{rgb:'888888'},sz:9,name:'Arial'},{horizontal:'left'});
      styled(4,c,{fgColor:{rgb:cHex}},{bold:true,color:{rgb:'FFFFFF'},sz:10,name:'Arial'},{horizontal:'center'});
    }
    expenses.forEach((_,i)=>{
      const r=5+i; const bg=i%2===0?'FFFFFF':'F9F7F5';
      for(let c=0;c<=4;c++) styled(r,c,{fgColor:{rgb:bg}},{color:{rgb:'333333'},sz:10,name:'Arial'},c===3?{horizontal:'right'}:{horizontal:'left'});
    });
    // Total row
    const tr = 5+expenses.length+1;
    styled(tr,2,{fgColor:{rgb:'F0EDE8'}},{bold:true,color:{rgb:'888888'},sz:10,name:'Arial'},{horizontal:'right'});
    styled(tr,3,{fgColor:{rgb:cHex}},{bold:true,color:{rgb:'FFFFFF'},sz:11,name:'Arial'},{horizontal:'right'});
    XL.utils.book_append_sheet(wb, ws, 'Gastos');
    XL.writeFile(wb, `Gastos_${deptName.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  return (
    <div>
      {/* Total simple */}
      <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'12px 16px', border:'1px solid var(--border-light)', marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize:11, color:'#aaa', fontFamily:'inherit' }}>TOTAL GASTADO</div>
        <div style={{ fontSize:18, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{gs(total)}</div>
      </div>

      <SectionLabel>GASTOS ({expenses.length})</SectionLabel>
      {expenses.map(e=>(
        <div key={e.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:'1px solid var(--border-light)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit', fontWeight:700 }}>{e.desc}</div>
              <div style={{ display:'flex', gap:8, marginTop:2, alignItems:'center' }}>
                <span style={{ fontSize:13, fontWeight:700, color:color, fontFamily:'inherit' }}>{gs(parseFloat(e.monto)||0)}</span>
                {e.fecha && <span style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'inherit' }}>📅 {e.fecha}</span>}
              </div>
            </div>
            <div style={{ display:'flex', gap:5, alignItems:'center', flexShrink:0 }}>
              <div onClick={()=>toggleEstado(e.id)} style={{ fontSize:10, fontWeight:700, padding:'3px 7px', borderRadius:10, cursor:'pointer', fontFamily:'inherit',
                background:e.estado==='aprobado'?'#e8f8f0':'#fff8ec', color:e.estado==='aprobado'?'#0fa87e':'#d48c0e',
                border:`1px solid ${e.estado==='aprobado'?'#0fa87e44':'#d48c0e44'}`,
              }}>{e.estado==='aprobado'?'✓':'PEND.'}</div>
              <button onClick={()=>startEdit(e)} style={{ background:'var(--bg-card-dark-secondary)', border:'none', borderRadius:8, color:'var(--text-tertiary)', fontSize:13, cursor:'pointer', padding:'4px 7px' }}>✎</button>
              <button onClick={()=>del(e.id)} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:13, cursor:'pointer', padding:'4px 7px' }}>✕</button>
            </div>
          </div>
        </div>
      ))}
      {expenses.length===0 && !showAdd && <div style={{ textAlign:'center', padding:'20px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin gastos cargados todavía</div>}

      {!showAdd
        ? <button onClick={()=>{ setEditId(null); setForm({ desc:'', monto:'', fecha:'', estado:'pendiente' }); setShowAdd(true); }} style={{ width:'100%', fontFamily:'inherit', fontSize:13, fontWeight:700, color:'#fff', background:color, border:'none', borderRadius:14, padding:'14px', cursor:'pointer', marginTop:8 }}>+ Agregar gasto</button>
        : <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30`, marginTop:8 }}>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.06em', marginBottom:10, fontFamily:'inherit' }}>{editId?'✎ EDITAR':'NUEVO GASTO'}</div>
            <input value={form.desc} onChange={e=>setF('desc',e.target.value)} placeholder="Descripción *"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <div style={{ display:'flex', gap:8, marginBottom:8 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', marginBottom:4 }}>MONTO (Gs.) *</div>
                <input value={form.monto} onChange={e=>setF('monto',e.target.value)} placeholder="0" type="number"
                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', marginBottom:4 }}>FECHA</div>
                <input value={form.fecha} onChange={e=>setF('fecha',e.target.value)} placeholder="Fecha"
                  style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              </div>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setEditId(null); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={add} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>{editId?'Guardar cambios':'Agregar'}</button>
            </div>
          </div>
      }

      {expenses.length > 0 && (
        <button onClick={exportarExcel} style={{ width:'100%', fontFamily:'inherit', fontSize:12, fontWeight:700, color:'#217346', background:'#e8f5ee', border:'1px solid #21734633', borderRadius:14, padding:'13px', cursor:'pointer', marginTop:10, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
          <span style={{ fontSize:16 }}>📊</span> Exportar a Excel (.xlsx)
        </button>
      )}

      {/* 4. GASTOS DE OTROS DEPARTAMENTOS - Al final */}
      {deptKey === 'produccion' && Object.keys(gastosDepts).length > 0 && (
        <div style={{ marginTop:24 }}>
          <SectionLabel>📊 GASTOS DE OTROS DEPARTAMENTOS</SectionLabel>
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'16px', border:'1px solid var(--border-light)', marginBottom:12 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 }}>

                  <div key={dept} style={{ background:'var(--bg-primary)', borderRadius:10, padding:'12px 14px', textAlign:'center' }}>

              const gastosAllDepts = Object.values(gastosDepts).reduce((acc, gastos) => 
                acc + gastos.reduce((a, g) => a + (g.presupuestado || 0), 0), 0
              );
              return (
                <div style={{ background:'#fff8ec', borderRadius:10, padding:'12px 14px', border:'1px solid #d48c0e22', textAlign:'center' }}>
                  <div style={{ fontSize:10, color:'#d48c0e', fontFamily:'inherit', marginBottom:4, fontWeight:600 }}>TOTAL OTROS DEPARTAMENTOS</div>

        <div style={{ marginTop:24 }}>
          <SectionLabel>💰 RESUMEN FINANCIERO TOTAL</SectionLabel>
          <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'16px', border:'1px solid var(--border-light)' }}>
            {/* Fila 1: Presupuesto vs Dinero Entregado */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 }}>
              <div style={{ background:'var(--bg-primary)', borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:10, color:'var(--text-tertiary)', fontFamily:'inherit', marginBottom:4, letterSpacing:'0.05em', fontWeight:600 }}>PRESUPUESTO</div>
                <div style={{ fontSize:15, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{gs(presupGeneral)}</div>
