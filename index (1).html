const CONDICIONES_PRESET = ['Sin restricciones', 'Vegetariano', 'Vegano', 'Celíaco', 'Sin gluten', 'Sin lactosa', 'Sin mariscos', 'Kosher', 'Halal', 'Diabético'];

function CateringTab({ color, projectId, project }) {
  // Overrides manuales: { personId: 'Vegetariano', ... }
  // Solo se usan cuando catering necesita corregir lo que el integrante cargó (o si no cargó nada)
  const [condicionesRaw, setCondicionesRaw] = useFirestoreList(projectId, 'catering', 'condiciones', []);
  // Extras manuales (personas que no están en el crew de ningún depto — ej: invitados, cliente externo)
  const [extras, setExtrasRaw] = useFirestoreList(projectId, 'catering', 'personas', []);

  const [allCrew, setAllCrew] = useState([]);
  const [loaded, setLoaded]   = useState(false);

  // Carga crew de todos los departamentos — incluye condicionAlimentaria si fue cargada por el depto
  useEffect(() => {
    if (!window._fb || !project) return;
    const deptKeys = Object.keys(project.depts);
    Promise.all(
      deptKeys.map(dk =>
        fb().getDeptData(projectId, dk, 'integrantes').then(d =>
          (d||[]).map(p => ({
            id: `${dk}__${p.id}`,
            nombre: p.nombre || '',
            apodo: p.apodo || '',
            rol: p.rol || '',
            condicionOriginal: p.condicionAlimentaria || '',  // la que cargó el depto
            deptKey: dk,
            deptLabel: project.depts[dk]?.label || dk,
            deptColor: project.depts[dk]?.color || '#888',
            deptIcon:  project.depts[dk]?.icon  || '🎬',
          }))
        ).catch(()=>[])
      )
    ).then(results => { setAllCrew(results.flat()); setLoaded(true); });
  }, [projectId, project]);

  // Mapear overrides por ID
  const overrideMap = {};
  (condicionesRaw || []).forEach(c => { overrideMap[c.personId] = c.condicion; });

  // Condición efectiva: override si existe, sino la del integrante
  const condEfectiva = (p) => overrideMap[p.id] !== undefined ? overrideMap[p.id] : (p.condicionOriginal || '');

  const setOverride = (personId, condicion) => {
    const existing = (condicionesRaw || []).filter(c => c.personId !== personId);
    setCondicionesRaw([...existing, { personId, condicion }]);
  };

  const clearOverride = (personId) => {
    setCondicionesRaw((condicionesRaw || []).filter(c => c.personId !== personId));
  };

  // Extras manuales
  const [showExtraForm, setShowExtraForm] = useState(false);
  const [extraForm, setExtraForm] = useState({ nombre:'', condicion:'Sin restricciones' });
  const addExtra = () => {
    if (!extraForm.nombre) return;
    const id = 'extra__' + Date.now();
    setExtrasRaw([...(extras||[]), { id, nombre: extraForm.nombre }]);
    setOverride(id, extraForm.condicion);
    setExtraForm({ nombre:'', condicion:'Sin restricciones' });
    setShowExtraForm(false);
  };
  const delExtra = (id) => {
    setExtrasRaw((extras||[]).filter(e=>e.id!==id));
    setCondicionesRaw((condicionesRaw||[]).filter(c=>c.personId!==id));
  };

  // Lista unificada: crew + extras
  const extrasItems = (extras||[]).map(e => ({
    id: e.id,
    nombre: e.nombre,
    apodo: '',
    rol: '',
    condicionOriginal: '',
    deptKey: '_extra',
    deptLabel: 'Invitados / Extras',
    deptColor: '#888',
    deptIcon: '➕',
  }));
  const todos = [...allCrew, ...extrasItems];

  // Resumen por condición efectiva
  const resumen = {};
  let asignados = 0;
  todos.forEach(p => {
    const c = condEfectiva(p);
    if (c) {
      resumen[c] = (resumen[c] || 0) + 1;
      asignados++;
    }
  });
  const conRestricciones = Object.entries(resumen).filter(([c])=>c!=='Sin restricciones').reduce((a,[,n])=>a+n,0);
  const sinRestricciones = resumen['Sin restricciones'] || 0;

  // Agrupar para mostrar por depto
  const byDept = {};
  todos.forEach(p => { (byDept[p.deptKey] = byDept[p.deptKey] || []).push(p); });

  // Para el selector de condición dentro de una persona
  const [openId, setOpenId] = useState(null);

  const iconoCondicion = (c) => {
    if (c === 'Vegano')         return '🌱';
    if (c === 'Vegetariano')    return '🥗';
    if (c === 'Celíaco' || c === 'Sin gluten') return '🌾';
    if (c === 'Sin lactosa')    return '🥛';
    if (c === 'Kosher')         return '✡️';
    if (c === 'Halal')          return '☪️';
    if (c === 'Diabético')      return '💉';
    return '🍽️';
  };

  return (
    <div>
      {/* Resumen arriba */}
      {todos.length > 0 && (
        <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'14px 16px', border:'1px solid var(--border-light)', marginBottom:20 }}>
          <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.08em', marginBottom:12, fontFamily:'inherit' }}>RESUMEN ALIMENTARIO</div>
          <div style={{ display:'flex', gap:8, marginBottom:12 }}>
            <div style={{ flex:1, background:'var(--bg-primary)', borderRadius:10, padding:'10px 12px', textAlign:'center' }}>
              <div style={{ fontSize:22, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{todos.length}</div>
              <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit' }}>TOTAL CREW</div>
            </div>
            <div style={{ flex:1, background:'#fff8ec', borderRadius:10, padding:'10px 12px', textAlign:'center', border:'1px solid #f5e8c0' }}>
              <div style={{ fontSize:22, fontWeight:700, color:'#d48c0e', fontFamily:'inherit' }}>{conRestricciones}</div>
              <div style={{ fontSize:10, color:'#d48c0e', fontFamily:'inherit' }}>CON RESTRICCIÓN</div>
            </div>
            <div style={{ flex:1, background:'#e8f8f0', borderRadius:10, padding:'10px 12px', textAlign:'center', border:'1px solid #0fa87e33' }}>
              <div style={{ fontSize:22, fontWeight:700, color:'var(--color-success)', fontFamily:'inherit' }}>{sinRestricciones}</div>
              <div style={{ fontSize:10, color:'var(--color-success)', fontFamily:'inherit' }}>SIN RESTRICCIÓN</div>
            </div>
          </div>
          {Object.entries(resumen).map(([cond, cant]) => (
            <div key={cond} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid #f5f3f0' }}>
              <span style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit' }}>{iconoCondicion(cond)} {cond}</span>
              <span style={{ fontSize:13, fontWeight:700, color: cond==='Sin restricciones'?'#0fa87e':'#d48c0e', fontFamily:'inherit', background: cond==='Sin restricciones'?'#e8f8f0':'#fff8ec', borderRadius:20, padding:'2px 10px', border:`1px solid ${cond==='Sin restricciones'?'#0fa87e33':'#d48c0e33'}` }}>{cant} {cant===1?'persona':'personas'}</span>
            </div>
          ))}
          {asignados < todos.length && (
            <div style={{ marginTop:8, fontSize:11, color:'#aaa', fontFamily:'inherit', fontStyle:'italic' }}>
              ⚠ {todos.length - asignados} {todos.length - asignados === 1 ? 'persona no cargó' : 'personas no cargaron'} su condición — pueden hacerlo desde su depto o acá.
            </div>
          )}
        </div>
      )}

      {!loaded && <div style={{ textAlign:'center', padding:'32px', color:'#ccc', fontFamily:'inherit' }}>Cargando crew...</div>}

      {loaded && todos.length === 0 && (
        <div style={{ textAlign:'center', padding:'40px 20px', color:'#ccc', fontFamily:'inherit' }}>
          <div style={{ fontSize:36, marginBottom:12 }}>🍴</div>
          <div>Ningún departamento cargó integrantes todavía.</div>
          <div style={{ fontSize:12, marginTop:6 }}>Cada depto puede cargar crew (con condición alimentaria) desde su tab CREW.</div>
        </div>
      )}

      {/* Listado por departamento */}
      {loaded && Object.entries(byDept).map(([dk, personas]) => {
        const isExtra = dk === '_extra';
        const dmColor = isExtra ? '#888' : (project?.depts?.[dk]?.color || '#888');
        const dmIcon  = isExtra ? '➕' : (project?.depts?.[dk]?.icon || '🎬');
        const dmLabel = isExtra ? 'INVITADOS / EXTRAS' : (project?.depts?.[dk]?.label || dk).toUpperCase();
        return (
          <div key={dk} style={{ marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, padding:'6px 0' }}>
              <span style={{ fontSize:16 }}>{dmIcon}</span>
              <span style={{ fontSize:11, fontWeight:700, color:dmColor, letterSpacing:'0.08em', fontFamily:'inherit' }}>{dmLabel}</span>
              <span style={{ fontSize:10, color:'#ccc', fontFamily:'inherit' }}>— {personas.length}</span>
            </div>
            {personas.map(p => {
              const cond = condEfectiva(p);
              const override = overrideMap[p.id] !== undefined;
              const nombreVisible = p.apodo || p.nombre;
              const isOpen = openId === p.id;
              return (
                <div key={p.id} style={{ background:'var(--bg-secondary)', borderRadius:12, marginBottom:6, border:`1px solid ${cond?color+'30':'#ede9e3'}`, overflow:'hidden' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px' }}>
                    <div style={{ width:32, height:32, borderRadius:8, background:(cond?color:dmColor)+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, flexShrink:0 }}>
                      {cond ? iconoCondicion(cond) : '👤'}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{nombreVisible}</div>
                      {cond
                        ? <div style={{ fontSize:11, color: cond==='Sin restricciones'?'#0fa87e':color, fontFamily:'inherit', marginTop:2 }}>
                            {cond}
                            {override && <span style={{ fontSize:9, color:'#aaa', marginLeft:6, fontStyle:'italic' }}>(editado por catering)</span>}
                          </div>
                        : <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'inherit', fontStyle:'italic', marginTop:2 }}>Sin cargar</div>
                      }
                    </div>
                    <button onClick={()=>setOpenId(isOpen ? null : p.id)} style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, background: cond ? '#f0ede8' : color, color: cond ? '#888' : '#fff', border:'none', borderRadius:8, padding:'6px 10px', cursor:'pointer' }}>
                      {cond ? '✎' : 'Elegir'}
                    </button>
                    {isExtra && (
                      <button onClick={()=>delExtra(p.id)} style={{ background:'none', border:'none', color:'#e5e2dd', fontSize:14, cursor:'pointer', padding:0, marginLeft:4 }}>✕</button>
                    )}
                  </div>
                  {isOpen && (
                    <div style={{ padding:'0 14px 12px', borderTop:'1px solid #f5f3f0', paddingTop:10 }}>
                      <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:8, fontFamily:'inherit' }}>CONDICIÓN ALIMENTARIA</div>
                      <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:8 }}>
                        {CONDICIONES_PRESET.map(c => (
                          <button key={c} onClick={()=>{ setOverride(p.id, c); setOpenId(null); }} style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, padding:'5px 12px', borderRadius:20, cursor:'pointer', border:'none',
                            background: cond===c ? color : '#f0ede8',
                            color: cond===c ? '#fff' : '#888',
                          }}>{c}</button>
                        ))}
                      </div>
                      {override && !isExtra && p.condicionOriginal && (
                        <button onClick={()=>{ clearOverride(p.id); setOpenId(null); }} style={{ fontFamily:'inherit', fontSize:10, background:'none', color:'#aaa', border:'1px solid #e5e2dd', borderRadius:8, padding:'5px 10px', cursor:'pointer' }}>
                          ↺ Restaurar a la del depto ({p.condicionOriginal})
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Agregar invitado/extra (personas fuera del crew) */}
      {loaded && (
        !showExtraForm
          ? <button onClick={()=>setShowExtraForm(true)} style={{ width:'100%', fontFamily:'inherit', fontSize:13, fontWeight:700, color:color, background:'none', border:`1px dashed ${color}55`, borderRadius:14, padding:'12px', cursor:'pointer', marginTop:4 }}>+ Agregar invitado / externo</button>
          : (
            <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30`, marginTop:4 }}>
              <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.06em', marginBottom:10, fontFamily:'inherit' }}>INVITADO / EXTERNO</div>
              <input value={extraForm.nombre} onChange={e=>setExtraForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre (ej: Cliente, Chofer externo)"
                style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:10 }}/>
              <div style={{ fontSize:10, color:'#aaa', letterSpacing:'0.06em', marginBottom:8, fontFamily:'inherit' }}>CONDICIÓN ALIMENTARIA</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
                {CONDICIONES_PRESET.map(c => (
                  <button key={c} onClick={()=>setExtraForm(f=>({...f,condicion:c}))} style={{ fontFamily:'inherit', fontSize:11, fontWeight:700, padding:'5px 12px', borderRadius:20, cursor:'pointer', border:'none',
                    background: extraForm.condicion===c ? color : '#f0ede8',
                    color: extraForm.condicion===c ? '#fff' : '#888',
                  }}>{c}</button>
                ))}
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={()=>setShowExtraForm(false)} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
                <button onClick={addExtra} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Agregar</button>
              </div>
            </div>
          )
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  AD COMENTARIOS TAB — notas internas de dirección con PIN
// ═══════════════════════════════════════════════════════════
function ADComentariosTab({ color, deptKey, projectId, project, isAdmin }) {
  const [comentarios, setComentariosRaw] = useState([]);
  const [texto, setTexto]   = useState('');
  const [autor, setAutor]   = useState('');
  const [pinOk, setPinOk]   = useState(isAdmin);
  const [showPin, setShowPin] = useState(false);

  useEffect(() => {
    if (!window._fb) return;
    return fb().onDeptData(projectId, deptKey, 'ad_comentarios', d => setComentariosRaw(d||[]));
  }, [projectId, deptKey]);

  const save = (v) => { setComentariosRaw(v); fb().saveDeptData(projectId, deptKey, 'ad_comentarios', v); };

  const add = () => {
    if (!texto.trim()) return;
    save([...comentarios, { id:Date.now(), texto:texto.trim(), autor:autor.trim()||'AD', ts:Date.now() }]);
    setTexto('');
  };
  const del = (id) => save(comentarios.filter(c=>c.id!==id));
  const fmt = (ts) => new Date(ts).toLocaleString('es-AR',{dateStyle:'short',timeStyle:'short'});

  if (!pinOk) {
    return (
      <div style={{ textAlign:'center', padding:'48px 24px' }}>
        <div style={{ fontSize:36, marginBottom:12 }}>🎬</div>
        <div style={{ fontSize:16, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit', marginBottom:8 }}>Notas de Dirección</div>
        <div style={{ fontSize:12, color:'#aaa', fontFamily:'inherit', marginBottom:20 }}>Estas notas son internas del equipo de dirección. Ingresá el PIN del proyecto para verlas.</div>
        <button onClick={()=>setShowPin(true)} style={{ fontFamily:'inherit', fontSize:14, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:14, padding:'12px 28px', cursor:'pointer' }}>🔑 Ingresar PIN</button>
        {showPin && <PinModal title="Notas de Dirección" subtitle="PIN del proyecto" correctPin={project?.pin} onSuccess={()=>{ setPinOk(true); setShowPin(false); }} onCancel={()=>setShowPin(false)}/>}
      </div>
    );
  }

  return (
    <div>
      <SectionLabel>NOTAS INTERNAS — DIRECCIÓN / AD</SectionLabel>
      <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:14, border:`1px solid ${color}20`, marginBottom:16 }}>
        <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Anotá un pedido o nota interna..." rows={3}
          style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'none', marginBottom:8 }}/>
        <button onClick={add} disabled={!texto.trim()} style={{ width:'100%', fontFamily:'inherit', fontSize:12, fontWeight:700, background:texto.trim()?color:'#e5e2dd', color:texto.trim()?'#fff':'#bbb', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>
          Publicar pedido
        </button>
      </div>
      {comentarios.length===0 && <div style={{ textAlign:'center', padding:'20px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin pedidos todavía.</div>}
      {[...comentarios].reverse().map(c=>(
        <div key={c.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:'1px solid var(--border-light)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'flex-end', marginBottom:6 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ fontSize:10, color:'#ccc', fontFamily:'inherit' }}>{fmt(c.ts)}</div>
              <button onClick={()=>del(c.id)} style={{ background:'none', border:'none', color:'#e5e2dd', fontSize:14, cursor:'pointer', padding:0 }}>✕</button>
            </div>
          </div>
          <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily:'inherit', lineHeight:1.5 }}>{c.texto}</div>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  RENTAL TAB — listado de equipos rentados (sólo producción)
// ═══════════════════════════════════════════════════════════
function RentalTab({ color, projectId }) {
  const [items, setItems] = useFirestoreList(projectId, 'produccion', 'rental', []);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId]   = useState(null);
  const [form, setForm] = useState({ desc:'', proveedor:'', fechaDesde:'', fechaHasta:'', monto:'', estado:'pendiente', notas:'' });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = () => {
    if (!form.desc.trim()) return;
    const item = { id: editId||Date.now(), ...form, monto: form.monto?parseFloat(form.monto):null };
    if (editId) { setItems(items.map(i=>i.id===editId?item:i)); }
    else { setItems([...items, item]); }
    setForm({ desc:'', proveedor:'', fechaDesde:'', fechaHasta:'', monto:'', estado:'pendiente', notas:'' });
    setEditId(null); setShowAdd(false);
  };
  const startEdit = (i) => {
    setForm({ desc:i.desc||'', proveedor:i.proveedor||'', fechaDesde:i.fechaDesde||'', fechaHasta:i.fechaHasta||'', monto:i.monto!=null?String(i.monto):'', estado:i.estado||'pendiente', notas:i.notas||'' });
    setEditId(i.id); setShowAdd(true);
  };
  const toggleEstado = (id) => setItems(items.map(i=>i.id===id?{...i, estado: i.estado==='confirmado'?'pendiente':(i.estado==='pendiente'?'devuelto':'confirmado')}:i));
  const del = (id) => setItems(items.filter(i=>i.id!==id));

  const gs = (n) => `Gs. ${Math.round(n||0).toLocaleString('es-PY')}`;
  const total = items.reduce((a,i)=>a+(parseFloat(i.monto)||0),0);

  const estadoColor = (e) => e==='confirmado'?'#0fa87e':(e==='devuelto'?'#888':'#d48c0e');
  const estadoBg    = (e) => e==='confirmado'?'#e8f8f0':(e==='devuelto'?'#f0ede8':'#fff8ec');

  return (
    <div>
      <SectionLabel>EQUIPOS RENTADOS ({items.length})</SectionLabel>
      {items.length > 0 && (
        <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:'12px 14px', border:'1px solid var(--border-light)', marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontSize:11, color:'#aaa', fontFamily:'inherit' }}>TOTAL ESTIMADO</div>
          <div style={{ fontSize:18, fontWeight:700, color, fontFamily:'inherit' }}>{gs(total)}</div>
        </div>
      )}
      {items.map(i => (
        <div key={i.id} style={{ background:'var(--bg-secondary)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:'1px solid var(--border-light)' }}>
          <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 }}>📦</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{i.desc}</div>
              {i.proveedor && <div style={{ fontSize:11, color:'var(--text-tertiary)', fontFamily:'inherit', marginTop:2 }}>🏢 {i.proveedor}</div>}
              {(i.fechaDesde || i.fechaHasta) && <div style={{ fontSize:11, color:'#aaa', fontFamily:'inherit', marginTop:2 }}>📅 {i.fechaDesde||'—'} → {i.fechaHasta||'—'}</div>}
              {i.notas && <div style={{ fontSize:11, color:'#aaa', fontFamily:'inherit', fontStyle:'italic', marginTop:3 }}>📝 {i.notas}</div>}
              <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:6 }}>
                <button onClick={()=>toggleEstado(i.id)} style={{ fontSize:10, fontWeight:700, padding:'3px 10px', borderRadius:10, border:'none', cursor:'pointer', color:estadoColor(i.estado), background:estadoBg(i.estado), fontFamily:'inherit' }}>
                  {i.estado==='confirmado'?'✓ CONFIRMADO':(i.estado==='devuelto'?'↩ DEVUELTO':'⌛ PENDIENTE')}
                </button>
                {i.monto!=null && <span style={{ fontSize:12, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit' }}>{gs(i.monto)}</span>}
              </div>
            </div>
            <button onClick={()=>startEdit(i)} style={{ background:'var(--bg-card-dark-secondary)', border:'none', borderRadius:8, color:'var(--text-tertiary)', fontSize:12, cursor:'pointer', padding:'4px 7px' }}>✎</button>
            <button onClick={()=>del(i.id)} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:12, cursor:'pointer', padding:'4px 7px' }}>✕</button>
          </div>
        </div>
      ))}
      {items.length===0 && !showAdd && <div style={{ textAlign:'center', padding:'28px', color:'#ccc', fontFamily:'inherit', fontSize:13 }}>Sin equipos rentados todavía</div>}

      {!showAdd
        ? <button onClick={()=>{ setEditId(null); setForm({ desc:'', proveedor:'', fechaDesde:'', fechaHasta:'', monto:'', estado:'pendiente', notas:'' }); setShowAdd(true); }} style={{ width:'100%', fontFamily:'inherit', fontSize:13, fontWeight:700, color:'#fff', background:color, border:'none', borderRadius:14, padding:'14px', cursor:'pointer', marginTop:4 }}>+ Agregar equipo rentado</button>
        : <div style={{ background:'var(--bg-secondary)', borderRadius:14, padding:16, border:`1px solid ${color}30`, marginTop:4 }}>
            <div style={{ fontSize:11, color:'#aaa', letterSpacing:'0.06em', marginBottom:10, fontFamily:'inherit' }}>{editId?'✎ EDITAR':'NUEVO ÍTEM DE RENTAL'}</div>
            <input value={form.desc} onChange={e=>set('desc',e.target.value)} placeholder="Descripción (ej: Cámara Alexa Mini + 2 lentes) *"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <input value={form.proveedor} onChange={e=>set('proveedor',e.target.value)} placeholder="Proveedor (empresa)"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <div style={{ display:'flex', gap:8, marginBottom:8 }}>
              <input value={form.fechaDesde} onChange={e=>set('fechaDesde',e.target.value)} placeholder="Desde (ej: 8 Jun)"
                style={{ flex:1, fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
              <input value={form.fechaHasta} onChange={e=>set('fechaHasta',e.target.value)} placeholder="Hasta (ej: 10 Jun)"
                style={{ flex:1, fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none' }}/>
            </div>
            <input value={form.monto} onChange={e=>set('monto',e.target.value)} placeholder="Monto (Gs.)" type="number"
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', marginBottom:8 }}/>
            <textarea value={form.notas} onChange={e=>set('notas',e.target.value)} placeholder="Notas (opcional)" rows={2}
              style={{ width:'100%', fontFamily:'inherit', fontSize:13, background:'var(--bg-card-dark)', border:'1px solid #e5e2dd', borderRadius:10, padding:'10px 12px', color:'var(--text-primary)', outline:'none', resize:'none', marginBottom:10 }}/>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>{ setShowAdd(false); setEditId(null); }} style={{ flex:1, fontFamily:'inherit', fontSize:12, background:'var(--bg-card-dark-secondary)', color:'var(--text-tertiary)', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>Cancelar</button>
              <button onClick={save} style={{ flex:2, fontFamily:'inherit', fontSize:12, fontWeight:700, background:color, color:'#fff', border:'none', borderRadius:10, padding:'10px', cursor:'pointer' }}>{editId?'Guardar cambios':'Agregar'}</button>
            </div>
          </div>
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  TARJETAS TAB — tarjetas de cámara + backups + escenas grabadas
// ═══════════════════════════════════════════════════════════
function TarjetasTab({ color, deptKey, projectId, project }) {
  const [tarjetasRaw, setTarjetasRaw] = useFirestoreList(projectId, deptKey || 'camara', 'tarjetas', null);

  // Inicializar con 3 tarjetas por defecto si no existen
  const tarjetas = tarjetasRaw && tarjetasRaw.length
    ? tarjetasRaw
    : [
        { id:'t1', nombre:'Tarjeta 1', grabada:false, backup1:false, backup2:false, escenas:[] },
        { id:'t2', nombre:'Tarjeta 2', grabada:false, backup1:false, backup2:false, escenas:[] },
        { id:'t3', nombre:'Tarjeta 3', grabada:false, backup1:false, backup2:false, escenas:[] },
      ];

  const save = (v) => setTarjetasRaw(v);

  const todasEscenas = project
    ? project.days.flatMap((d,di) => d.scenes.map(s=>({ id:s.id, num:s.num, title:s.title, day:d.label })))
    : [];

  const addTarjeta = () => {
    const nextNum = tarjetas.length + 1;
    save([...tarjetas, { id:'t'+Date.now(), nombre:`Tarjeta ${nextNum}`, grabada:false, backup1:false, backup2:false, escenas:[] }]);
  };
  const updateTarjeta = (id, patch) => save(tarjetas.map(t=>t.id===id?{...t,...patch}:t));
  const delTarjeta    = (id) => save(tarjetas.filter(t=>t.id!==id));
  const toggleEscena  = (tId, scId) => {
    const t = tarjetas.find(x=>x.id===tId);
    const next = (t.escenas||[]).includes(scId)
      ? (t.escenas||[]).filter(x=>x!==scId)
      : [...(t.escenas||[]), scId];
    updateTarjeta(tId, { escenas: next });
  };

  const [editingName, setEditingName] = useState(null);

  // Componente check reutilizable (3 estados: grabada, backup1, backup2)
  const CheckBox = ({ checked, onChange, label, col }) => (
    <div onClick={onChange} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'pointer', minWidth:38 }}>
      <div style={{ width:22, height:22, borderRadius:6, background:checked?col:'transparent', border:checked?'none':`2px solid ${col}66`, display:'flex', alignItems:'center', justifyContent:'center' }}>
        {checked && <span style={{ color:'#fff', fontSize:13, fontWeight:700 }}>✓</span>}
      </div>
      {label && <span style={{ fontSize:9, color:checked?col:'#aaa', fontWeight:700, fontFamily:'inherit', letterSpacing:'0.04em' }}>{label}</span>}
    </div>
  );

  return (
    <div>
      <SectionLabel>TARJETAS DE CÁMARA ({tarjetas.length})</SectionLabel>
      <div style={{ fontSize:11, color:'#aaa', marginBottom:14, fontFamily:'inherit', fontStyle:'italic' }}>
        Tocá el nombre para renombrar. Los checks indican: grabada, backup 1 y backup 2.
      </div>
      {tarjetas.map(t => {
        const escenasCount = (t.escenas||[]).length;
        return (
          <div key={t.id} style={{ background:'var(--bg-secondary)', borderRadius:14, marginBottom:12, border:`1px solid ${color}25`, overflow:'hidden' }}>
            {/* Header: ícono + nombre + 3 checks + eliminar */}
            <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px 12px', borderBottom:'1px solid #f5f3f0' }}>
              <div style={{ width:40, height:40, borderRadius:10, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>💾</div>
              <div style={{ flex:1, minWidth:0 }}>
                {editingName===t.id
                  ? <input autoFocus value={t.nombre} onChange={e=>updateTarjeta(t.id,{nombre:e.target.value})} onBlur={()=>setEditingName(null)} onKeyDown={e=>{ if(e.key==='Enter') setEditingName(null); }}
                      style={{ width:'100%', fontFamily:'inherit', fontSize:14, fontWeight:700, background:'var(--bg-card-dark)', border:`1px solid ${color}44`, borderRadius:8, padding:'4px 10px', color:'var(--text-primary)', outline:'none' }}/>
                  : <div onClick={()=>setEditingName(t.id)} style={{ fontSize:14, fontWeight:700, color:'var(--text-primary)', fontFamily:'inherit', cursor:'text' }}>{t.nombre} <span style={{ color:'#ccc', fontSize:10, marginLeft:4 }}>✎</span></div>
                }
                <div style={{ fontSize:10, color:'#aaa', fontFamily:'inherit', marginTop:2 }}>
                  {escenasCount > 0 ? `🎬 ${escenasCount} escena${escenasCount!==1?'s':''} asignada${escenasCount!==1?'s':''}` : 'Sin escenas asignadas'}
                </div>
              </div>
              <button onClick={()=>delTarjeta(t.id)} style={{ background:'var(--bg-error)', border:'none', borderRadius:8, color:'var(--color-primary)', fontSize:12, cursor:'pointer', padding:'4px 8px' }}>✕</button>
            </div>

            {/* Los 3 checks */}
            <div style={{ display:'flex', justifyContent:'space-around', padding:'12px 16px', background:'var(--bg-card-dark)', borderBottom:'1px solid #f5f3f0' }}>
              <CheckBox checked={!!t.grabada} onChange={()=>updateTarjeta(t.id,{grabada:!t.grabada})} label="GRABADA" col={color}/>
              <CheckBox checked={!!t.backup1} onChange={()=>updateTarjeta(t.id,{backup1:!t.backup1})} label="BACKUP 1" col="#0fa87e"/>
              <CheckBox checked={!!t.backup2} onChange={()=>updateTarjeta(t.id,{backup2:!t.backup2})} label="BACKUP 2" col="#0fa87e"/>
            </div>

            {/* Escenas — siempre visibles como chips compactos */}
            <div style={{ padding:'12px 16px 14px' }}>
              <div style={{ fontSize:9, color:'#aaa', letterSpacing:'0.08em', marginBottom:8, fontFamily:'inherit' }}>ESCENAS GRABADAS EN ESTA TARJETA</div>
              {todasEscenas.length === 0
                ? <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'inherit', fontStyle:'italic' }}>Sin escenas en el proyecto todavía</div>
                : <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                    {todasEscenas.map(sc => {
                      const sel = (t.escenas||[]).includes(sc.id);
                      return (
                        <button key={sc.id} onClick={()=>toggleEscena(t.id, sc.id)}
